# Override de développement — chargé AUTOMATIQUEMENT par `docker compose`
# en plus de docker-compose.yml.
#
# Il rouvre, sur la machine locale uniquement, les ports d'administration utiles
# au debug (base, API directe, console MinIO). En production, on déploie SANS ce
# fichier (voir `make up-prod`), donc seul le frontend reste exposé.
#
# Les ports sont bindés sur 127.0.0.1 : joignables depuis la machine, jamais
# depuis le réseau externe.

services:
  db:
    ports:
      - "127.0.0.1:5432:5432"   # psql depuis l'hôte

  minio:
    # La console a besoin du réseau web pour être atteinte depuis l'hôte
    networks:
      - internal
      - web
    ports:
      - "127.0.0.1:9000:9000"   # API S3
      - "127.0.0.1:9001:9001"   # Console web : http://localhost:9001

  backend:
    ports:
      - "127.0.0.1:8000:8000"   # accès direct à l'API / Swagger en dev
