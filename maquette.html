          <div style="display:flex;flex-direction:column;gap:14px">
            <div class="grid grid-kpi">
              <div class="kpi"><div class="kpi-label" x-text="t('attck.kCovered')"></div><div class="kpi-value" x-text="attckSummary.covered"></div>
                <div class="kpi-foot"><span class="chip violet" style="height:20px"><span class="dot"></span><span x-text="attckSummary.total+' '+t('attck.touched')"></span></span></div></div>
              <div class="kpi"><div class="kpi-label" x-text="t('attck.kDetected')"></div><div class="kpi-value" x-text="attckSummary.detected"></div>
                <div class="kpi-foot"><span class="chip cyan" style="height:20px"><span class="dot"></span><span x-text="t('attck.detectedSub')"></span></span></div></div>
              <div class="kpi"><div class="kpi-label" x-text="t('attck.kGaps')"></div><div class="kpi-value" x-text="attckSummary.gaps"></div>
                <div class="kpi-foot"><span class="chip" :class="attckSummary.gaps?'red':'green'" style="height:20px"><span class="dot"></span><span x-text="t('attck.gapsSub')"></span></span></div></div>
              <div class="kpi"><div class="kpi-label" x-text="t('attck.kUntested')"></div><div class="kpi-value" x-text="attckSummary.untested"></div>
                <div class="kpi-foot"><span class="chip amber" style="height:20px"><span class="dot"></span><span x-text="t('attck.untestedSub')"></span></span></div></div>
            </div>

            <section class="panel">
              <div class="panel-head" style="flex-wrap:wrap;gap:10px">
                <span class="panel-title" x-text="t('panel.attckMatrix')"></span>
                <span class="spacer"></span>
                <div class="seg" role="group" :aria-label="t('panel.attckMatrix')">
                  <button :class="{on:attckLayer==='couverture'}" @click="setLayer('couverture')" x-text="t('layer.couverture')"></button>
                  <button :class="{on:attckLayer==='detection'}" @click="setLayer('detection')" x-text="t('layer.detection')"></button>
                  <button :class="{on:attckLayer==='ecart'}" @click="setLayer('ecart')" x-text="t('layer.ecart')"></button>
                  <button x-show="attckImport" :class="{on:attckLayer==='importe'}" @click="setLayer('importe')" x-text="t('layer.importe')"></button>
                </div>
              </div>
              <div class="panel-body">
                <div class="atk-legend">
                  <template x-if="attckLayer==='couverture'"><span style="display:flex;gap:12px;flex-wrap:wrap">
                    <span class="lg"><span class="sw c-cov1"></span><span x-text="t('legend.covered')"></span></span>
                    <span class="lg"><span class="sw c-cov2"></span><span x-text="t('legend.coveredHi')"></span></span></span></template>
                  <template x-if="attckLayer==='detection'"><span style="display:flex;gap:12px;flex-wrap:wrap">
                    <span class="lg"><span class="sw c-det"></span><span x-text="t('legend.detected')"></span></span>
                    <span class="lg"><span class="sw c-miss"></span><span x-text="t('legend.missed')"></span></span></span></template>
                  <template x-if="attckLayer==='ecart'"><span style="display:flex;gap:12px;flex-wrap:wrap">
                    <span class="lg"><span class="sw c-gap"></span><span x-text="t('legend.gap')"></span></span>
                    <span class="lg"><span class="sw c-ok"></span><span x-text="t('legend.ok')"></span></span>
                    <span class="lg"><span class="sw c-untested"></span><span x-text="t('legend.untested')"></span></span></span></template>
                  <template x-if="attckLayer==='importe'"><span class="lg"><span class="sw c-imp"></span><span x-text="t('legend.imported')"></span></span></template>
                </div>
                <hr class="divider">
                <div class="atk-matrix" x-show="visibleTactics.length">
                  <template x-for="tac in visibleTactics" :key="tac.id">
                    <div class="atk-col">
                      <div class="atk-col-head">
                        <span class="atk-tac" x-text="t('tac.'+tac.id)"></span>
                        <span class="atk-tac-meta" x-text="tacticStat(tac).cov+' / '+tacticStat(tac).total"></span>
                      </div>
                      <div class="atk-cells">
                        <template x-for="tech in tac.techniques" :key="tech.id">
                          <div class="atk-cell" :class="cellClass(tech.id)" :title="cellTitle(tech)">
                            <span class="tcount" x-text="cellNum(tech.id)"></span>
                            <span class="tid" x-text="tech.id"></span>
                            <span class="tnm" x-text="tech.name"></span>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
                <div class="list-empty" x-show="!visibleTactics.length" x-text="t('attck.empty')"></div>
                <p class="note" style="margin-top:10px" x-text="t('attck.note')"></p>
              </div>
            </section>
          </div>
        </template>

        <!-- ===== EXERCICES PURPLE — cycle & feedback loop (Phase 4) ===== -->
        <template x-if="view==='exercices'">
          <div>
            <template x-if="!exoList.length">
              <div class="empty">
                <div class="empty-illust"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" width="88" height="88"><path d="M4 11a7 7 0 0 1 12-4l2 2"/><path d="M20 13a7 7 0 0 1-12 4l-2-2"/><path d="M18 5v4h-4M6 19v-4h4"/></svg></div>
                <h3 x-text="t('nav.exercices')"></h3>
                <p x-text="t('exo.empty')"></p>
              </div>
            </template>

            <template x-if="exoList.length">
              <div style="display:flex;flex-direction:column;gap:14px">

                <!-- Cycle Purple Team — panneau pédagogique 6 phases & entités (repliable, fermé par défaut) -->
                <section class="panel">
                  <div class="panel-head ptc-toggle" role="button" tabindex="0" :aria-expanded="phasesOpen" aria-controls="ptc-body"
                       @click="phasesOpen=!phasesOpen" @keydown.enter.prevent="phasesOpen=!phasesOpen" @keydown.space.prevent="phasesOpen=!phasesOpen">
                    <span class="panel-title" x-text="t('ptc.title')"></span>
                    <span class="ptc-sub" x-text="t('ptc.sub')"></span>
                    <span class="spacer"></span>
                    <span class="chip violet" style="height:20px"><span class="dot"></span><span x-text="phasesOpen?t('ptc.hide'):t('ptc.show')"></span></span>
                    <svg class="ptc-chev" :class="{'open':phasesOpen}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
                  </div>
                  <div id="ptc-body" class="panel-body" x-show="phasesOpen" x-transition.opacity x-cloak>
                    <div class="ptc-grid">
                      <template x-for="p in ptPhases" :key="p.n">
                        <div class="ptc-card">
                          <div class="ptc-top">
                            <div class="ptc-num" x-text="p.n"></div>
                            <div><h3 class="ptc-ctitle" x-text="t(p.t)"></h3><div class="ptc-verb" x-text="t(p.v)"></div></div>
                          </div>
                          <p class="ptc-desc" x-text="t(p.d)"></p>
                          <div class="ptc-ents">
                            <template x-for="e in p.ents" :key="e[1]">
                              <span class="chip" :class="e[0]" x-text="t(e[1])"></span>
                            </template>
                          </div>
                          <div class="ptc-foot"><span class="ptc-art" x-html="t(p.a)"></span><span class="ptc-ptes" x-text="t(p.ptes)"></span></div>
                        </div>
                      </template>
                    </div>
                  </div>
                </section>

                <section class="panel">
                  <div class="panel-head" style="flex-wrap:wrap;gap:8px">
                    <span class="panel-title" x-text="t('panel.cycle')"></span>
                    <span class="chip gray" style="height:20px" x-text="exoCycles.length+' '+t('cyc.scenarios')"></span>
                    <span class="spacer"></span>
                    <div class="cyc-legend">
                      <span class="lz"><span class="cyc-lb stv-det"></span><span x-text="t('cyc.legDet')"></span></span>
                      <span class="lz"><span class="cyc-lb stv-cov"></span><span x-text="t('cyc.legPart')"></span></span>
                      <span class="lz"><span class="cyc-lb stv-gap"></span><span x-text="t('cyc.legGap')"></span></span>
                    </div>
                  </div>
                  <div class="panel-body">
                    <template x-for="g in exoGroups" :key="g.aid">
                      <div class="cyc-group">
                        <div class="cyc-group-head">
                          <span class="cyc-group-title" x-text="g.auditNom"></span>
                          <span class="muted" style="font-size:11.5px" x-show="g.client" x-text="g.client"></span>
                          <span class="chip gray sm" x-text="g.runs.length+' '+t('exo.runs')"></span>
                          <span class="cyc-group-line"></span>
                        </div>
                        <template x-for="(c,idx) in g.runs" :key="c.exo.id">
                          <div class="cyc-sc" :class="{open:exoIsOpen(c.exo.id,c.isLast)}">
                            <div class="cyc-head" role="button" tabindex="0"
                                 @click="toggleExo(c.exo.id,c.isLast)" @keydown.enter.prevent="toggleExo(c.exo.id,c.isLast)" @keydown.space.prevent="toggleExo(c.exo.id,c.isLast)">
                              <span class="cyc-chev">▸</span>
                              <span class="chip violet sm" x-text="t('exo.run')+' '+c.runNo"></span>
                              <span class="cyc-name" x-text="c.exo.nom"></span>
                              <div class="cyc-kpis">
                                <span class="chip sm" :class="c.delta>0?'green':(c.delta<0?'red':'gray')" x-show="c.delta!==null" x-text="(c.delta>0?'▲ +':(c.delta<0?'▼ ':''))+c.delta+' '+t('exo.deltaUnit')"></span>
                                <span class="chip sm" :class="c.detPct>=75?'green':(c.detPct>=50?'amber':'red')"><span class="dot"></span><span x-text="t('cyc.cov')+' '+c.detPct+'%'"></span></span>
                                <span class="chip sm" :class="c.execRate>=70?'gray':'amber'" :title="t('exo.execTip')" x-text="t('exo.exec')+' '+c.execTested+'/'+c.execTotal+' · '+c.execRate+'%'"></span>
                                <span class="chip green sm" x-text="c.detected+'/'+c.tested+' '+t('cyc.detN')"></span>
                                <span class="chip green sm" x-show="c.prevention>0" :title="t('kpi.preventionTip')" x-text="c.prevention+'% '+t('cyc.prev')"></span>
                                <span class="chip amber sm" x-show="c.logged>0" :title="t('kpi.loggedTip')" x-text="c.logged+' '+t('cyc.logged')"></span>
                                <span class="chip sm" :class="c.gaps?'red':'gray'" x-text="c.gaps+' '+(c.gaps>1?t('cyc.gapsPl'):t('cyc.gapsSg'))"></span>
                                <span class="chip sm" :class="c.mttdN<3?'amber':'gray'" x-show="c.mttd!==null" :title="t('kpi.mttdTip')" x-text="'MTTD '+fmtDur(c.mttd)+(c.mttdN<3?' · n='+c.mttdN:'')"></span>
                                <span class="chip sm" :class="c.mttrRespN<3?'amber':'gray'" x-show="c.mttrResp!==null" :title="t('kpi.mttrRespTip')" x-text="t('kpi.mttrResp')+' '+fmtDur(c.mttrResp)+(c.mttrRespN<3?' · n='+c.mttrRespN:'')"></span>
                                <span class="chip sm" :class="c.mttrRemN<3?'amber':'gray'" x-show="c.mttrRem!==null" :title="t('kpi.mttrRemTip')" x-text="t('kpi.mttrRem')+' '+fmtDur(c.mttrRem)+(c.mttrRemN<3?' · n='+c.mttrRemN:'')"></span>
                                <span class="chip gray sm" x-show="c.exo.tlp" x-text="'TLP:'+c.exo.tlp"></span>
                              </div>
                              <div class="cyc-tacmini" :title="t('cyc.tacKpi')">
                                <template x-for="tt in c.tactics" :key="tt.id">
                                  <span class="cyc-tmb" :class="stvClass(tt.state)" :title="tt.label+' · '+tt.det+'/'+tt.tot"></span>
                                </template>
                              </div>
                            </div>
                            <div class="cyc-body" x-show="exoIsOpen(c.exo.id,c.isLast)" x-transition.opacity x-cloak>
                          <div class="cyc-toolbar" x-show="can('edit','purpleExercises',c.exo)">
                            <span class="spacer"></span>
                            <button class="btn btn--ghost cyc-tbtn" @click="openEditor('purpleExercises', c.exo)">
                              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20h4L19 9l-4-4L4 16v4Z"/><path d="M14 6l4 4"/></svg>
                              <span x-text="t('exo.edit')"></span>
                            </button>
                            <button class="btn btn--ghost cyc-tbtn" x-show="c.steps.length" @click="openExoSteps(c.exo.id)">
                              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
                              <span x-text="t('exostep.edit')"></span>
                            </button>
                          </div>
                          <template x-if="!c.steps.length">
                            <div class="cyc-empty">
                              <p class="note" x-text="t('cyc.noSteps')"></p>
                              <button class="btn btn--primary" x-show="can('edit','purpleExercises',c.exo)" @click="openExoSteps(c.exo.id)">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                                <span x-text="t('exostep.add')"></span>
                              </button>
                            </div>
                          </template>

                          <div class="pbar-wrap" x-show="c.pTested>0">
                            <div class="pbar-eyebrow eyebrow" x-text="t('cyc.posture')+' · '+c.pTested+' '+t('cyc.testedN')"></div>
                            <div class="pbar">
                              <div class="pseg prev" x-show="c.pPrev>0" :style="'flex-grow:'+c.pPrev" :title="t('cyc.prevFull')+' — '+c.pPrev">
                                <svg class="pg" viewBox="0 0 16 16"><path d="M8 1.6 13.4 3.6V7.6C13.4 10.6 11 12.9 8 14.1 5 12.9 2.6 10.6 2.6 7.6V3.6Z"/><path d="M5.7 7.8 7.3 9.4 10.4 6.2"/></svg>
                                <span class="ppc" x-text="Math.round(c.pPrev/c.pTested*100)+'%'"></span>
                              </div>
                              <div class="pseg alrt" x-show="c.pAlert>0" :style="'flex-grow:'+c.pAlert" :title="t('cyc.alertFull')+' — '+c.pAlert">
                                <svg class="pg" viewBox="0 0 16 16"><path d="M8 2.2C6 2.2 4.8 3.6 4.8 5.6 4.8 8.2 3.9 9.6 3 10.4H13C12.1 9.6 11.2 8.2 11.2 5.6 11.2 3.6 10 2.2 8 2.2Z"/><path d="M6.6 12.2A1.5 1.5 0 0 0 9.4 12.2"/></svg>
                                <span class="ppc" x-text="Math.round(c.pAlert/c.pTested*100)+'%'"></span>
                              </div>
                              <div class="pseg logd" x-show="c.pLog>0" :style="'flex-grow:'+c.pLog" :title="t('cyc.loggedFull')+' — '+c.pLog">
                                <svg class="pg" viewBox="0 0 16 16"><rect x="3.2" y="2.4" width="9.6" height="11.2" rx="1.4"/><path d="M5.4 5.6H10.6M5.4 8H10.6M5.4 10.4H8.6"/></svg>
                                <span class="ppc" x-text="Math.round(c.pLog/c.pTested*100)+'%'"></span>
                              </div>
                              <div class="pseg blnd" x-show="c.pBlind>0" :style="'flex-grow:'+c.pBlind" :title="t('cyc.blindFull')+' — '+c.pBlind">
                                <svg class="pg" viewBox="0 0 16 16"><path d="M2.2 8S4.5 3.8 8 3.8s5.8 4.2 5.8 4.2-2.3 4.2-5.8 4.2c-1 0-1.9-.3-2.7-.7"/><circle cx="8" cy="8" r="1.9"/><path d="M2.5 2.5 13.5 13.5"/></svg>
                                <span class="ppc" x-text="Math.round(c.pBlind/c.pTested*100)+'%'"></span>
                              </div>
                            </div>
                            <div class="pbar-legend">
                              <span class="pleg prev"><svg class="pg" viewBox="0 0 16 16"><path d="M8 1.6 13.4 3.6V7.6C13.4 10.6 11 12.9 8 14.1 5 12.9 2.6 10.6 2.6 7.6V3.6Z"/><path d="M5.7 7.8 7.3 9.4 10.4 6.2"/></svg><span x-text="t('cyc.prevFull')"></span> <b x-text="c.pPrev+'/'+c.pTested"></b></span>
                              <span class="pleg alrt"><svg class="pg" viewBox="0 0 16 16"><path d="M8 2.2C6 2.2 4.8 3.6 4.8 5.6 4.8 8.2 3.9 9.6 3 10.4H13C12.1 9.6 11.2 8.2 11.2 5.6 11.2 3.6 10 2.2 8 2.2Z"/><path d="M6.6 12.2A1.5 1.5 0 0 0 9.4 12.2"/></svg><span x-text="t('cyc.alertFull')"></span> <b x-text="c.pAlert+'/'+c.pTested"></b></span>
                              <span class="pleg logd"><svg class="pg" viewBox="0 0 16 16"><rect x="3.2" y="2.4" width="9.6" height="11.2" rx="1.4"/><path d="M5.4 5.6H10.6M5.4 8H10.6M5.4 10.4H8.6"/></svg><span x-text="t('cyc.loggedFull')"></span> <b x-text="c.pLog+'/'+c.pTested"></b></span>
                              <span class="pleg blnd"><svg class="pg" viewBox="0 0 16 16"><path d="M2.2 8S4.5 3.8 8 3.8s5.8 4.2 5.8 4.2-2.3 4.2-5.8 4.2c-1 0-1.9-.3-2.7-.7"/><circle cx="8" cy="8" r="1.9"/><path d="M2.5 2.5 13.5 13.5"/></svg><span x-text="t('cyc.blindFull')"></span> <b x-text="c.pBlind+'/'+c.pTested"></b></span>
                            </div>
                          </div>

                          <div class="cyc-tl" x-show="c.steps.length">
                            <template x-for="s in c.steps" :key="s.ordre">
                              <div class="cyc-step">
                                <div class="cyc-row">
                                  <div class="cyc-bead" :class="stvClass(s.state)" x-text="s.ordre"></div>
                                  <div class="cyc-main">
                                    <span class="mono-cell" x-text="s.technique"></span>
                                    <span class="cell-strong" x-text="s.titre"></span>
                                    <span class="chip" :class="verdictTone(s.verdict)"><span class="dot"></span><span x-text="optLabel(s.verdict)"></span></span>
                                    <template x-for="o in s.obs" :key="o.id">
                                      <span class="chip gray"><span class="dot"></span><span x-text="o.source+' · '+o.resultat"></span></span>
                                    </template>
                                    <span class="cyc-tac" x-text="tacLabel(s.tac)+' · '+fmtTs(s.horodatage)"></span>
                                  </div>
                                </div>

                                <!-- Purple — remédiation : visible sur angle mort ou journalisé (non alerté) -->
                                <template x-if="s.state==='gap' || s.state==='logged'">
                                  <div class="cyc-rem">
                                    <span class="cyc-rl" x-text="t('lane.ticket')"></span>
                                    <template x-if="s.ticket">
                                      <span style="display:contents">
                                        <span class="chip" :class="ticketStatutClass(s.ticket.statut)"><span class="dot"></span><span x-text="s.ticket.statut"></span></span>
                                        <template x-for="m in d3Arr(s.ticket.mesure_d3fend)" :key="m"><span class="chip" :class="d3Tone(m)" :title="d3Title(m)" x-text="m"></span></template>
                                        <span class="chip" :class="prioClass(s.ticket.priorite)" x-text="s.ticket.priorite"></span>
                                        <button class="btn btn--ghost" x-show="s.ticket.statut!=='validé' && (can('edit','detectionTickets',s.ticket)||can('validate','detectionTickets',s.ticket))" @click="advanceTicket(s.ticket)" x-text="t('ticket.advance')"></button>
                                        <button class="btn btn--ghost" x-show="can('edit','detectionTickets',s.ticket)" @click="openEditor('detectionTickets', s.ticket)" x-text="t('ticket.edit')"></button>
                                        <template x-if="s.ticket.regle_sigma"><details class="sig"><summary x-text="t('ticket.sigma')"></summary><pre class="sigma" x-text="s.ticket.regle_sigma"></pre></details></template>
                                      </span>
                                    </template>
                                    <template x-if="!s.ticket">
                                      <button class="btn btn--primary" x-show="can('create','detectionTickets',{client_id:c.exo.client_id})" @click="createTicket(s,c.exo)"><span x-text="t('ticket.create')"></span></button>
                                    </template>
                                  </div>
                                </template>

                                <!-- Purple — remédiation liée : repliée quand l'étape est prise en charge -->
                                <template x-if="s.ticket && s.state!=='gap' && s.state!=='logged'">
                                  <div>
                                    <div class="cyc-tog"><button class="lk" @click="toggleRem(remKey(c.exo.id,s.ordre))" x-text="(remIsOpen(remKey(c.exo.id,s.ordre))?'▾ ':'▸ ')+t('cyc.remLinked')+' (1)'"></button></div>
                                    <div class="cyc-rem" x-show="remIsOpen(remKey(c.exo.id,s.ordre))" x-transition.opacity x-cloak>
                                      <span class="cyc-rl" x-text="t('lane.ticket')"></span>
                                      <span class="chip" :class="ticketStatutClass(s.ticket.statut)"><span class="dot"></span><span x-text="s.ticket.statut"></span></span>
                                      <template x-for="m in d3Arr(s.ticket.mesure_d3fend)" :key="m"><span class="chip" :class="d3Tone(m)" :title="d3Title(m)" x-text="m"></span></template>
                                      <span class="chip" :class="prioClass(s.ticket.priorite)" x-text="s.ticket.priorite"></span>
                                      <button class="btn btn--ghost" x-show="s.ticket.statut!=='validé' && (can('edit','detectionTickets',s.ticket)||can('validate','detectionTickets',s.ticket))" @click="advanceTicket(s.ticket)" x-text="t('ticket.advance')"></button>
                                      <button class="btn btn--ghost" x-show="can('edit','detectionTickets',s.ticket)" @click="openEditor('detectionTickets', s.ticket)" x-text="t('ticket.edit')"></button>
                                      <template x-if="s.ticket.regle_sigma"><details class="sig"><summary x-text="t('ticket.sigma')"></summary><pre class="sigma" x-text="s.ticket.regle_sigma"></pre></details></template>
                                    </div>
                                  </div>
                                </template>
                              </div>
                            </template>
                          </div>

                          <!-- KPI par tactique MITRE -->
                          <div class="cyc-tackpi" x-show="c.tactics.length">
                            <div class="cyc-tackpi-h"><span x-text="t('cyc.tacKpi')"></span> <span class="faint" x-text="'· '+t('cyc.killchain')"></span></div>
                            <div class="cyc-tstrip">
                              <template x-for="tt in c.tactics" :key="tt.id">
                                <div class="cyc-tcell" :class="stvClass(tt.state)">

              </div>
            </div>
          </section>

                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" :style="vulnFilters.open?'transform:rotate(180deg);transition:.15s':'transition:.15s'"><path d="m6 9 6 6 6-6"/></svg>

                <div class="app-flt-rows" x-show="vulnFilters.open">

                      </div>
                      <div class="ac-input">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
                        <input type="text" x-model="vfAc.cve.q" @focus="vfAc.cve.open=true" :placeholder="t('voc.fCvePh')" autocomplete="off" style="border:0;background:transparent;outline:0;flex:1;color:var(--text);font:inherit">

                      <div class="ac-list" x-show="vfAc.cve.open && vfCveOpts().length" x-transition.opacity>

                      </div>
                      <div class="ac-input">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
                        <input type="text" x-model="vfAc.clients.q" @focus="vfAc.clients.open=true" :placeholder="t('voc.fClientPh')" autocomplete="off" style="border:0;background:transparent;outline:0;flex:1;color:var(--text);font:inherit">
                      </div>
                      <div class="ac-list" x-show="vfAc.clients.open && vfClientOpts().length" x-transition.opacity>
                        <div class="ac-head" x-text="vfClientOpts().length+' '+t('scen.results')"></div>
                        <template x-for="o in vfClientOpts()" :key="o.id"><button type="button" class="ac-item" @click="addVulnFilter('clients',o.id,'clients')"><span x-text="o.nom"></span></button></template>
                      </div>
                    </div>
                  </div>
                  <div class="app-flt-row">
                    <span class="lbl" x-text="t('f.applications')"></span>
                    <div class="ac-wrap" @click.outside="vfAc.apps.open=false" style="flex:1;max-width:440px">
                      <div class="chip-set" x-show="vulnFilters.apps.length" style="margin-bottom:6px">
                        <template x-for="aid in vulnFilters.apps" :key="aid"><span class="sel-chip"><span x-text="appName(aid)"></span><button type="button" @click="toggleVulnFilter('apps',aid)" aria-label="×">×</button></span></template>
                      </div>
                      <div class="ac-input">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
                        <input type="text" x-model="vfAc.apps.q" @focus="vfAc.apps.open=true" :placeholder="t('voc.fAppPh')" autocomplete="off" style="border:0;background:transparent;outline:0;flex:1;color:var(--text);font:inherit">
                      </div>
                      <div class="ac-list" x-show="vfAc.apps.open && vfAppOpts().length" x-transition.opacity>
                        <div class="ac-head" x-text="vfAppOpts().length+' '+t('scen.results')"></div>
                        <template x-for="o in vfAppOpts()" :key="o.id"><button type="button" class="ac-item" @click="addVulnFilter('apps',o.id,'apps')"><span class="mono-id" x-show="o.code" x-text="o.code"></span><span x-text="o.nom"></span><span class="ac-tac" x-text="orgName(o.client_id)"></span></button></template>
                      </div>
                    </div>
                  </div>
                  <div class="app-flt-row">
                    <span class="lbl" x-text="t('voc.sev')"></span>
                    <div style="display:flex;flex-wrap:wrap;gap:6px"><template x-for="sv in vfSevList" :key="sv"><button class="df-chip" :class="{on:vulnFilters.sev.includes(sv)}" @click="toggleVulnFilter('sev',sv)" x-text="optLabel(sv)"></button></template></div>
                  </div>
                  <div class="app-flt-row">
                    <span class="lbl">SLA</span>
                    <div style="display:flex;flex-wrap:wrap;gap:6px"><template x-for="sp in vfSlaList" :key="sp"><button class="df-chip" :class="{on:vulnFilters.sla.includes(sp)}" @click="toggleVulnFilter('sla',sp)" x-text="sp"></button></template></div>
                  </div>
                  <div class="app-flt-row">
                    <span class="lbl" x-text="t('col.statut')"></span>
                    <div style="display:flex;flex-wrap:wrap;gap:6px"><template x-for="st in vfStatutList" :key="st"><button class="df-chip" :class="{on:vulnFilters.statut.includes(st)}" @click="toggleVulnFilter('statut',st)" x-text="optLabel(st)"></button></template></div>
                  </div>
                </div>
              </div>
              <div class="table-wrap" style="border:0;border-radius:0">

                    <template x-for="v in vulnList" :key="v.id">

                        <td class="cell-strong" x-text="v.titre"></td>

                        <td class="data" x-text="(v.cvss_score!=null? v.cvss_score:'—')"></td>
                        <td><span class="chip" :class="slaClass(slaCompute(v).sla)" x-text="slaCompute(v).sla"></span></td>

                        <td><span class="chip" :class="vulnStatutClass(v.statut)" x-text="optLabel(v.statut)"></span></td>

                        </div></td>
                      </tr>
                    </template>
                    <template x-if="!vulnList.length"><tr><td colspan="10" class="list-empty" x-text="t('voc.empty')"></td></tr></template>
                  </tbody>
                </table>
              </div>
            </div>
          </section>

                          <button class="ic danger" x-show="can('delete','threatScenarios')" @click.stop="removeRecord('threatScenarios',s.id)" :aria-label="t('btn.delete')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg></button>

            </div>

                      </tr>
                    </template>
                    <template x-if="!delivList.length"><tr><td colspan="9" class="list-empty" x-text="t('gen.empty')"></td></tr></template>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg>
          </button>
        </div>
        <div class="drawer-body deliv-body">
          <p class="note doc-only-hide" style="margin-bottom:10px" x-text="t('gen.previewNote')"></p>

          <!-- Document (papier) -->
          <article class="doc" :data-tlp="delivView.deliv.tlp">
            <div class="doc-band" :class="'tlp-'+tlpKey(delivView.deliv.tlp)"><span x-text="'TLP:'+delivView.deliv.tlp"></span><span x-text="delivView.client"></span></div>

            <!-- ===== LETTRE D'ENGAGEMENT ===== -->
            <template x-if="delivView.kind==='lettre_engagement'">
              <div>
                <header class="doc-h">
                  <div class="doc-kicker" x-text="t('gen.letter')"></div>
                  <h1 x-text="delivView.deliv.titre"></h1>
                  <div class="doc-meta"><span x-text="delivView.client"></span> · <span x-text="t('gen.version')+' '+(delivView.deliv.version||'1.0')"></span> · <span x-text="delivView.dateStr"></span></div>
                </header>
                <template x-if="!delivView.eng">
                  <p class="doc-empty" x-text="t('gen.noEng')"></p>
                </template>
                <template x-if="delivView.eng">
                  <div>
                    <section class="doc-sec"><h2 x-text="t('f.objectifs')"></h2><ul><template x-for="o in (delivView.eng.objectifs||[])" :key="o"><li x-text="o"></li></template></ul></section>
                    <section class="doc-sec"><h2 x-text="t('eng.scope')"></h2>
                      <p><strong x-text="t('f.perimetre_inclus')+' : '"></strong><span x-text="(delivView.eng.perimetre_inclus||[]).join(', ')||'—'"></span></p>
                      <p><strong x-text="t('f.perimetre_exclus')+' : '"></strong><span x-text="(delivView.eng.perimetre_exclus||[]).join(', ')||'—'"></span></p></section>
                    <section class="doc-sec"><h2 x-text="t('f.regles_engagement')"></h2><p x-text="delivView.eng.regles_engagement||'—'"></p></section>
                    <section class="doc-sec"><h2 x-text="t('f.fenetres_test')"></h2><ul><template x-for="w in (delivView.eng.fenetres_test||[])" :key="w"><li x-text="w"></li></template></ul></section>
                    <section class="doc-sec doc-cols">
                      <div><h2 x-text="t('eng.contacts')"></h2>
                        <p><strong x-text="t('f.contacts_autorisation')+' : '"></strong><span x-text="(delivView.eng.contacts_autorisation||[]).join(', ')||'—'"></span></p>
                        <p><strong x-text="t('f.contacts_urgence')+' : '"></strong><span x-text="(delivView.eng.contacts_urgence||[]).join(', ')||'—'"></span></p></div>
                      <div><h2>SOW / NDA</h2>
                        <p><span x-text="delivView.eng.sow||'—'"></span> · <span x-text="delivView.eng.ref_nda||'—'"></span></p>
                        <p><strong x-text="t('f.niveau_intensite')+' : '"></strong><span x-text="delivView.eng.niveau_intensite||'—'"></span></p></div>
                    </section>
                    <section class="doc-sec"><h2 x-text="t('f.livrables_attendus')"></h2><ul><template x-for="l in (delivView.eng.livrables_attendus||[])" :key="l"><li x-text="l"></li></template></ul></section>
                    <section class="doc-sec" x-show="delivView.eng.clauses_legales"><h2 x-text="t('f.clauses_legales')"></h2><p x-text="delivView.eng.clauses_legales"></p></section>
                    <section class="doc-sign">
                      <div class="doc-sign-box"><span x-text="t('gen.forProvider')"></span></div>
                      <div class="doc-sign-box"><span x-text="t('gen.forClient')"></span>
                        <span class="doc-sign-note" x-text="delivView.eng.autorisation_signee? t('eng.signed'):t('eng.unsigned')"></span></div>
                    </section>
                  </div>
                </template>
              </div>
            </template>

            <!-- ===== ACCORD DE CONFIDENTIALITÉ (NDA) ===== -->
            <template x-if="delivView.kind==='nda'">
              <div>
                <header class="doc-h">
                  <div class="doc-kicker" x-text="t('gen.nda')"></div>
                  <h1 x-text="delivView.deliv.titre"></h1>
                  <div class="doc-meta"><span x-text="delivView.client"></span> · <span x-text="t('gen.version')+' '+(delivView.deliv.version||'1.0')"></span> · <span x-text="delivView.dateStr"></span></div>
                </header>
                <template x-if="!delivView.eng">
                  <p class="doc-empty" x-text="t('gen.noEng')"></p>
                </template>
                <template x-if="delivView.eng">
                  <div>
                    <section class="doc-sec"><h2 x-text="t('nda.parties')"></h2>
                      <p><strong x-text="t('nda.provider')+' : '"></strong><span x-text="delivView.provider"></span></p>
                      <p><strong x-text="t('nda.client')+' : '"></strong><span x-text="delivView.client"></span></p>
                      <p x-show="delivView.eng.ref_nda"><strong x-text="t('f.ref_nda')+' : '"></strong><span class="data" x-text="delivView.eng.ref_nda"></span></p></section>
                    <section class="doc-sec"><h2 x-text="t('nda.objet')"></h2><p x-text="delivView.eng.nda_objet||delivView.eng.clauses_legales||'—'"></p></section>
                    <section class="doc-sec"><h2 x-text="t('nda.traitement')"></h2><p x-text="delivView.eng.nda_traitement||'—'"></p></section>
                    <section class="doc-sec doc-cols">
                      <div><h2 x-text="t('nda.duree')"></h2><p x-text="delivView.eng.nda_duree||'—'"></p></div>
                      <div><h2 x-text="t('nda.droit')"></h2><p x-text="delivView.eng.nda_droit||'—'"></p></div>
                    </section>
                    <section class="doc-sec"><h2 x-text="t('nda.restitution')"></h2><p x-text="delivView.eng.nda_restitution||'—'"></p></section>
                    <section class="doc-sec"><p class="note" x-text="t('nda.foot')"></p></section>
                    <section class="doc-sign">
                      <div class="doc-sign-box"><span x-text="t('gen.forProvider')"></span></div>
                      <div class="doc-sign-box"><span x-text="t('gen.forClient')"></span></div>
                    </section>
                  </div>
                </template>
              </div>
            </template>

            <!-- ===== RAPPORT DE PENTEST ===== -->
            <template x-if="delivView.kind==='rapport'">
              <div>
                <header class="doc-h">
                  <div class="doc-kicker" x-text="t('gen.report')"></div>
                  <h1 x-text="delivView.deliv.titre"></h1>
                  <div class="doc-meta"><span x-text="delivView.client"></span> · <span x-text="t('gen.version')+' '+(delivView.deliv.version||'1.0')"></span> · <span x-text="delivView.dateStr"></span></div>
                </header>
                <template x-if="!delivView.audit"><p class="doc-empty" x-text="t('gen.noAudit')"></p></template>
                <template x-if="delivView.audit">
                  <div>
                    <!-- Synthèse -->
                    <section class="doc-sec"><h2 x-text="t('gen.synthesis')"></h2>
                      <div class="doc-kpis">
                        <div class="doc-kpi"><span class="dk-v" x-text="delivView.vulns.length"></span><span class="dk-l" x-text="t('nav.vulns')"></span></div>
                        <div class="doc-kpi"><span class="dk-v" x-text="delivView.actionsCount"></span><span class="dk-l" x-text="t('panel.actions')"></span></div>
                        <div class="doc-kpi"><span class="dk-v" x-text="delivView.ptesDone+'/'+delivView.ptesTotal"></span><span class="dk-l">PTES</span></div>
                        <div class="doc-kpi"><span class="dk-v" x-text="delivView.audit.type_test? optLabel(delivView.audit.type_test):'—'"></span><span class="dk-l" x-text="t('f.type_test')"></span></div>
                      </div>
                      <p style="margin-top:8px"><strong x-text="t('gen.sevDist')+' : '"></strong>
                        <template x-for="s in delivView.sevCount" :key="s.k"><span class="doc-sev" :class="sevClass(s.k)" x-text="optLabel(s.k)+' ('+s.n+')'"></span></template>
                        <span x-show="!delivView.sevCount.length" x-text="t('gen.noVuln')"></span></p>
                    </section>
                    <!-- Méthodologie -->
                    <section class="doc-sec"><h2 x-text="t('gen.method')"></h2>
                      <p><strong x-text="t('f.referentiels_methodo')+' : '"></strong><span x-text="(delivView.audit.referentiels_methodo||[]).join(', ')||'—'"></span></p>
                      <template x-if="delivView.scen">
                        <div class="doc-scen">
                          <p class="doc-scen-t"><strong x-text="t('nav.scenarios')+' : '"></strong><span x-text="delivView.scen.nom+' ('+delivView.scen.acteur+')'"></span></p>
                          <ul class="doc-ttp">
                            <template x-for="tid in (delivView.scen.techniques||[])" :key="tid">
                              <li><span class="ttp-code" x-text="tid"></span><span class="ttp-sep"> : </span><span x-text="techName(tid)"></span></li>
                            </template>
                          </ul>
                        </div>
                      </template>
                    </section>
                    <!-- Déroulé par phase PTES -->
                    <section class="doc-sec"><h2 x-text="t('gen.walkthrough')"></h2>
                      <template x-for="p in delivView.phases" :key="p.ph">
                        <div class="doc-phase">
                          <h3 x-text="optLabel(p.ph)"></h3>
                          <table class="doc-tbl"><colgroup><col><col class="c-tech"><col class="c-res"></colgroup><tbody>
                            <template x-for="a in p.actions" :key="a.id">
                              <tr><td x-text="a.titre"></td><td class="data" x-text="a.technique_attack? a.technique_attack:'—'"></td><td x-text="optLabel(a.resultat)||'—'"></td></tr>
                            </template>
                          </tbody></table>
                        </div>
                      </template>
                      <p x-show="!delivView.phases.length" class="doc-empty" x-text="t('gen.noAction')"></p>
                    </section>
                    <!-- Vulnérabilités détaillées -->
                    <section class="doc-sec"><h2 x-text="t('gen.findings')"></h2>
                      <template x-if="!delivView.vulns.length"><p class="doc-empty" x-text="t('gen.noVuln')"></p></template>
                      <template x-for="(v,i) in delivView.vulns" :key="v.id">
                        <div class="doc-finding">
                          <div class="doc-finding-h">
                            <span class="doc-sev" :class="sevClass(v.severite)" x-text="optLabel(v.severite)"></span>
                            <span class="doc-finding-t" x-text="(i+1)+'. '+v.titre"></span>
                            <span class="doc-finding-sla" x-text="slaCompute(v).sla+' · '+(v.cve||'—')"></span>
                          </div>
                          <p x-show="v.description"><strong x-text="t('f.description')+' : '"></strong><span x-text="v.description"></span></p>
                          <p x-show="v.impact_metier"><strong x-text="t('voc.impact')+' : '"></strong><span x-text="v.impact_metier"></span></p>
                          <p x-show="v.recommandation"><strong x-text="t('voc.reco')+' : '"></strong><span x-text="v.recommandation"></span></p>
                          <div class="doc-proofs" x-show="(v.preuves||[]).length">
                            <template x-for="p in (v.preuves||[])" :key="p.nom"><figure><img :src="p.dataUrl" :alt="p.nom"><figcaption x-text="p.nom"></figcaption></figure></template>
                          </div>
                        </div>
                      </template>
                    </section>
                  </div>
                </template>
              </div>
            </template>

            <div class="doc-foot"><span x-text="'TLP:'+delivView.deliv.tlp+' — '+delivView.client"></span><span x-text="t('gen.confidential')"></span></div>
          </article>
        </div>
      </aside>
    </div>
  </template>

  <!-- ============ ÉDITEUR DE SCÉNARIO CTI (étapes ATT&CK + D3FEND auto) ============ -->
  <template x-if="scenEd.open && scenEd.model">
    <div>
      <div class="drawer-scrim" @click="closeScenEditor()"></div>
      <aside class="drawer drawer--wide" role="dialog" aria-modal="true" :aria-label="t('scen.editorTitle')" @keydown.escape.window="closeScenEditor()"
        x-init="$nextTick(()=>$el.querySelector('.drawer-body input,.drawer-body textarea')?.focus())">
        <div class="drawer-head">
          <div><div class="eyebrow" x-text="scenEd.id? t('scen.edit'): t('scen.new')"></div>
            <span class="drawer-title" x-text="t('scen.editorTitle')"></span></div>
          <span style="flex:1"></span>
          <button class="btn btn--ghost" @click="closeScenEditor()" x-text="t('btn.cancel')"></button>
          <button class="btn btn--primary" @click="saveScenEditor()"><span x-text="t('btn.save')"></span></button>
        </div>
        <div class="drawer-body" style="display:flex;flex-direction:column;gap:14px">
          <p class="note" x-text="t('scen.editorSub')"></p>

          <div><label class="field-label" x-text="t('f.nom')+' *'"></label>
            <input type="text" class="input" x-model="scenEd.model.nom" :placeholder="t('scen.phNom')"></div>

          <div class="grid grid-2" style="gap:12px">
            <div><label class="field-label" x-text="t('scen.objectif')"></label><input type="text" class="input" x-model="scenEd.model.objectif" :placeholder="t('scen.phObjectif')"></div>
            <div><label class="field-label" x-text="t('f.acteur')"></label><input type="text" class="input" x-model="scenEd.model.acteur" :placeholder="t('scen.phActeur')"></div>
          </div>

          <div class="grid grid-2" style="gap:12px">
            <div><label class="field-label" x-text="t('scen.engagement')"></label>
              <div class="seg"><template x-for="c in enums.auditCategorie" :key="c">
                <button class="seg-btn" :class="{on:scenEd.model.engagement===c}" @click="scenEd.model.engagement=c" x-text="optLabel(c)"></button></template></div></div>
            <div><label class="field-label" x-text="t('scen.sophistication')"></label>
              <div class="seg"><template x-for="c in ['fondamental','intermediaire','avance']" :key="c">
                <button class="seg-btn" :class="{on:scenEd.model.sophistication===c}" @click="scenEd.model.sophistication=c" x-text="optLabel(c)"></button></template></div></div>
          </div>

          <!-- Étapes offensives -->
          <section class="panel">
            <div class="panel-head"><span class="badge-attck">ATT&CK</span><span class="panel-title" x-text="t('scen.steps')"></span>
              <span class="spacer"></span><span class="note" x-text="scenEd.model.etapes.length+' '+t('scen.stepN')+' · '+scenMatrix(scenEd.model.etapes.map(s=>s.technique)).length+' '+t('scen.tacN')"></span></div>
            <div class="panel-body" style="display:flex;flex-direction:column;gap:9px">
              <template x-for="(s,i) in scenEd.model.etapes" :key="s.id">
                <div class="step-card">
                  <div class="step-top">
                    <span class="num-circle" x-text="i+1"></span>
                    <span class="chip violet" x-text="tacName(s.tactique)"></span>
                    <span class="mono-id" x-text="s.technique"></span>
                    <span class="step-name" x-text="techName(s.technique)"></span>
                    <span style="flex:1"></span>
                    <button class="ic danger" @click="removeStep(s.id)" :aria-label="t('btn.delete')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg></button>
                  </div>
                  <div class="step-cmd" x-show="s.commande"><span class="cmd-dollar">$</span><span x-text="s.commande"></span></div>
                  <div class="step-desc" x-show="s.description" x-text="s.description"></div>
                </div>
              </template>
              <template x-if="!scenEd.model.etapes.length"><div class="list-empty" x-text="t('scen.noStep')"></div></template>

              <!-- Ajouter une étape : autocomplétion -->
              <div class="add-step">
                <label class="field-label" x-text="t('scen.addStep')"></label>
                <div style="position:relative">
                  <div class="ac-input">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
                    <input type="text" x-model="scenEd.stepQ" @input="scenEd.stepSel=null" :placeholder="t('scen.phSearch')">
                    <button class="ic" x-show="scenEd.stepQ" @click="clearStepPick()" :aria-label="t('a11y.close')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
                  </div>
                  <div class="ac-list" x-show="attckResults.length && !scenEd.stepSel" x-transition.opacity>
                    <div class="ac-head" x-text="t('scen.catalogue')+' — '+attckResults.length+' '+t('scen.results')"></div>
                    <template x-for="r in attckResults" :key="r.id">
                      <button class="ac-item" @click="pickStepTech(r)">
                        <span class="mono-id" x-text="r.id"></span>
                        <span><span class="ac-name" x-text="r.name"></span><span class="ac-tac" x-text="tacName(r.tac)+(r.sub?' · '+t('scen.subtech'):'')"></span></span>
                      </button>
                    </template>
                  </div>
                </div>
                <input type="text" class="input" x-model="scenEd.stepCmd" :placeholder="t('scen.phCmd')" style="margin-top:8px">
                <textarea class="input" rows="2" x-model="scenEd.stepDesc" :placeholder="t('scen.phStepDesc')" style="margin-top:8px"></textarea>
                <div style="margin-top:9px"><button class="btn" @click="addStep()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg><span x-text="t('scen.addStepBtn')"></span></button></div>
              </div>
            </div>
          </section>

          <!-- D3FEND auto -->
          <section class="panel" x-show="d3Suggested.length">
            <div class="panel-head"><span class="badge-d3fend">D3FEND</span><span class="panel-title" x-text="t('scen.d3title')"></span>
              <span class="spacer"></span><span class="note" x-text="d3SuggestCount+' '+t('scen.measures')"></span></div>
            <div class="panel-body" style="display:flex;flex-direction:column;gap:12px">
              <div class="d3-auto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3v4M3 5h4M6 17v4M4 19h4M13 3l2.5 6.5L22 12l-6.5 2.5L13 21l-2.5-6.5L4 12l6.5-2.5L13 3Z"/></svg>
                <span x-text="t('scen.d3auto')"></span></div>
              <template x-for="g in d3Suggested" :key="g.tech">
                <div>
                  <div class="d3-grp"><span class="mono-id" x-text="g.tech"></span><span class="step-name" x-text="g.name"></span>
                    <span class="chip green" x-text="g.measures.filter(m=>!m.off).length+' '+t('scen.measures')"></span></div>
                  <div style="display:flex;flex-direction:column;gap:5px;margin-top:6px">
                    <template x-for="m in g.measures" :key="m.key">
                      <div class="d3-row" :class="{off:m.off}">
                        <span class="chip" :class="d3CatTone(m.cat)" x-text="m.cat"></span>
                        <span class="d3-name" x-text="m.name"></span>
                        <span class="mono-id" style="opacity:.8" x-text="m.id"></span>
                        <button class="ic" @click="toggleD3(m.key)" :aria-label="m.off? t('scen.d3add'): t('scen.d3remove')">
                          <svg x-show="!m.off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
                          <svg x-show="m.off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                        </button>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </section>

          <div><label class="field-label" x-text="t('scen.descGen')"></label><textarea class="input" rows="3" x-model="scenEd.model.notes" :placeholder="t('scen.phDesc')"></textarea></div>
          <div class="grid grid-2" style="gap:12px">
            <div><label class="field-label">IOC <span class="muted" x-text="'· '+t('scen.iocSub')"></span></label><textarea class="input" rows="2" x-model="scenEd.model.ioc" :placeholder="t('scen.phIoc')"></textarea></div>
            <div><label class="field-label">IOA <span class="muted" x-text="'· '+t('scen.ioaSub')"></span></label><textarea class="input" rows="2" x-model="scenEd.model.ioa" :placeholder="t('scen.phIoa')"></textarea></div>
          </div>
          <div><label class="field-label" x-text="t('scen.refs')"></label><input type="text" class="input" x-model="scenEd.model.references" :placeholder="t('scen.phRefs')"></div>
          <div style="max-width:220px"><label class="field-label">TLP</label>
            <select class="input" x-model="scenEd.model.tlp"><template x-for="o in enums.tlp" :key="o"><option :value="o" x-text="'TLP:'+o"></option></template></select></div>
        </div>
      </aside>
    </div>
  </template>

  <!-- ============ ÉDITEUR D'ÉTAPES D'EXERCICE (drawer) ============ -->
  <template x-if="exoStepEd.open">
    <div>
      <div class="drawer-scrim" @click="closeExoSteps()"></div>
      <aside class="drawer drawer--wide" role="dialog" aria-modal="true" :aria-label="t('exostep.title')" @keydown.escape.window="closeExoSteps()">
        <div class="drawer-head">
          <div><div class="eyebrow" x-text="t('exostep.title')"></div>
            <span class="drawer-title" x-text="exoStepEd.exoNom"></span></div>
          <span style="flex:1"></span>
          <button class="btn btn--ghost" @click="closeExoSteps()" x-text="t('btn.cancel')"></button>
          <button class="btn btn--primary" @click="saveExoSteps()"><span x-text="t('btn.save')"></span></button>
        </div>
        <div class="drawer-body" style="display:flex;flex-direction:column;gap:14px">
          <p class="note" x-text="t('exostep.sub')"></p>

          <div><label class="field-label" x-text="t('exostep.chainName')"></label>
            <input type="text" class="input" x-model="exoStepEd.nom" :placeholder="t('exostep.chainName')"></div>

          <section class="panel">
            <div class="panel-head"><span class="badge-attck">ATT&CK</span><span class="panel-title" x-text="t('exostep.steps')"></span>
              <span class="spacer"></span><span class="note" x-text="exoStepEd.steps.length+' '+t('scen.stepN')"></span></div>
            <div class="panel-body" style="display:flex;flex-direction:column;gap:10px">

              <template x-for="(s,i) in exoStepEd.steps" :key="s.id">
                <div class="step-card">
                  <div class="step-top">
                    <span class="num-circle" x-text="i+1"></span>
                    <span class="mono-id" x-text="s.technique"></span>
                    <span class="chip violet" x-text="stepTac(s.technique)"></span>
                    <span style="flex:1"></span>
                    <button class="ic" @click="moveExoStep(s.id,-1)" :disabled="i===0" :aria-label="t('exostep.moveUp')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
                    <button class="ic" @click="moveExoStep(s.id,1)" :disabled="i===exoStepEd.steps.length-1" :aria-label="t('exostep.moveDown')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg></button>
                    <button class="ic danger" @click="removeExoStep(s.id)" :aria-label="t('btn.delete')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg></button>
                  </div>
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
                    <div><label class="field-label" x-text="t('exostep.titre')"></label><input type="text" class="input" x-model="s.titre" :placeholder="techName(s.technique)"></div>
                    <div><label class="field-label" x-text="t('exostep.timeExec')"></label><input type="text" class="input" x-model="s.horodatage" placeholder="2026-05-02T09:02:00Z"></div>
                  </div>
                  <div class="seg" style="margin-top:8px;flex-wrap:wrap;height:auto;gap:4px;padding:3px">
                    <template x-for="v in verdictOpts" :key="v">
                      <button class="seg-btn" :class="{on:stepVerdict(s)===v}" @click="s.verdict=v" x-text="optLabel(v)"></button>
                    </template>
                  </div>
                  <div x-show="vHasTelemetry(s)" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px" x-transition.opacity>
                    <div x-show="stepVerdict(s)==='alerted'"><label class="field-label" x-text="t('exostep.timeDetect')"></label><input type="text" class="input" x-model="s.horodatage_detection" placeholder="2026-05-02T09:16:00Z"></div>
                    <div x-show="stepVerdict(s)==='alerted'"><label class="field-label" x-text="t('exostep.timeResp')"></label><input type="text" class="input" x-model="s.horodatage_reponse" placeholder="2026-05-02T09:31:00Z"></div>
                    <div><label class="field-label" x-text="t('exostep.obsSource')"></label><input type="text" class="input" x-model="s.source" placeholder="EDR, SIEM, NDR…"></div>
                    <div><label class="field-label" x-text="t('exostep.obsResultat')"></label><input type="text" class="input" x-model="s.resultat" :placeholder="optLabel(stepVerdict(s))"></div>
                    <div style="grid-column:1 / -1"><label class="field-label" x-text="t('exostep.obsDesc')"></label><input type="text" class="input" x-model="s.description" :placeholder="t('exostep.obsDesc')"></div>
                    <p class="note" style="grid-column:1 / -1;margin:0" x-show="stepVerdict(s)==='alerted'" x-text="t('exostep.mttdHint')"></p>
                    <p class="note" style="grid-column:1 / -1;margin:0" x-show="stepVerdict(s)==='logged'" x-text="t('exostep.loggedHint')"></p>
                  </div>
                </div>
              </template>
              <template x-if="!exoStepEd.steps.length"><div class="list-empty" x-text="t('exostep.noStep')"></div></template>

              <div x-show="exoStepEd.scenId" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <button class="btn" @click="loadStepsFromScenario()">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg>
                  <span x-text="t('exostep.loadScen')"></span>
                </button>
                <span class="muted" style="font-size:11.5px" x-text="exoStepEd.scenNom"></span>
              </div>

              <div class="add-step">
                <label class="field-label" x-text="t('scen.addStep')"></label>
                <div style="position:relative">
                  <div class="ac-input">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
                    <input type="text" x-model="exoStepEd.stepQ" @input="exoStepEd.stepSel=null" :placeholder="t('scen.phSearch')">
                    <button class="ic" x-show="exoStepEd.stepQ" @click="clearExoPick()" :aria-label="t('a11y.close')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
                  </div>
                  <div class="ac-list" x-show="exoStepResults.length && !exoStepEd.stepSel" x-transition.opacity>
                    <div class="ac-head" x-text="t('scen.catalogue')+' — '+exoStepResults.length+' '+t('scen.results')"></div>
                    <template x-for="r in exoStepResults" :key="r.id">
                      <button class="ac-item" @click="pickExoTech(r)">
                        <span class="mono-id" x-text="r.id"></span>
                        <span><span class="ac-name" x-text="r.name"></span><span class="ac-tac" x-text="tacName(r.tac)+(r.sub?' · '+t('scen.subtech'):'')"></span></span>
                      </button>
                    </template>
                  </div>
                </div>
                <div style="margin-top:9px"><button class="btn" @click="addExoStep()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg><span x-text="t('scen.addStepBtn')"></span></button></div>
              </div>
            </div>
          </section>
        </div>
      </aside>
    </div>
  </template>

  <!-- ============ DÉTAIL SCÉNARIO CTI (drawer) ============ -->
  <template x-if="corpusDrawer.open && corpusArt">
    <div>
      <div class="drawer-scrim" @click="closeCorpus()"></div>
      <aside class="drawer" role="dialog" aria-modal="true" :aria-label="cL(corpusArt.titre)" @keydown.escape.window="closeCorpus()">
        <div class="drawer-head">
          <span class="drawer-title" x-text="cL(corpusArt.titre)"></span>
          <span style="flex:1"></span>
          <button class="icon-btn" @click="closeCorpus()" :aria-label="t('a11y.close')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg>
          </button>
        </div>
        <div class="drawer-body">
          <div style="display:flex;flex-direction:column;gap:14px">

            <div class="chip-set">
              <span class="chip" :class="corpusNatureChip(corpusArt.nature)"><span class="dot"></span><span x-text="t('corpus.n.'+corpusArt.nature)"></span></span>
              <span class="chip gray" x-text="t('corpus.t.'+corpusArt.type)"></span>
              <template x-for="p in corpusArt.profils" :key="p"><span class="chip violet" x-text="t('corpus.p.'+p)"></span></template>
              <template x-for="nr in corpusArt.normes" :key="nr.id">
                <a class="corp-norme" :href="nr.url" target="_blank" rel="noopener" x-text="nr.id+' ↗'"></a>
              </template>
              <span class="corp-norme" x-show="corpusArt.hds" x-text="t('corpus.hds')+' : '+corpusArt.hds"></span>
            </div>

            <p class="page-sub" style="margin:0" x-text="cL(corpusArt.resume)"></p>

            <!-- Objectif (à quoi ça sert) -->
            <div class="corp-obj" x-show="corpusArt.objectif">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r=".8" fill="currentColor"/></svg>
              <p x-text="cL(corpusArt.objectif)"></p>
            </div>

            <!-- Quand l'utiliser -->
            <div class="corp-when" x-show="corpusArt.quand">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
              <span><b x-text="t('corpus.when')"></b> <span x-text="cL(corpusArt.quand)"></span></span>
            </div>

            <!-- Nature : procédure (étapes numérotées + sorties) -->
            <section class="panel" x-show="corpusArt.body.steps">
              <div class="panel-head"><span class="panel-title" x-text="t('corpus.steps')"></span></div>
              <div class="panel-body">
                <ol class="corp-steps">
                  <template x-for="(s,i) in (corpusArt.body.steps||[])" :key="i">
                    <li><span class="corp-step-n"></span>
                      <span class="corp-step-t"><span x-text="cL(s.t)"></span><span class="corp-step-out" x-show="s.out" x-text="cL(s.out)"></span></span>
                      <span class="corp-step-r" x-text="s.r"></span></li>
                  </template>
                </ol>
              </div>
            </section>

            <!-- Nature : processus (flow vertical) -->
            <section class="panel" x-show="corpusArt.body.stages">
              <div class="panel-head"><span class="panel-title" x-text="t('corpus.flow')"></span></div>
              <div class="panel-body">
                <div class="corp-flow">
                  <template x-for="(st,i) in (corpusArt.body.stages||[])" :key="i">
                    <div class="corp-stage">
                      <div class="corp-stage-dot"></div>
                      <div class="corp-stage-body">
                        <p class="corp-stage-t" x-text="(i+1)+' · '+cL(st.t)"></p>
                        <p class="corp-stage-d" x-text="cL(st.d)"></p>
                        <span class="corp-dec" x-show="st.dec" x-text="cL(st.dec)"></span>
                      </div>
                    </div>
                  </template>
                </div>
                <p class="corp-loop" x-show="corpusArt.loop" x-text="cL(corpusArt.loop)"></p>
              </div>
            </section>

            <!-- Nature : article métier (prose + table optionnelle) -->
            <section class="panel" x-show="corpusArt.body.prose">
              <div class="panel-body corp-prose">
                <template x-for="(p,i) in (corpusArt.body.prose||[])" :key="i"><p x-text="cL(p)"></p></template>
                <table class="corp-table" x-show="corpusArt.body.table">
                  <thead><tr>
                    <template x-for="(h,i) in (corpusArt.body.table?corpusArt.body.table.head:[])" :key="i"><th x-text="cL(h)"></th></template>
                  </tr></thead>
                  <tbody>
                    <template x-for="(r,i) in (corpusArt.body.table?corpusArt.body.table.rows:[])" :key="i">
                      <tr>
                        <td><span class="chip" :class="r[0]" style="height:20px"><span class="dot"></span><span class="data" x-text="cL(r[1])"></span></span></td>
                        <td x-text="cL(r[2])"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </section>

            <!-- Points-clés « à retenir » -->
            <section class="panel" x-show="corpusArt.keypoints && corpusArt.keypoints.length">
              <div class="panel-body">
                <div class="corp-sec-h">
                  <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="var(--violet)" stroke-width="2"><path d="m9 11 3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                  <span class="lbl" x-text="t('corpus.keypoints')"></span>
                </div>
                <ul class="corp-key">
                  <template x-for="(k,i) in corpusArt.keypoints" :key="i"><li x-text="cL(k)"></li></template>
                </ul>
              </div>
            </section>

            <!-- Pièges fréquents -->
            <section class="panel" x-show="corpusArt.pieges && corpusArt.pieges.length">
              <div class="panel-body">
                <div class="corp-sec-h">
                  <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4M12 17h.01"/></svg>
                  <span class="lbl" x-text="t('corpus.pieges')"></span>
                </div>
                <ul class="corp-piege">
                  <template x-for="(pg,i) in corpusArt.pieges" :key="i">
                    <li><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg><span x-text="cL(pg)"></span></li>
                  </template>
                </ul>
              </div>
            </section>

            <!-- Gabarit : disclaimer + export -->
            <div x-show="corpusArt.type==='gabarit'">
              <div class="corp-callout"><b x-text="t('corpus.generic')"></b><span x-text="t('corpus.disclaimer')"></span></div>
              <button class="btn btn--primary" @click="corpusExport(corpusArt)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M5 21h14"/></svg>
                <span x-text="t('corpus.export')"></span>
              </button>
            </div>

            <!-- Pour aller plus loin -->
            <section class="panel" x-show="corpusArt.aller && corpusArt.aller.length">
              <div class="panel-body">
                <div class="corp-sec-h"><span class="lbl" x-text="t('corpus.aller')"></span></div>
                <div class="corp-aller">
                  <template x-for="(a,i) in corpusArt.aller" :key="i">
                    <a :href="a.url" target="_blank" rel="noopener"><span x-text="cL(a.label)"></span> <span style="opacity:.6">↗</span></a>
                  </template>
                </div>
              </div>
            </section>

            <!-- Articles liés -->
            <section class="panel" x-show="corpusArt.lies && corpusArt.lies.length">
              <div class="panel-body">
                <div class="corp-sec-h"><span class="lbl" x-text="t('corpus.lies')"></span></div>
                <div class="corp-lies">
                  <template x-for="lid in corpusArt.lies" :key="lid">
                    <button class="corp-lie" x-show="corpusById(lid)" @click="openCorpus(lid)">
                      <span class="cd" :class="corpusById(lid) ? corpusById(lid).nature : ''"></span>
                      <span x-text="corpusById(lid) ? cL(corpusById(lid).titre) : ''"></span>
                    </button>
                  </template>
                </div>
              </div>
            </section>

            <div class="corp-meta">
              <span><b x-text="t('corpus.source')"></b> :
                <a class="corp-src" x-show="corpusArt.source.url" :href="corpusArt.source.url" target="_blank" rel="noopener" x-text="corpusArt.source.label+' ↗'"></a>
                <span x-show="!corpusArt.source.url" x-text="corpusArt.source.label"></span>
              </span>
              <span><b x-text="t('corpus.outil')"></b> : <span x-text="cL(corpusArt.outil)"></span></span>
              <span><b x-text="t('corpus.statut')"></b> : <span x-text="t('corpus.generic')"></span></span>
            </div>

          </div>
        </div>
      </aside>
    </div>
  </template>

  <template x-if="scenDrawer.open && scenView">
    <div>
      <div class="drawer-scrim" @click="closeScen()"></div>
      <aside class="drawer drawer--wide" role="dialog" aria-modal="true" :aria-label="scenView.scen.nom" @keydown.escape.window="closeScen()">
        <div class="drawer-head">
          <span class="drawer-title" x-text="scenView.scen.nom"></span>
          <span style="flex:1"></span>
          <button class="btn" :disabled="!can('update','threatScenarios',curScen)" @click="editScen()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20h4L19 9l-4-4L4 16v4Z"/><path d="M14 6l4 4"/></svg>
            <span x-text="t('btn.edit')"></span></button>
          <button class="btn" @click="goCorpus('corp-cti-scenario')" :title="t('nav.bibliotheque')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span x-text="t('corpus.more')"></span></button>
          <button class="icon-btn" @click="closeScen()" :aria-label="t('a11y.close')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg>
          </button>
        </div>
        <div class="drawer-body">
          <div style="display:flex;flex-direction:column;gap:14px">

            <div class="grid grid-kpi">
              <div class="kpi"><div class="kpi-label" x-text="t('cti.actor')"></div><div class="kpi-value" style="font-size:18px" x-text="scenView.scen.acteur||'—'"></div>
                <div class="kpi-foot"><span class="chip" :class="scenTypeClass(scenView.scen.type)" style="height:20px"><span class="dot"></span><span x-text="optLabel(scenView.scen.type)"></span></span></div></div>
              <div class="kpi"><div class="kpi-label" x-text="t('cti.ttps')"></div><div class="kpi-value" x-text="scenView.total"></div>
                <div class="kpi-foot"><span class="chip cyan" style="height:20px"><span class="dot"></span><span x-text="(scenView.scen.d3fend||[]).length+' D3FEND'"></span></span></div></div>
              <div class="kpi"><div class="kpi-label" x-text="t('cti.coverage')"></div><div class="kpi-value" x-text="scenView.pct+'%'"></div>
                <div class="kpi-foot"><span class="chip" :class="scenView.ctx?'violet':(scenView.gaps?'red':'green')" style="height:20px"><span class="dot"></span><span x-text="scenView.ctx? t('cti.ctxCov') : (scenView.gaps+' '+t('cti.gaps'))"></span></span></div></div>
              <div class="kpi"><div class="kpi-label" x-text="t('cti.usedBy')"></div><div class="kpi-value" x-text="scenView.allAudits.length"></div>
                <div class="kpi-foot"><span class="tlp-pill" :class="tlpClass(scenView.scen.tlp)" x-text="'TLP:'+scenView.scen.tlp"></span></div></div>
            </div>

            <!-- Identité CTI -->
            <section class="panel">
              <div class="panel-head"><span class="panel-title" x-text="t('panel.identity')"></span></div>
              <div class="panel-body">
                <dl class="dl">
                  <dt x-text="t('cti.actor')"></dt><dd x-text="scenView.scen.acteur||'—'"></dd>
                  <dt x-text="t('scen.objectif')"></dt><dd x-text="scenView.scen.objectif||'—'"></dd>
                  <dt x-text="t('scen.engagement')"></dt><dd><span class="chip violet" x-show="scenView.scen.engagement" x-text="optLabel(scenView.scen.engagement)"></span><span x-show="!scenView.scen.engagement">—</span></dd>
                  <dt x-text="t('scen.sophistication')"></dt><dd><span x-text="scenView.scen.sophistication? optLabel(scenView.scen.sophistication):'—'"></span></dd>
                  <dt x-text="t('cti.source')"></dt><dd x-text="scenView.scen.source||'—'"></dd>
                  <dt x-text="t('f.notes')"></dt><dd x-text="scenView.scen.notes||'—'"></dd>
                </dl>
              </div>
            </section>

            <!-- Mini-matrice MITRE (tactique → techniques) -->
            <section class="panel" x-show="(scenView.scen.techniques||[]).length">
              <div class="panel-head"><span class="badge-attck">ATT&CK</span><span class="panel-title" x-text="t('cti.matrix')"></span>
                <span class="spacer"></span><span class="note" x-text="(scenView.scen.techniques||[]).length+' '+t('scen.stepN')+' · '+scenMatrix(scenView.scen.techniques).length+' '+t('scen.tacN')"></span></div>
              <div class="panel-body">
                <div class="mtx">
                  <template x-for="col in scenMatrix(scenView.scen.techniques)" :key="col.tac">
                    <div class="mtx-col">
                      <div class="mtx-tac" x-text="tacName(col.tac)"></div>
                      <template x-for="tid in col.techs" :key="tid">
                        <div class="mtx-cell"><span class="mono-id" x-text="tid"></span><span class="mtx-name" x-text="techName(tid)"></span></div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </section>

            <!-- Étapes offensives -->
            <section class="panel" x-show="(scenView.scen.etapes||[]).length">
              <div class="panel-head"><span class="badge-attck">ATT&CK</span><span class="panel-title" x-text="t('scen.steps')"></span>
                <span class="spacer"></span><span class="chip gray data" x-text="(scenView.scen.etapes||[]).length"></span></div>
              <div class="panel-body" style="display:flex;flex-direction:column;gap:9px">
                <template x-for="(s,i) in (scenView.scen.etapes||[])" :key="s.id">
                  <div class="step-card">
                    <div class="step-top"><span class="num-circle" x-text="i+1"></span><span class="chip violet" x-text="tacName(s.tactique)"></span>
                      <span class="mono-id" x-text="s.technique"></span><span class="step-name" x-text="techName(s.technique)"></span></div>
                    <div class="step-cmd" x-show="s.commande"><span class="cmd-dollar">$</span><span x-text="s.commande"></span></div>
                    <div class="step-desc" x-show="s.description" x-text="s.description"></div>
                  </div>
                </template>
              </div>
            </section>

            <!-- D3FEND : contre-mesures nommées -->
            <section class="panel" x-show="(scenView.scen.d3fend||[]).length">
              <div class="panel-head"><span class="badge-d3fend">D3FEND</span><span class="panel-title" x-text="t('cti.countermeasures')"></span>
                <span class="spacer"></span><span class="chip green data" x-text="(scenView.scen.d3fend||[]).length"></span></div>
              <div class="panel-body">
                <div style="display:flex;flex-direction:column;gap:5px">
                  <template x-for="d in d3List(scenView.scen.d3fend)" :key="d.id">
                    <div class="d3-row"><span class="chip" :class="d.tone" x-text="d.cat"></span><span class="d3-name" x-text="d.name"></span><span class="mono-id" style="opacity:.8" x-text="d.id"></span></div>
                  </template>
                </div>
              </div>
            </section>

            <!-- Contexte d'utilisation (transitif : audits → applications → clients) -->
            <section class="panel">
              <div class="panel-head"><span class="panel-title" x-text="t('cti.usage')"></span>
                <span class="spacer"></span><span class="note" x-show="scenView.ctx" x-text="t('cti.filtered')"></span></div>
