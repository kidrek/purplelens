 source:{label:"Cahier des charges §0.A",url:""},
 outil:L("Principe directeur : se connecter, ne pas remplacer","Guiding principle: connect, don't replace"),
 keypoints:[
  L("L'outil stocke l'enrichissement parce qu'il alimente deux choses précises : le rapport client et le SLA de remédiation.","The tool stores enrichment because it feeds two precise things: the client report and the remediation SLA."),
  L("Le suivi de parc — inventaire, campagnes, tickets d'exploitation — reste sur le tracker VOC, vers lequel l'outil pointe.","Fleet tracking — inventory, campaigns, operations tickets — stays on the VOC tracker, to which the tool links."),
  L("Dupliquer ce suivi créerait deux vérités divergentes, exactement ce qu'un audit sanctionne.","Duplicating that tracking would create two diverging truths, exactly what an audit penalises.")],
 body:{prose:[
  L("Ce cockpit stocke l'enrichissement (CVSS, EPSS, KEV, SSVC, VEX) avec la vulnérabilité parce qu'il alimente deux choses très précises : le rapport client et le SLA de remédiation basé sur les standards. Ces deux usages justifient la persistance locale.","This cockpit stores enrichment (CVSS, EPSS, KEV, SSVC, VEX) with the vulnerability because it feeds two very precise things: the client report and the standards-based remediation SLA. These two uses justify local persistence."),
  L("Ce qu'il ne cherche pas à devenir, c'est le système de référence du suivi de parc : l'inventaire des actifs, les campagnes de correctifs, les tickets d'exploitation restent sur le tracker VOC, vers lequel l'outil établit un lien sortant plutôt que de dupliquer la donnée.","What it does not seek to become is the system of record for fleet tracking: the asset inventory, patch campaigns and operations tickets stay on the VOC tracker, to which the tool establishes an outbound link rather than duplicating the data."),
  L("La raison est la même que pour le TIP côté CTI : dupliquer un suivi vivant crée fatalement deux vérités qui divergent. La frontière — enrichir et prioriser ici, suivre le déploiement là-bas — est un choix d'architecture, pas une limite temporaire.","The reason is the same as for the TIP on the CTI side: duplicating a live tracking inevitably creates two diverging truths. The boundary — enrich and prioritise here, track deployment there — is an architectural choice, not a temporary limit.")]},
 aller:[],
 lies:["corp-voc-cycle","corp-voc-patch","corp-cti-tip"]},

{id:"corp-voc-preuves",nature:"metier",type:"mapping",profils:["voc","aud"],normes:[{id:"A.5.28",url:ISO_URL},{id:"A.8.24",url:ISO_URL}],hds:"SSI / PDP",
 titre:L("Preuves et éléments probants d'une vulnérabilité","Evidence and probative elements of a vulnerability"),
 resume:L("Intégrité, horodatage, conservation : ce qui rend une preuve recevable.","Integrity, timestamping, retention: what makes evidence admissible."),
 objectif:L("Produire des preuves qui tiennent dans le temps et devant un tiers, pas seulement des captures d'écran.","Produce evidence that holds over time and before a third party, not just screenshots."),
 source:{label:"ISO/IEC 27001",url:ISO_URL},
 outil:L("Preuves chiffrées AES-GCM · journal tamper-evident","AES-GCM-encrypted evidence · tamper-evident journal"),
 keypoints:[
  L("Une preuve utile montre le constat au moment où il se produit, avec un contexte identifiable (cible, compte, heure).","Useful evidence shows the finding at the moment it occurs, with an identifiable context (target, account, time)."),
  L("Sa valeur tient à la chaîne de conservation : qui l'a produite, quand, et la garantie qu'elle n'a pas été altérée.","Its value rests on the chain of custody: who produced it, when, and the guarantee it was not altered."),
  L("Tamper-evident n'est pas tamper-proof : l'altération se détecte, elle ne s'empêche pas — limite à connaître.","Tamper-evident is not tamper-proof: alteration is detected, not prevented — a limit to know.")],
 pieges:[
  L("Capturer sans contexte identifiable : une preuve sans cible ni horodatage est difficilement opposable.","Capturing without identifiable context: evidence with no target or timestamp is hard to rely on."),
  L("Confondre journal tamper-evident et coffre inviolable : le premier détecte, il ne bloque pas.","Confusing a tamper-evident journal with an inviolable vault: the former detects, it does not block.")],
 body:{prose:[
  L("Une preuve utile montre le constat au moment exact où il se produit : capture horodatée, sortie de commande brute, avec un contexte identifiable — cible, compte utilisé, heure. Une belle capture sans contexte n'est pas une preuve opposable.","Useful evidence shows the finding at the exact moment it occurs: timestamped capture, raw command output, with an identifiable context — target, account used, time. A nice screenshot without context is not admissible evidence."),
  L("Sa valeur juridique et technique tient à la chaîne de conservation : qui l'a produite, à quel moment, et la garantie qu'elle n'a pas été altérée après coup. C'est cette traçabilité, plus que le contenu lui-même, qui fait la recevabilité.","Its legal and technical value rests on the chain of custody: who produced it, when, and the guarantee it was not altered afterward. It is this traceability, more than the content itself, that makes it admissible."),
  L("Dans l'outil, les preuves sensibles se chiffrent (AES-GCM, clé dérivée d'une passphrase par PBKDF2) et le journal à chaînage détectable trace les manipulations. Une nuance à connaître : tamper-evident signifie que l'altération se détecte, pas qu'elle s'empêche — c'est une garantie de détection, pas d'inviolabilité.","In the tool, sensitive evidence is encrypted (AES-GCM, key derived from a passphrase via PBKDF2) and the chained, detectable journal traces manipulations. A nuance to know: tamper-evident means alteration is detected, not prevented — it is a guarantee of detection, not of inviolability.")]},
 aller:[],
 lies:["corp-aud-action","corp-aud-exploit","corp-mgr-conformite"]},
/* ==================== CTI ==================== */
{id:"corp-cti-sources",nature:"metier",type:"methodo",profils:["cti"],normes:[{id:"A.5.7",url:ISO_URL}],hds:"GRC / SSI",
 titre:L("Gérer ses sources de renseignement","Managing your intelligence sources"),
 resume:L("Typologie des sources et cotation de fiabilité (grille type Admiralty).","Source typology and reliability rating (Admiralty-style grid)."),
 objectif:L("Construire un dispositif de veille qui vaut par la complémentarité de ses sources, pas par leur volume.","Build a watch capability that is worth its sources' complementarity, not their volume."),
 source:{label:"CERT-FR",url:"https://cert.ssi.gouv.fr/"},
 outil:L("Champ source du scénario — entité Source dédiée : évolution proposée","Scenario source field — dedicated Source entity: proposed evolution"),
 keypoints:[
  L("Cinq familles de sources : OSINT, communautés fermées, feeds commerciaux, télémétrie propre, échanges bilatéraux CERT.","Five source families: OSINT, closed communities, commercial feeds, own telemetry, bilateral CERT exchanges."),
  L("La grille Admiralty croise deux axes indépendants : fiabilité de la source (A→F) et crédibilité de l'info (1→6).","The Admiralty grid crosses two independent axes: source reliability (A→F) and information credibility (1→6)."),
  L("Coter les deux évite le biais d'autorité : une source A peut sortir une info 4, une source D une info 2.","Rating both avoids the authority bias: an A source can produce a 4 info, a D source a 2 info.")],
 pieges:[
  L("Confondre volume et valeur : trois feeds redondants n'apportent pas plus qu'un seul bien exploité.","Confusing volume and value: three redundant feeds add no more than one well exploited."),
  L("Croire à un recoupement quand trois articles citent en réalité le même rapport source.","Believing in corroboration when three articles actually cite the same source report.")],
 body:{prose:[
  L("Les sources de renseignement se répartissent en grandes familles au profil très différent : l'OSINT (publications, blogs techniques, réseaux), les communautés fermées (ISAC sectoriels, cercles de confiance), les feeds commerciaux, la télémétrie propre à l'organisation, et les échanges bilatéraux entre CERT. Chacune a son équilibre coût / fraîcheur / fiabilité : la valeur d'un dispositif de veille tient à leur combinaison, jamais au seul volume.","Intelligence sources fall into broad families with very different profiles: OSINT (publications, technical blogs, social networks), closed communities (sector ISACs, trust circles), commercial feeds, the organisation's own telemetry, and bilateral CERT exchanges. Each has its own cost / freshness / reliability balance: a watch capability's value lies in their combination, never in volume alone."),
  L("La cotation de type Admiralty structure cette évaluation en croisant deux axes strictement indépendants. Le premier note la fiabilité de la source elle-même, de A (toujours fiable) à F (fiabilité inévaluable). Le second note la crédibilité de l'information rapportée, de 1 (confirmée par d'autres sources) à 6 (invérifiable).","The Admiralty-style rating structures this assessment by crossing two strictly independent axes. The first rates the reliability of the source itself, from A (always reliable) to F (reliability cannot be judged). The second rates the credibility of the reported information, from 1 (confirmed by other sources) to 6 (cannot be verified)."),
  L("L'intérêt de croiser ces deux axes est d'échapper au biais d'autorité : une source habituellement fiable (A) peut produire une information douteuse (4), et une source médiocre (D) peut sortir une information rapidement confirmée (2). Coter les deux séparément force l'analyste à ne pas déduire la qualité de l'info du prestige de la source.","The point of crossing these two axes is to escape the authority bias: a usually reliable source (A) can produce dubious information (4), and a mediocre source (D) can put out quickly confirmed information (2). Rating both separately forces the analyst not to infer the info's quality from the source's prestige.")],
 table:{head:[L("Axe (indépendant)","Axis (independent)"),L("Échelle","Scale")],rows:[
  ["violet",L("Fiabilité de la source","Source reliability"),L("A (fiable) → F (inévaluable)","A (reliable) → F (cannot judge)")],
  ["cyan",L("Crédibilité de l'information","Information credibility"),L("1 (confirmée) → 6 (invérifiable)","1 (confirmed) → 6 (cannot verify)")]]}},
 aller:[{label:L("CERT-FR — publications","CERT-FR — publications"),url:"https://cert.ssi.gouv.fr/"}],
 lies:["corp-cti-cycle","corp-cti-qualif"]},

{id:"corp-cti-cycle",nature:"processus",type:"methodo",profils:["cti"],normes:[{id:"A.5.7",url:ISO_URL}],hds:"GRC",
 titre:L("Le cycle du renseignement","The intelligence cycle"),
 resume:L("De la donnée brute au renseignement actionnable — et la place des IOC/IOA.","From raw data to actionable intelligence — and where IOCs/IOAs fit."),
 objectif:L("Voir la veille comme un cycle piloté par un besoin, pas comme une collecte tous azimuts.","See the watch as a cycle driven by a need, not an all-directions collection."),
 quand:L("En continu ; chaque tour est déclenché par une expression de besoin des consommateurs (Purple, SOC, direction).","Continuously; each turn is triggered by a need expressed by consumers (Purple, SOC, management)."),
 source:{label:"CERT-FR",url:"https://cert.ssi.gouv.fr/"},
 outil:L("Champs IOC/IOA du scénario (contexte) · la gestion d'IOC reste sur le TIP","Scenario IOC/IOA fields (context) · IOC management stays on the TIP"),
 keypoints:[
  L("Le cycle part d'un besoin (orientation) et y revient (diffusion) : sans besoin exprimé, la collecte tourne à vide.","The cycle starts from a need (direction) and returns to it (dissemination): with no expressed need, collection runs empty."),
  L("La phase Analyse est celle qui transforme la donnée en connaissance : acteur → TTP → scénario.","The Analysis phase is the one that turns data into knowledge: actor → TTP → scenario."),
  L("Les IOC vivent sur le TIP (flux) ; le scénario stabilisé peut vivre au catalogue de l'outil.","IOCs live on the TIP (flow); the stabilised scenario can live in the tool's catalog.")],
 loop:L("↺ le retour des consommateurs (Purple, SOC) réoriente l'expression de besoin du cycle suivant.","↺ consumer feedback (Purple, SOC) reorients the next cycle's need."),
 body:{stages:[
  {t:L("Orientation","Direction"),d:L("Expression de besoin : quelles menaces, pour quels périmètres, pour quels consommateurs.","Need expression: which threats, for which scopes, for which consumers.")},
  {t:L("Collecte","Collection"),d:L("Sources ouvertes, fermées, télémétrie — tracées et cotées.","Open, closed sources, telemetry — traced and rated.")},
  {t:L("Traitement","Processing"),d:L("Normalisation, déduplication, structuration (STIX sur le TIP).","Normalisation, deduplication, structuring (STIX on the TIP).")},
  {t:L("Analyse","Analysis"),d:L("Corrélation, attribution prudente, transformation en connaissance : acteur → TTP → scénario.","Correlation, cautious attribution, transformation into knowledge: actor → TTP → scenario."),dec:L("confiance suffisante ?","sufficient confidence?")},
  {t:L("Diffusion","Dissemination"),d:L("Produits finis marqués TLP/PAP, adaptés au destinataire (scénario pour le Purple, IOC pour le SOC).","Finished products marked TLP/PAP, tailored to the recipient (scenario for Purple, IOCs for the SOC).")}]},
 aller:[],
 lies:["corp-cti-sources","corp-cti-qualif","corp-cti-scenario"]},

{id:"corp-cti-qualif",nature:"metier",type:"methodo",profils:["cti"],normes:[],hds:"",
 titre:L("Qualifier et coter la donnée de veille","Qualifying and rating watch data"),
 resume:L("Niveaux de confiance et pièges cognitifs de l'analyste.","Confidence levels and the analyst's cognitive traps."),
 objectif:L("Faire voyager le niveau de confiance avec l'information, pour qu'un « possible » ne se présente jamais comme un « confirmé ».","Make the confidence level travel with the information, so a \"possible\" never presents as a \"confirmed\"."),
 source:{label:"CERT-FR",url:"https://cert.ssi.gouv.fr/"},
 outil:L("Notes et source du scénario","Scenario notes and source"),
 keypoints:[
  L("Une échelle explicite — confirmé / probable / possible — doit accompagner chaque information jusqu'au produit final.","An explicit scale — confirmed / probable / possible — must accompany each piece of information to the final product."),
  L("Le recoupement n'a de valeur que par des sources réellement indépendantes.","Corroboration only has value through genuinely independent sources."),
  L("Trois biais à contrer en permanence : confirmation, ancrage, autorité.","Three biases to counter constantly: confirmation, anchoring, authority.")],
 pieges:[
  L("Laisser un scénario bâti sur du « possible » se présenter comme du « confirmé » une fois mis en forme.","Letting a scenario built on \"possible\" present as \"confirmed\" once formatted."),
  L("Surpondérer une source prestigieuse non recoupée (biais d'autorité).","Over-weighting a prestigious, uncorroborated source (authority bias).")],
 body:{prose:[
  L("Une information de veille se qualifie sur une échelle explicite — confirmé (recoupé par des sources indépendantes), probable (source solide mais non recoupée), possible (indice isolé) — et cette qualification doit voyager avec l'information tout au long de son traitement. Un scénario construit sur du « possible » ne doit jamais se présenter comme du « confirmé » une fois mis en forme.","Watch information is qualified on an explicit scale — confirmed (corroborated by independent sources), probable (solid source but uncorroborated), possible (isolated clue) — and this qualification must travel with the information throughout its processing. A scenario built on \"possible\" must never present as \"confirmed\" once formatted."),
  L("Trois biais cognitifs guettent l'analyste. Le biais de confirmation : ne retenir que ce qui valide l'hypothèse de départ. L'ancrage : rester fixé sur la première attribution, même quand les indices s'accumulent contre elle. Le biais d'autorité : surpondérer une source prestigieuse simplement parce qu'elle est prestigieuse, sans la recouper.","Three cognitive biases lie in wait for the analyst. Confirmation bias: retaining only what validates the initial hypothesis. Anchoring: staying fixed on the first attribution, even as clues pile up against it. Authority bias: over-weighting a prestigious source simply because it is prestigious, without corroborating it."),
  L("L'antidote reste le recoupement par des sources réellement indépendantes — pas trois articles qui citent tous le même rapport initial. Cette indépendance des sources est ce qui distingue un « confirmé » solide d'une rumeur bien relayée.","The antidote remains corroboration by genuinely independent sources — not three articles all citing the same initial report. This source independence is what distinguishes a solid \"confirmed\" from a well-relayed rumour.")]},
 aller:[],
 lies:["corp-cti-sources","corp-cti-cycle"]},

{id:"corp-cti-tlp",nature:"metier",type:"mapping",profils:["cti","mgr"],normes:[{id:"A.5.34",url:ISO_URL}],hds:"PDP",
 titre:L("TLP 2.0 — Traffic Light Protocol","TLP 2.0 — Traffic Light Protocol"),
 resume:L("Les cinq niveaux de diffusion et les règles de repartage.","The five sharing levels and the re-sharing rules."),
 objectif:L("Marquer correctement la diffusion d'une information — à qui elle peut aller — sans confondre avec son usage.","Correctly mark an information's distribution — who it can go to — without confusing it with its use."),
 source:{label:"FIRST — TLP",url:"https://www.first.org/tlp/"},
 outil:L("Marquage TLP présent sur toutes les entités sensibles de l'outil","TLP marking present on all sensitive entities of the tool"),
 keypoints:[
  L("Le TLP borne la diffusion, pas l'usage : c'est le PAP qui borne les actions permises.","TLP bounds distribution, not use: it is PAP that bounds permitted actions."),
  L("Version 2.0 : WHITE devient CLEAR, et AMBER+STRICT restreint à l'organisation seule (sans les clients).","Version 2.0: WHITE becomes CLEAR, and AMBER+STRICT restricts to the organisation alone (without clients)."),
  L("Hors GREEN et CLEAR, un destinataire ne repartage jamais de lui-même : il repasse par la source.","Beyond GREEN and CLEAR, a recipient never re-shares on their own: they go back through the source.")],
 pieges:[
  L("Traiter le TLP comme un contrôle d'accès technique : c'est une convention de confiance, pas un verrou.","Treating TLP as a technical access control: it is a trust convention, not a lock."),
  L("Repartager du TLP:AMBER à un tiers sans autorisation de la source d'origine.","Re-sharing TLP:AMBER to a third party without the original source's authorisation.")],
 body:{prose:[
  L("Le TLP borne la diffusion d'une information — à qui peut-on la transmettre — mais pas son usage, qui relève du PAP. La version 2.0 publiée par le FIRST apporte deux changements notables : WHITE est renommé CLEAR, et un nouveau niveau AMBER+STRICT restreint le partage à la seule organisation du destinataire, sans ses clients.","TLP bounds an information's distribution — to whom it can be passed — but not its use, which falls to PAP. Version 2.0 published by FIRST brings two notable changes: WHITE is renamed CLEAR, and a new AMBER+STRICT level restricts sharing to the recipient's organisation alone, without its clients."),
  L("La règle de repartage est le cœur du protocole : hors GREEN et CLEAR, un destinataire ne repartage pas de lui-même l'information reçue. S'il a besoin de l'étendre, il repasse par la source d'origine, qui autorise ou prend elle-même en charge la diffusion.","The re-sharing rule is the heart of the protocol: beyond GREEN and CLEAR, a recipient does not re-share received information on their own. If they need to extend it, they go back through the original source, which authorises or handles the distribution itself."),
  L("Point à ne jamais perdre de vue : le TLP est une convention de confiance, pas un contrôle technique. Dans l'outil, il guide le cloisonnement par client et le marquage des exports, mais il ne remplace ni le chiffrement des données ni les habilitations d'accès.","A point never to lose sight of: TLP is a trust convention, not a technical control. In the tool, it guides per-client partitioning and export marking, but it replaces neither data encryption nor access permissions.")],
 table:{head:[L("Niveau","Level"),L("Périmètre de diffusion","Distribution scope")],rows:[
  ["red","TLP:RED",L("Destinataires nommés uniquement, pas de repartage.","Named recipients only, no re-sharing.")],
  ["amber","TLP:AMBER+STRICT",L("Organisation du destinataire uniquement.","Recipient's organisation only.")],
  ["amber","TLP:AMBER",L("Organisation + clients, au besoin d'en connaître.","Organisation + clients, on a need-to-know basis.")],
  ["green","TLP:GREEN",L("Communauté élargie, pas de canaux publics.","Broader community, no public channels.")],
  ["gray","TLP:CLEAR",L("Diffusion libre.","Free distribution.")]]}},
 aller:[{label:L("FIRST — Standard TLP 2.0","FIRST — TLP 2.0 Standard"),url:"https://www.first.org/tlp/"}],
 lies:["corp-cti-pap","corp-cti-qualif"]},

{id:"corp-cti-pap",nature:"metier",type:"methodo",profils:["cti"],normes:[],hds:"",
 titre:L("PAP — Permissible Actions Protocol","PAP — Permissible Actions Protocol"),
 resume:L("Quelles actions mener sur une donnée sans révéler l'investigation à l'attaquant.","Which actions to take on data without revealing the investigation to the attacker."),
 objectif:L("Décider quelles actions sont permises sur un indicateur sans risquer d'alerter l'acteur sous surveillance.","Decide which actions are permitted on an indicator without risking alerting the actor under surveillance."),
 source:{label:"MISP taxonomies (CIRCL, 2016)",url:"https://www.misp-project.org/taxonomies.html"},
 outil:L("Aucun champ PAP actuellement — évolution proposée à côté du TLP","No PAP field currently — proposed evolution alongside TLP"),
 keypoints:[
  L("Le TLP dit à qui partager ; le PAP dit quoi faire de l'information sans exposer l'analyse.","TLP says who to share with; PAP says what to do with the information without exposing the analysis."),
  L("Conçu pour l'analyste opérationnel : requêter un tiers ou sonder une infra adverse sont des actions visibles.","Designed for the operational analyst: querying a third party or probing adversary infra are visible actions."),
  L("Se lit toujours à côté du TLP : une donnée TLP:GREEN peut imposer un usage PAP:RED.","Always read alongside TLP: a TLP:GREEN datum can impose PAP:RED usage.")],
 pieges:[
  L("Interroger un service de réputation public sur un IOC en PAP:RED : la requête peut être vue par l'adversaire.","Querying a public reputation service on a PAP:RED IOC: the query can be seen by the adversary."),
  L("Oublier que l'enrichissement automatique (DNS, SIEM) peut déclencher des requêtes externes non voulues.","Forgetting that automatic enrichment (DNS, SIEM) can trigger unwanted external queries.")],
 body:{prose:[
  L("Le TLP indique à qui partager une information ; le PAP répond à une question différente et complémentaire : quoi faire de cette information sans exposer l'analyse en cours. Introduit en 2016 dans les taxonomies MISP — maintenues par le CIRCL, la même origine que l'enrichissement CVE de ce cockpit — il est pensé pour l'analyste opérationnel.","TLP indicates who to share information with; PAP answers a different, complementary question: what to do with that information without exposing the ongoing analysis. Introduced in 2016 in the MISP taxonomies — maintained by CIRCL, the same origin as this cockpit's CVE enrichment — it is designed for the operational analyst."),
  L("La logique est celle de la détectabilité de l'action. Requêter un service de réputation tiers sur un indicateur, sonder une infrastructure adverse, bloquer un flux : ce sont des actions potentiellement visibles qui peuvent alerter l'acteur surveillé qu'une investigation est en cours. Le PAP gradue ce que l'on s'autorise, du purement passif à l'entièrement libre.","The logic is that of action detectability. Querying a third-party reputation service on an indicator, probing an adversary infrastructure, blocking a flow: these are potentially visible actions that can alert the watched actor that an investigation is underway. PAP grades what you allow yourself, from purely passive to entirely free."),
  L("Il se lit toujours à côté du TLP : les deux marquages sont indépendants. Une donnée largement partageable (TLP:GREEN) peut parfaitement imposer une extrême prudence d'usage (PAP:RED) si toute action visible risquerait de compromettre l'opération.","It is always read alongside TLP: the two markings are independent. Widely shareable data (TLP:GREEN) can perfectly well impose extreme usage caution (PAP:RED) if any visible action would risk compromising the operation.")],
 table:{head:[L("Niveau","Level"),L("Actions permises","Permitted actions")],rows:[
  ["red","PAP:RED",L("Actions non détectables uniquement — analyse passive sur ses propres journaux.","Non-detectable actions only — passive analysis on one's own logs.")],
  ["amber","PAP:AMBER",L("Vérifications passives via des tiers (services de réputation).","Passive checks via third parties (reputation services).")],
  ["green","PAP:GREEN",L("Actions actives : sonder, bloquer, interagir via leurre.","Active actions: probe, block, interact via decoy.")],
  ["gray","PAP:WHITE",L("Aucune restriction d'usage.","No usage restriction.")]]}},
 aller:[{label:L("MISP — taxonomie PAP","MISP — PAP taxonomy"),url:"https://www.misp-project.org/taxonomies.html"}],
 lies:["corp-cti-tlp","corp-cti-cycle"]},

{id:"corp-cti-stix",nature:"metier",type:"methodo",profils:["cti"],normes:[],hds:"",
 titre:L("STIX 2.1 : structurer un scénario pour l'échange","STIX 2.1: structuring a scenario for exchange"),
 resume:L("Le périmètre d'interchange de l'outil : le scénario, pas les IOC.","The tool's interchange scope: the scenario, not the IOCs."),
 objectif:L("Comprendre ce que l'outil importe et exporte en STIX — la connaissance d'acteur, pas le flux d'indicateurs.","Understand what the tool imports and exports in STIX — actor knowledge, not the indicator flow."),
 source:{label:"OASIS STIX 2.1",url:"https://docs.oasis-open.org/cti/stix/v2.1/stix-v2.1.html"},
 outil:L("Import/export STIX 2.1 du scénario (intrusion-set + attack-pattern)","STIX 2.1 scenario import/export (intrusion-set + attack-pattern)"),
 keypoints:[
  L("STIX modélise la menace en objets liés : intrusion-set (acteur), attack-pattern (techniques), relationship (liens).","STIX models the threat as linked objects: intrusion-set (actor), attack-pattern (techniques), relationship (links)."),
  L("L'outil échange le sous-ensemble scénario ; les indicateurs restent sur le TIP.","The tool exchanges the scenario subset; indicators stay on the TIP."),
  L("Import STIX = amorcer un scénario depuis un TIP ; export = restituer un scénario créé dans l'outil.","STIX import = seed a scenario from a TIP; export = hand back a scenario created in the tool.")],
 body:{prose:[
  L("STIX 2.1 modélise la connaissance de menace en objets liés : l'intrusion-set représente l'acteur, l'attack-pattern représente ses techniques (mappées sur ATT&CK), et les objets relationship expriment les liens entre eux. C'est un langage d'échange standardisé, lisible par machine.","STIX 2.1 models threat knowledge as linked objects: the intrusion-set represents the actor, the attack-pattern represents its techniques (mapped to ATT&CK), and relationship objects express the links between them. It is a standardised, machine-readable exchange language."),
  L("C'est précisément ce sous-ensemble — acteur et techniques — que l'outil sait importer depuis un TIP pour amorcer un scénario, et exporter pour restituer un scénario créé ici. L'interchange se fait au niveau de la connaissance stabilisée sur l'adversaire.","It is precisely this subset — actor and techniques — that the tool can import from a TIP to seed a scenario, and export to hand back a scenario created here. The interchange happens at the level of stabilised knowledge about the adversary."),
  L("Les indicateurs (indicator, observable) restent volontairement hors périmètre : leur cycle de vie — fraîcheur, faux positifs, expiration — appartient au TIP. L'outil consomme la connaissance stabilisée sur l'acteur, pas le flux d'indicateurs qui, lui, se périme vite.","Indicators (indicator, observable) deliberately stay out of scope: their lifecycle — freshness, false positives, expiry — belongs to the TIP. The tool consumes stabilised knowledge about the actor, not the indicator flow, which expires quickly.")]},
 aller:[{label:"OASIS — STIX 2.1",url:"https://docs.oasis-open.org/cti/stix/v2.1/stix-v2.1.html"}],
 lies:["corp-cti-scenario","corp-cti-tip"]},

{id:"corp-cti-modeles",nature:"metier",type:"methodo",profils:["cti"],normes:[],hds:"",
 titre:L("Modèles d'analyse : Diamond, Kill Chain, VERIS","Analysis models: Diamond, Kill Chain, VERIS"),
 resume:L("Trois cadres complémentaires d'ATT&CK, chacun pour une question différente.","Three frameworks complementary to ATT&CK, each for a different question."),
 objectif:L("Savoir quel cadre d'analyse sortir selon la question — pivoter, ordonner une chaîne, ou capitaliser un incident.","Know which analysis framework to reach for by the question — pivot, order a chain, or capitalise an incident."),
 source:{label:"Lockheed Martin — Cyber Kill Chain",url:"https://www.lockheedmartin.com/en-us/capabilities/cyber/cyber-kill-chain.html"},
 outil:L("Backlog v4.7 — enrichissement futur du drawer Scénario","Backlog v4.7 — future enrichment of the Scenario drawer"),
 keypoints:[
  L("Diamond Model : quatre sommets (adversaire, capacité, infrastructure, victime) — idéal pour pivoter en investigation.","Diamond Model: four vertices (adversary, capability, infrastructure, victim) — ideal for pivoting in investigation."),
  L("Cyber Kill Chain : sept étapes séquentielles — utile pour raisonner « où casser la chaîne ».","Cyber Kill Chain: seven sequential stages — useful to reason \"where to break the chain\"."),
  L("VERIS : structure l'incident (acteur, action, actif, attribut) — pour la comparabilité statistique.","VERIS: structures the incident (actor, action, asset, attribute) — for statistical comparability.")],
 body:{prose:[
  L("Le Diamond Model analyse un événement d'intrusion par quatre sommets — adversaire, capacité, infrastructure, victime — et les relations entre eux. Sa force est le pivot : à partir d'une infrastructure connue, on remonte aux capacités, puis à d'autres victimes. C'est le modèle de l'investigation.","The Diamond Model analyses an intrusion event through four vertices — adversary, capability, infrastructure, victim — and the relationships between them. Its strength is the pivot: from a known infrastructure, you trace back to capabilities, then to other victims. It is the model of investigation."),
  L("La Cyber Kill Chain découpe l'intrusion en sept étapes séquentielles, de la reconnaissance à l'action sur objectif. Elle est utile pour raisonner défense : à chaque étape correspond une opportunité de « casser la chaîne ». VERIS, de son côté, structure la description d'un incident selon quatre axes (acteur, action, actif, attribut) dans un but de comparabilité statistique entre incidents.","The Cyber Kill Chain splits the intrusion into seven sequential stages, from reconnaissance to action on objective. It is useful to reason about defence: each stage is an opportunity to \"break the chain\". VERIS, for its part, structures an incident's description along four axes (actor, action, asset, attribute) for statistical comparability across incidents."),
  L("ATT&CK reste le langage des techniques ; ces trois modèles apportent la grammaire de l'analyse, chacun pour un usage. En pratique Purple : la Kill Chain pour ordonner une chaîne d'attaque, le Diamond pour documenter un acteur en profondeur, VERIS pour capitaliser et comparer les incidents dans le temps.","ATT&CK remains the language of techniques; these three models bring the grammar of analysis, each for a use. In Purple practice: the Kill Chain to order an attack chain, the Diamond to document an actor in depth, VERIS to capitalise and compare incidents over time.")],
 table:{head:[L("Modèle","Model"),L("Usage de prédilection","Preferred use")],rows:[
  ["violet","Diamond Model",L("Pivot en investigation","Pivot in investigation")],
  ["cyan","Cyber Kill Chain",L("Ordonner une chaîne / casser la chaîne","Order a chain / break the chain")],
  ["amber","VERIS",L("Capitaliser et comparer les incidents","Capitalise and compare incidents")]]}},
 aller:[{label:"VERIS",url:"https://verisframework.org/"}],
 lies:["corp-cti-scenario","corp-aud-chaine"]},

{id:"corp-cti-scenario",nature:"procedure",type:"methodo",profils:["cti"],normes:[{id:"A.5.7",url:ISO_URL}],hds:"GRC",
 titre:L("Construire un scénario de menace pour le catalogue","Building a threat scenario for the catalog"),
 resume:L("Du renseignement brut au scénario réutilisable du catalogue global.","From raw intelligence to a reusable scenario in the global catalog."),
 objectif:L("Transformer un renseignement d'acteur en un scénario réutilisable, versé au catalogue global et rattachable à tout audit.","Turn actor intelligence into a reusable scenario, added to the global catalog and attachable to any audit."),
 quand:L("Quand un acteur pertinent émerge (menace sectorielle, incident marquant, acteur suivi) et mérite d'être émulable.","When a relevant actor emerges (sector threat, notable incident, tracked actor) and is worth being emulable."),
 source:{label:"attack.mitre.org",url:"https://attack.mitre.org/"},
 outil:L("Éditeur de scénario · catalogue CTI global (non cloisonné par client)","Scenario editor · global CTI catalog (not partitioned by client)"),
 keypoints:[
  L("Chaque TTP retenue doit être sourcée — rattachable à du renseignement, pas à l'intuition.","Each chosen TTP must be sourced — traceable to intelligence, not intuition."),
  L("Le scénario naît global : son rattachement à un client vient plus tard, au cadrage d'un audit.","The scenario is born global: its attachment to a client comes later, at an audit's scoping."),
  L("Les IOC/IOA restent du contexte libre ; leur source de vérité demeure le TIP.","IOCs/IOAs stay as free context; their source of truth remains the TIP.")],
 pieges:[
  L("Cloisonner le scénario par client dès la création : il perd sa réutilisabilité de catalogue.","Partitioning the scenario by client at creation: it loses its catalog reusability."),
  L("Mélanger scénario et flux d'IOC : le premier est stable, le second se périme.","Mixing scenario and IOC flow: the former is stable, the latter expires.")],
 body:{steps:[
  {t:L("Partir d'un besoin : acteur pertinent pour les clients suivis, menace sectorielle, incident marquant.","Start from a need: actor relevant to tracked clients, sector threat, notable incident."),r:"CTI",out:L("Justification du scénario établie.","Scenario justification established.")},
  {t:L("Documenter l'acteur émulé et l'objectif du scénario (que démontre-t-on ?).","Document the emulated actor and the scenario's objective (what do we demonstrate?)."),r:"CTI",out:L("Identité et objectif du scénario.","Scenario identity and objective.")},
  {t:L("Sélectionner les TTP sourcées — chaque technique rattachable à du renseignement.","Select sourced TTPs — each technique traceable to intelligence."),r:"CTI",out:L("Chaîne de TTP justifiées.","Chain of justified TTPs.")},
  {t:L("Ordonner les étapes en chaîne jouable et calibrer la sophistication.","Order the steps into a playable chain and calibrate the sophistication."),r:"CTI + Red",out:L("Chaîne séquencée et calibrée.","Sequenced, calibrated chain.")},

{id:"corp-cti-tip",nature:"metier",type:"mapping",profils:["cti","mgr"],normes:[],hds:"Organisation & prestation",
 titre:L("Frontière outil / TIP","Boundary: tool / TIP"),
 resume:L("La gestion d'IOC et des feeds reste sur le TIP ; l'outil consomme le scénario stabilisé.","IOC and feed management stays on the TIP; the tool consumes the stabilised scenario."),
 objectif:L("Poser la frontière entre le flux (TIP) et la connaissance stabilisée (catalogue de scénarios).","Set the boundary between the flow (TIP) and stabilised knowledge (scenario catalog)."),
 source:{label:"Cahier des charges §0.A",url:""},
 outil:L("Principe directeur : se connecter, ne pas remplacer","Guiding principle: connect, don't replace"),
 keypoints:[
  L("Tout ce qui a un cycle de vie de flux (fraîcheur, expiration, faux positifs) vit sur le TIP.","Everything with a flow lifecycle (freshness, expiry, false positives) lives on the TIP."),
  L("Tout ce qui est connaissance stabilisée et réutilisable (acteur, chaîne de TTP) peut vivre au catalogue.","Everything that is stabilised, reusable knowledge (actor, TTP chain) can live in the catalog."),
  L("L'outil s'interface en STIX — import et export de scénario — sans dupliquer les fonctions du TIP.","The tool interfaces via STIX — scenario import and export — without duplicating the TIP's functions.")],
 body:{prose:[
  L("Le TIP (MISP, OpenCTI…) est le système de référence de la CTI : ingestion de feeds, gestion des indicateurs, corrélation, partage TAXII. C'est là que vit l'opérationnel de la menace, avec son rythme rapide et ses faux positifs à trier.","The TIP (MISP, OpenCTI…) is the CTI system of record: feed ingestion, indicator management, correlation, TAXII sharing. That is where the threat's operational side lives, with its fast pace and false positives to sort."),
  L("Ce cockpit s'y interface — import STIX d'un scénario pour l'amorcer, export d'un scénario créé ici — sans chercher à dupliquer ces fonctions. Il consomme la connaissance stabilisée sur l'adversaire, pas le flux d'indicateurs.","This cockpit interfaces with it — STIX import of a scenario to seed it, export of a scenario created here — without seeking to duplicate those functions. It consumes stabilised knowledge about the adversary, not the indicator flow."),
  L("Le critère de frontière est simple et se généralise : tout ce qui a un cycle de vie de flux — fraîcheur, expiration, faux positifs — vit sur le TIP ; tout ce qui est connaissance stabilisée et réutilisable — acteur, chaîne de TTP, contre-mesures — peut vivre au catalogue de scénarios de l'outil.","The boundary criterion is simple and generalises: everything with a flow lifecycle — freshness, expiry, false positives — lives on the TIP; everything that is stabilised, reusable knowledge — actor, TTP chain, countermeasures — can live in the tool's scenario catalog.")]},
 aller:[],
 lies:["corp-cti-stix","corp-cti-scenario","corp-voc-frontiere"]},

{id:"corp-mgr-conformite",nature:"metier",type:"mapping",profils:["mgr"],normes:[{id:"A.5.35",url:ISO_URL},{id:"A.5.36",url:ISO_URL},{id:"A.8.29",url:ISO_URL}],hds:"GRC",
 titre:L("Ce que les activités Purple prouvent en audit ISO 27001 / HDS","What Purple activities prove in an ISO 27001 / HDS audit"),
 resume:L("Lecture croisée : chaque donnée produite par l'outil comme élément de preuve.","Cross-reading: each datum the tool produces as an element of evidence."),
 objectif:L("Transformer l'activité Purple en éléments de preuve mobilisables devant un auditeur, sans confondre preuve et procédure approuvée.","Turn Purple activity into evidence usable before an auditor, without confusing evidence and approved procedure."),
 source:{label:"ISO/IEC 27001",url:ISO_URL},
 outil:L("Cockpit · historique d'audits · KPI · journal tamper-evident","Cockpit · audit history · KPIs · tamper-evident journal"),
 keypoints:[
  L("L'outil fournit la donnée qui atteste un contrôle ; la procédure approuvée, elle, vit dans le SMSI de l'organisation.","The tool provides the data attesting a control; the approved procedure lives in the organisation's ISMS."),
  L("Un même exercice Purple alimente plusieurs contrôles à la fois (test, revue indépendante, détection).","A single Purple exercise feeds several controls at once (testing, independent review, detection)."),
  L("Le corpus fournit des points de départ exportables, jamais la version officielle des procédures.","The corpus provides exportable starting points, never the official version of the procedures.")],
 body:{prose:[
  L("Les exercices et audits tracés dans l'outil constituent des éléments de preuve directs pour plusieurs contrôles de l'Annexe A d'ISO 27001 : les tests de sécurité récurrents (A.8.29), la revue indépendante de la sécurité (A.5.35), la gestion des vulnérabilités techniques (A.8.8), les activités de surveillance et de détection (A.8.16), la collecte de preuves (A.5.28). Côté HDS, ces mêmes activités alimentent les domaines GRC, SSI/MCO et MII.","The exercises and audits traced in the tool constitute direct evidence for several ISO 27001 Annex A controls: recurring security testing (A.8.29), independent security review (A.5.35), technical vulnerability management (A.8.8), monitoring and detection activities (A.8.16), evidence collection (A.5.28). On the HDS side, these same activities feed the GRC, SSI/MCO and MII domains."),
  L("Le principe à retenir tient en une phrase : l'article de corpus explique l'exigence, l'outil fournit la donnée qui en atteste — mais la procédure approuvée, elle, vit dans le SMSI de l'organisation. Le corpus fournit des gabarits exportables comme points de départ, jamais la version officielle et vivante du document.","The principle to remember fits in one sentence: the corpus article explains the requirement, the tool provides the data attesting it — but the approved procedure lives in the organisation's ISMS. The corpus provides exportable templates as starting points, never the official, living version of the document."),
  L("Cette séparation est ce qui évite le piège classique de l'audit : deux versions divergentes d'une même procédure. L'outil prouve l'activité ; l'organisation détient la doctrine.","This separation is what avoids the classic audit trap: two diverging versions of the same procedure. The tool proves the activity; the organisation holds the doctrine.")],
 table:{head:[L("Contrôle","Control"),L("Preuve produite par l'outil","Evidence produced by the tool")],rows:[
  ["violet","A.8.29",L("Audits catégorisés, jalons PTES, AuditActions","Categorised audits, PTES milestones, AuditActions")],
  ["cyan","A.8.8",L("Vulnérabilités enrichies, SLA P1–P4, tickets","Enriched vulnerabilities, P1–P4 SLA, tickets")],
  ["green","A.8.16",L("Verdicts d'étape, MTTD/MTTR, angles morts","Step verdicts, MTTD/MTTR, blind spots")],
  ["amber","A.5.28",L("Preuves chiffrées, journal tamper-evident","Encrypted evidence, tamper-evident journal")],
  ["gray","A.5.35",L("Historique d'exercices, KPI de tendance","Exercise history, trend KPIs")]]}},
 aller:[],
 lies:["corp-mgr-incidents","corp-voc-sla","corp-aud-categories"]},

{id:"corp-mgr-incidents",nature:"processus",type:"mapping",profils:["mgr","cti"],normes:[{id:"A.5.24",url:ISO_URL},{id:"A.5.25",url:ISO_URL},{id:"A.5.26",url:ISO_URL},{id:"A.5.27",url:ISO_URL}],hds:"MII",
 titre:L("Gestion des incidents de sécurité — le cycle et l'articulation Red/Blue","Security incident management — the cycle and the Red/Blue articulation"),
 resume:L("Préparation, détection, réponse, enseignements : où l'exercice Purple s'insère.","Preparation, detection, response, lessons: where the Purple exercise fits in."),
 objectif:L("Situer l'exercice Purple comme un test à froid du dispositif d'incident, et faire des enseignements le moteur du cycle suivant.","Position the Purple exercise as a cold test of the incident capability, and make lessons the engine of the next cycle."),
 quand:L("Le cycle tourne en continu ; l'exercice Purple s'y greffe pour éprouver préparation et détection sans incident réel.","The cycle runs continuously; the Purple exercise grafts onto it to test preparation and detection without a real incident."),
 source:{label:"ISO/IEC 27001",url:ISO_URL},
 outil:L("DefenseObservation · DetectionTicket · verdicts d'étape · debrief","DefenseObservation · DetectionTicket · step verdicts · debrief"),
 keypoints:[
  L("L'exercice Purple teste le dispositif d'incident à froid, avant qu'un vrai incident ne le mette à l'épreuve.","The Purple exercise tests the incident capability cold, before a real incident puts it to the test."),
  L("Le verdict d'étape (prévenu / alerté / journalisé / aucune télémétrie) est la mesure de détection de l'exercice.","The step verdict (prevented / alerted / logged / no telemetry) is the exercise's detection measure."),
  L("Les enseignements du debrief alimentent la préparation du cycle suivant — c'est la boucle d'amélioration.","The debrief's lessons feed the next cycle's preparation — that is the improvement loop.")],
 loop:L("↺ les enseignements alimentent la préparation du cycle suivant — et le prochain exercice Purple.","↺ the lessons feed the next cycle's preparation — and the next Purple exercise."),
 body:{stages:[
  {t:L("Préparation","Preparation"),d:L("Rôles, canaux, critères de qualification définis avant l'incident — l'exercice Purple teste ce dispositif à froid.","Roles, channels, qualification criteria defined before the incident — the Purple exercise tests this capability cold.")},
  {t:L("Détection & signalement","Detection & reporting"),d:L("La télémétrie remonte l'événement ; côté Purple, c'est le verdict d'étape (prévenu / alerté / journalisé / aucune télémétrie).","Telemetry surfaces the event; on the Purple side, it is the step verdict (prevented / alerted / logged / no telemetry).")},
  {t:L("Évaluation","Assessment"),d:L("Qualification : incident avéré ou non, gravité, périmètre.","Qualification: confirmed incident or not, severity, scope."),dec:L("incident confirmé ?","incident confirmed?")},
  {t:L("Réponse","Response"),d:L("Containment, éradication, rétablissement — mesurés en exercice par MTTR-réponse.","Containment, eradication, recovery — measured in the exercise by response MTTR.")},
  {t:L("Enseignements","Lessons"),d:L("Debrief : règles de détection à écrire, sources à déployer, procédures à corriger.","Debrief: detection rules to write, sources to deploy, procedures to fix.")}]},
 aller:[],
 lies:["corp-mgr-conformite","corp-mgr-sensibilisation","corp-aud-urgence"]},

{id:"corp-mgr-sensibilisation",nature:"metier",type:"mapping",profils:["mgr"],normes:[{id:"A.6.3",url:ISO_URL}],hds:"GRC",
 titre:L("L'exercice Purple comme levier de sensibilisation","The Purple exercise as an awareness lever"),
 resume:L("Le debrief vaut mieux qu'une session de e-learning : preuve A.6.3 par la pratique.","The debrief beats an e-learning session: A.6.3 evidence through practice."),
 objectif:L("Faire du debrief Purple une preuve de formation en situation, plus démontrable qu'une feuille d'émargement.","Make the Purple debrief evidence of situational training, more demonstrable than a sign-in sheet."),
 source:{label:"ISO/IEC 27001",url:ISO_URL},
 outil:L("Panneau pédagogique du cycle Purple · debrief/rétrospective","Purple cycle teaching panel · debrief/retrospective"),
 keypoints:[
  L("Un debrief bien mené montre des techniques réelles jouées sur le propre périmètre de la Blue Team.","A well-run debrief shows real techniques played on the Blue Team's own scope."),
  L("La montée en compétence se mesure : une alerte manquée aujourd'hui devient une règle écrite demain.","Skill growth is measurable: a missed alert today becomes a written rule tomorrow."),
  L("Pour l'audit A.6.3, tracer participants, enseignements et remédiations suivies.","For the A.6.3 audit, trace participants, lessons and remediations followed.")],
 body:{prose:[
  L("Un exercice Purple bien débriefé est un dispositif de formation en situation, autrement plus efficace qu'une session de e-learning générique. La Blue Team voit des techniques réelles jouées sur son propre périmètre, comprend concrètement pourquoi une alerte a manqué, et repart avec des actions précises : une règle de détection à écrire, une source de télémétrie à brancher.","A well-debriefed Purple exercise is a form of situational training, far more effective than a generic e-learning session. The Blue Team sees real techniques played on its own scope, concretely understands why an alert was missed, and leaves with precise actions: a detection rule to write, a telemetry source to connect."),
  L("C'est aussi une preuve de sensibilisation bien plus solide qu'une feuille d'émargement. Là où un audit A.6.3 peut interroger la réalité d'une formation en salle, un debrief Purple documenté montre une montée en compétence mesurable : l'angle mort identifié un jour devient la règle déployée le suivant.","It is also far stronger awareness evidence than a sign-in sheet. Where an A.6.3 audit may question the reality of classroom training, a documented Purple debrief shows measurable skill growth: the blind spot identified one day becomes the rule deployed the next."),
  L("Pour que l'argument tienne devant l'auditeur, il faut tracer trois choses que les entités exercice, ticket et journal capturent déjà : qui a participé au debrief, quels enseignements ont été tirés, et quelles remédiations ont effectivement suivi.","For the argument to hold before the auditor, three things must be traced — which the exercise, ticket and journal entities already capture: who took part in the debrief, what lessons were drawn, and which remediations actually followed.")]},
 aller:[],
 lies:["corp-mgr-incidents","corp-mgr-conformite","corp-aud-categories"]}
];

function app(){

    profiles:[{id:'manager'},{id:'ciso'},{id:'auditeur'},{id:'voc'},{id:'cert'},{id:'admin'}],

    nav:[

    ],
    /* ---- état données (Phase 1) ---- */
    enums:ENUMS, dataReady:false,
    db:{organisations:[],resources:[],applications:[],threatScenarios:[],audits:[],auditActions:[],vulnerabilities:[],detectionTickets:[],purpleExercises:[],attackChains:[],defenseObservations:[],deliverables:[],auditLog:[]},
    editor:{open:false,entity:null,id:null,model:{},fields:[],errors:{}},
    io:{open:false,mode:'export',text:'',count:0},
    chainStatus:null,
    attckLayer:'couverture', attckImport:null, attckTactics:ATTCK,
    exoSel:null,
    phasesOpen:false, ptPhases:PT_PHASES,
    cycleOpen:{}, remOpen:{},
    exoStepEd:{open:false,exoId:null,exoNom:'',chainId:null,nom:'',steps:[],stepQ:'',stepSel:null,scenId:null,scenNom:''},
    auditSel:null,
    auditDrawer:{open:false,id:null},
    vulnSel:null,
    vulnDrawer:{open:false,id:null},
    appDrawer:{open:false,id:null},
    appAdvOpen:false,
    appFilters:{q:'',expo:[],resp:'',cov:[],tech:''},
    vulnFilters:{open:false, cve:[], clients:[], apps:[], sev:[], sla:[], statut:[]},
    vfAc:{cve:{q:'',open:false}, clients:{q:'',open:false}, apps:{q:'',open:false}},
    scenSel:null,
    scenDrawer:{open:false,id:null},
    scenEd:{open:false,id:null,model:null,stepQ:'',stepSel:null,stepCmd:'',stepDesc:'',d3off:[]},
    stixIo:{open:false,text:'',count:0},
    delivSel:null,
    delivDrawer:{open:false,id:null},
    refState:{}, refBusy:null,
    corpusFilters:{profil:'all',nature:'all',q:''}, corpusDrawer:{open:false,id:null},
    get counts(){ const s=n=>this.scope(n).length;
      return {cockpit:0,exercices:s('purpleExercises'),audits:s('audits'),vulns:s('vulnerabilities'),attck:14,
        scenarios:s('threatScenarios'),applications:s('applications'),organisations:s('organisations'),
        ressources:s('resources'),generateur:s('deliverables'),journal:s('auditLog'),bibliotheque:CORPUS.length}; },
    get clientOptions(){
      const all=(this.db.organisations||[]).filter(o=>o.role==='client');
      if(this.scopableRoles.includes(this.profile) && this.clientsRattaches.length) return all.filter(o=>this.clientsRattaches.includes(o.id));
      return all;
    },
    get appFilterOptions(){ return this.scope('applications'); },
    /* filtre application (vues opérationnelles uniquement — n'affecte ni le CRUD ni l'export) */
    appMatch(rec){
      if(this.appFilter==='all'||!this.appFilter) return true;
      if(rec.application_id!==undefined && rec.application_id!==null) return rec.application_id===this.appFilter;
      if(Array.isArray(rec.applications)) return rec.applications.includes(this.appFilter);
      return false;
    },
    scopeApp(name){ return this.scope(name).filter(r=>this.appMatch(r)); },
    onClientChange(){ this.appFilter='all'; },

    /* ---- helper unique : dernier run (exercice) de chaque audit du périmètre ---- */
    _lastRunsByAudit(auditIds){
      const exos=this.scope('purpleExercises').filter(e=>auditIds.has(e.audit_id));
      const byAudit={}; exos.forEach(e=>{ (byAudit[e.audit_id]||(byAudit[e.audit_id]=[])).push(e); });
      return Object.values(byAudit).map(list=>list.slice().sort((a,b)=>
        (String(a.date||'').localeCompare(String(b.date||'')))||(String(a.id).localeCompare(String(b.id)))).pop());
    },
    _trendLabel(d,fine){ try{ return d.toLocaleDateString(this.lang==='fr'?'fr-FR':'en-US', fine?{day:'numeric',month:'short'}:{month:'short',year:'2-digit'}); }catch(e){ return ''; } },
    /* ---- courbe de couverture dans le temps : à chaque date, pool du DERNIER RUN PAR AUDIT connu À CETTE DATE ---- */
    get coverageTrend(){
      const audits=this.dashAudits;
      const auditIds=new Set(audits.map(a=>a.id));
      const exos=this.scope('purpleExercises').filter(e=>auditIds.has(e.audit_id)&&e.date&&!isNaN(new Date(e.date).getTime()));
      if(!exos.length) return {empty:true,points:[]};
      const now=new Date();
      const times=exos.map(e=>new Date(e.date).getTime());
      const earliest=new Date(Math.min(...times));
      const days=this._periodDays();
      let start = days==null ? earliest : new Date(now.getTime()-days*864e5);
      if(start.getTime()<earliest.getTime()) start=earliest;   /* pas de buckets vides avant le 1er run */
      const spanDays=(now.getTime()-start.getTime())/864e5;
      let dates=[];
      if(spanDays<=45){                                        /* fenêtre courte → points réguliers */
        const n=Math.max(2,Math.min(6,Math.ceil(spanDays/9)+1));
        for(let i=0;i<n;i++) dates.push(new Date(start.getTime()+(now.getTime()-start.getTime())*i/(n-1)));
      } else {                                                 /* sinon → fins de mois, plafonné ~12 pts */
        let d=new Date(start.getFullYear(),start.getMonth(),1);
        while(d<=now){ const me=new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59); dates.push(me>now?new Date(now):me); d=new Date(d.getFullYear(),d.getMonth()+1,1); }
        if(!dates.length || dates[dates.length-1].getTime()<now.getTime()-864e5) dates.push(new Date(now));
        if(dates.length>14){ const step=Math.ceil(dates.length/12); const keep=dates.filter((_,i)=>i%step===0); if(keep[keep.length-1]!==dates[dates.length-1]) keep.push(dates[dates.length-1]); dates=keep; }
      }
      const byAudit={}; exos.forEach(e=>{ (byAudit[e.audit_id]||(byAudit[e.audit_id]=[])).push(e); });
      const points0=dates.map(T=>{
        let caught=0,tested=0,na=0;
        Object.values(byAudit).forEach(list=>{
          const cand=list.filter(e=>new Date(e.date).getTime()<=T.getTime());
          if(!cand.length) return;
          const last=cand.slice().sort((a,b)=>(String(a.date).localeCompare(String(b.date)))||(String(a.id).localeCompare(String(b.id)))).pop();
          let st=0,de=0;
          this.db.attackChains.filter(c=>c.exercise_id===last.id).forEach(c=>(c.etapes||[]).forEach(x=>{ if(this.vTested(x)){ st++; if(this.vCaught(x)) de++; } }));
          if(st>0){ caught+=de; tested+=st; na++; }
        });
        return {label:this._trendLabel(T,spanDays<=45), pct: tested? Math.round(caught/tested*100):null, caught, tested, audits:na};
      }).filter(p=>p.pct!=null);
      if(!points0.length) return {empty:true,points:[]};
      const flat=new Set(points0.map(p=>p.caught+'/'+p.tested)).size<=1;   /* posture stable → 2 points suffisent */
      const points = (flat && points0.length>2) ? [points0[0], points0[points0.length-1]] : points0;
      const W=680,H=150,padX=14,padT=16,padB=16, n=points.length;
      const xOf=i=> n>1? padX+(i/(n-1))*(W-2*padX) : W/2;
      const yOf=p=> padT+(1-p/100)*(H-padT-padB);
      const dots=points.map((p,i)=>({x:Math.round(xOf(i)),y:Math.round(yOf(p.pct))}));
      const line=dots.map((d,i)=>(i?'L':'M')+d.x+','+d.y).join(' ');
      const area = n>1? ('M'+dots[0].x+','+(H-padB)+' '+dots.map(d=>'L'+d.x+','+d.y).join(' ')+' L'+dots[n-1].x+','+(H-padB)+' Z') : '';
      const grid=[{y:padT,lbl:'100'},{y:Math.round(padT+0.5*(H-padT-padB)),lbl:'50'},{y:H-padB,lbl:'0'}];
      /* SVG construit en chaîne (pas de <template x-for> dans le SVG : Alpine ne peut pas le cloner) — couleurs en style inline pour résoudre les variables CSS */
      let svg='<defs><linearGradient id="covTrendGrad" x1="0" y1="0" x2="0" y2="1">'
        +'<stop offset="0" style="stop-color:var(--violet);stop-opacity:.26"/><stop offset="1" style="stop-color:var(--violet);stop-opacity:0"/></linearGradient></defs>';
      grid.forEach(g=>{ svg+='<line x1="0" y1="'+g.y+'" x2="'+W+'" y2="'+g.y+'" style="stroke:var(--border-2)" stroke-width="1"/>'; });
      if(area) svg+='<path d="'+area+'" fill="url(#covTrendGrad)"/>';
      svg+='<path d="'+line+'" fill="none" style="stroke:var(--violet)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
      dots.forEach((d,i)=>{ svg+='<circle cx="'+d.x+'" cy="'+d.y+'" r="'+(i===dots.length-1?5:4)+'" style="fill:var(--surface);stroke:var(--violet)" stroke-width="2"/>'; });

    },
    /* ---- tableau de bord Cockpit (Phase 2) — calculé, réactif ---- */
    get dash(){
      const now=Date.now(), day=864e5;

      const auditIds=new Set(audits.map(a=>a.id));
      const appIds=new Set(audits.flatMap(a=>a.applications||[]));
      /* vulnérabilités du périmètre filtré (via actions ou applications auditées) */
      const vids=new Set();
      this.db.auditActions.filter(x=>auditIds.has(x.audit_id)&&x.vulnerabilite_id).forEach(x=>vids.add(x.vulnerabilite_id));
      this.scopeApp('vulnerabilities').forEach(v=>{ if((v.applications||[]).some(a=>appIds.has(a))||appIds.has(v.application_id)) vids.add(v.id); });
      const vulns=this.scopeApp('vulnerabilities').filter(v=>vids.has(v.id));
      const isOpen=v=>v.statut!=='corrigée'&&v.statut!=='acceptée'&&v.statut!=='faux positif';  /* ⚖️ #3 définition unique (idem carte) */
      const open=vulns.filter(isOpen);
      const win={P1:2,P2:30,P3:90,P4:180};
      let within=0,breached=0,breachedP1=0;
      open.forEach(v=>{ const w=win[v.sla_niveau]||180; const age=(now-new Date(v.date_decouverte||now).getTime())/day; if(age>w){ breached++; if(v.sla_niveau==='P1') breachedP1++; } else within++; });
      const slaPct=open.length?Math.round(within/open.length*100):100;
      const sevKeys=['critique','élevée','moyenne','faible'];
      const sev=sevKeys.map(k=>({key:k,n:vulns.filter(v=>(v.severite||'').toLowerCase()===k).length}));
      const maxSev=Math.max(1,...sev.map(s=>s.n));
      const slaDist=['P1','P2','P3','P4'].map(p=>({p,n:vulns.filter(v=>v.sla_niveau===p).length}));
      /* ⚖️ #2 posture : POOL du dernier run par audit — méthode UNIQUE, identique à la carte Détection */
      const lastRuns=this._lastRunsByAudit(auditIds);
      let steps=0,detected=0,blindN=0,pPrev=0,pAlert=0,pLog=0; const blindByTac={};
      lastRuns.forEach(e=>{ const m=this.exoMetrics(e); steps+=m.total; detected+=m.caught; pPrev+=m.prevented; pAlert+=m.alerted; pLog+=m.logged;
        this.db.attackChains.filter(c=>c.exercise_id===e.id).forEach(c=>(c.etapes||[]).forEach(s=>{
          if(this.vTested(s)&&this.vBlind(s)){ blindN++; const tac=s.tactique||attckTacOf(s.technique)||'?'; blindByTac[tac]=(blindByTac[tac]||0)+1; } })); });
      const covPct=steps?Math.round(detected/steps*100):0;

      /* techniques au périmètre (audits filtrés) */
      const tech=new Set();
      const refScenIds=new Set(audits.map(a=>a.scenario_id).filter(Boolean));
      this.db.threatScenarios.filter(s=>refScenIds.has(s.id)).forEach(s=>(s.techniques||[]).forEach(t=>tech.add(t)));
      lastRuns.forEach(e=>this.db.attackChains.filter(c=>c.exercise_id===e.id).forEach(c=>(c.etapes||[]).forEach(s=>s.technique&&tech.add(s.technique))));
      audits.forEach(a=>this.db.auditActions.filter(x=>x.audit_id===a.id&&x.technique_attack&&this.appMatch(x)).forEach(x=>tech.add(x.technique_attack)));
      /* angles morts par tactique — ordre kill-chain (ATTCK est déjà ordonné) */
      const kc=ATTCK.map(t=>t.id);

      Object.keys(blindByTac).forEach(t=>{ if(!kc.includes(t)) blindTactics.push({tac:t,n:blindByTac[t]}); });
      const blindMax=Math.max(1,...blindTactics.map(x=>x.n));
      /* délais médians sur les derniers runs */
      const exoM=lastRuns.map(e=>this.exoMetrics(e));
      const med=arr=>{ const a=arr.filter(x=>x!=null).sort((x,y)=>x-y); return a.length? a[Math.floor(a.length/2)]:null; };
      const mttd=med(exoM.map(m=>m.mttd)), mttrResp=med(exoM.map(m=>m.mttrResp)), mttrRem=med(exoM.map(m=>m.mttrRem));
      const auditsView=audits.map(a=>{ const j=a.jalons||[], done=j.filter(x=>x.statut==='terminé').length;
        return {id:a.id,nom:a.nom,statut:a.statut,tlp:a.tlp,done,total:j.length,pct:j.length?Math.round(done/j.length*100):0}; });
      const exosRaw=this.scope('purpleExercises').filter(e=>auditIds.has(e.audit_id));
      const exos=exosRaw.map(e=>{ const m=this.exoMetrics(e);
        return {...e,steps:m.total,detected:m.detected,detPct:m.coverage,
          coverage_pct:m.coverage,bypass_pct:m.bypass,mttd:m.mttd,mttrResp:m.mttrResp,mttrRem:m.mttrRem,
          execRate:m.execRate,execTested:m.execTested,execTotal:m.execTotal,

      const log=this.scope('auditLog').slice().sort((a,b)=>b.seq-a.seq).slice(0,6);
      return {sev,maxSev,slaDist,open:open.length,breached,breachedP1,slaPct,mttd,mttrResp,mttrRem,
        blindN,blindTactics,blindMax,posture,covPct,

    },

    get auditTimeline(){
      const year=new Date().getFullYear();
      const counts={};
      this.scopeApp('audits').forEach(a=>{
        if(this.dashType!=='all' && a.categorie!==this.dashType) return;
        if(this.dashStatus==='progress' && a.statut!=='en cours') return;
        if(this.dashStatus==='done' && a.statut!=='terminé') return;
        const dt=this._auditDate(a); if(!dt) return;
        if(this._periodDays()!=null && !this._inPeriod(dt)) return;
        const key=dt.toISOString().slice(0,10); counts[key]=(counts[key]||0)+1; });
      const jan1=new Date(Date.UTC(year,0,1)); let start=new Date(jan1);
      const dow=(jan1.getUTCDay()+6)%7; start.setUTCDate(start.getUTCDate()-dow); // back to Monday
      const dec31=new Date(Date.UTC(year,11,31));
      const weeks=[]; let cur=new Date(start); let total=0; const monthFirst={};
      while(cur<=dec31 || ((cur.getUTCDay()+6)%7)!==0){
        const col=[];
        for(let r=0;r<7;r++){
          const inYear=cur.getUTCFullYear()===year;
          const key=cur.toISOString().slice(0,10);
          const n=inYear?(counts[key]||0):0; if(n) total+=n;
          const level=n<=0?0:(n>=4?4:n+1);
          col.push({date:key,count:n,level,inYear});
          if(inYear && cur.getUTCDate()===1) monthFirst[cur.getUTCMonth()]=weeks.length;
          cur.setUTCDate(cur.getUTCDate()+1);
        }
        weeks.push(col);
        if(cur>dec31 && ((cur.getUTCDay()+6)%7)===0) break;
      }
      const months=[]; for(let m=0;m<12;m++){ if(monthFirst[m]!=null) months.push({m,col:monthFirst[m]}); }
      return {year,weeks,months,total}; },
    auditStatutClass(s){ return {'terminé':'green','en cours':'violet','planifié':'blue','à planifier':'gray'}[s]||'gray'; },

    /* ---- matrice ATT&CK (Phase 3) — couches calculées ---- */
    get am(){
      const norm=s=>(s||'').split('.')[0], map={};
      const touch=t=>{ const b=norm(t); if(!map[b]) map[b]={audited:0,attempted:0,detected:0,logged:0,notelem:0,ticket:0,gap:false}; return map[b]; };
      const inScopeAudits=this.scopeApp('audits');
      const auditIds=new Set(inScopeAudits.map(a=>a.id));
      this.db.auditActions.forEach(x=>{ if(auditIds.has(x.audit_id)&&x.technique_attack&&this.appMatch(x)) touch(x.technique_attack).audited++; });
      /* un scénario ne compte comme couverture attendue que s'il est référencé par un audit en périmètre */
      const refScen=new Set(inScopeAudits.map(a=>a.scenario_id).filter(Boolean));
      this.db.threatScenarios.filter(s=>refScen.has(s.id)).forEach(s=>(s.techniques||[]).forEach(t=>touch(t).audited++));
      const exoIds=new Set(this.scope('purpleExercises').map(e=>e.id));
      this.db.attackChains.forEach(c=>{ if(exoIds.has(c.exercise_id)) (c.etapes||[]).forEach(st=>{ if(st.technique&&this.vTested(st)){ const m=touch(st.technique); m.attempted++; if(this.vCaught(st)) m.detected++; else if(this.vLogged(st)) m.logged++; else m.notelem++; } }); });
      this.scope('detectionTickets').forEach(d=>{ if(d.technique_attack) touch(d.technique_attack).ticket++; });
      Object.values(map).forEach(m=>m.gap=m.notelem>0);
      return map;
    },
    /* techniques réellement référencées dans le périmètre — on n'affiche que celles-ci */
    get visibleTactics(){
      const m=this.am;
      const active=new Set(Object.keys(m).filter(k=>m[k].audited>0||m[k].attempted>0||m[k].ticket>0));
      if(this.attckLayer==='importe'&&this.attckImport) Object.keys(this.attckImport).forEach(k=>active.add(k));
      return this.attckTactics
        .map(tac=>({id:tac.id,techniques:tac.techniques.filter(t=>active.has(t.id))}))
        .filter(tac=>tac.techniques.length>0);
    },
    get attckSummary(){
      const m=this.am; let covered=0,detected=0,gaps=0,untested=0;
      Object.values(m).forEach(s=>{ if(s.audited>0) covered++; if(s.attempted>0&&s.detected>=s.attempted) detected++; if(s.gap) gaps++; if(s.audited>0&&s.attempted===0) untested++; });
      return {covered,detected,gaps,untested,total:Object.keys(m).length};
    },
    tacticStat(tac){ const m=this.am; let cov=0; tac.techniques.forEach(t=>{ const s=m[t.id]; if(s&&(s.audited>0||s.attempted>0)) cov++; }); return {cov,total:tac.techniques.length}; },
    cellClass(tid){

      const st=this.am[tid]; if(!st) return '';
      if(L==='couverture') return st.audited>0?(st.audited>=2?'c-cov2':'c-cov1'):'';
      if(L==='detection'){ if(st.attempted>0){ if(st.detected>=st.attempted) return 'c-det'; return st.notelem===0?'c-part':'c-miss'; } return st.audited>0?'c-cov1':''; }
      if(st.gap) return 'c-gap';
      if(st.attempted>0&&st.detected>=st.attempted) return 'c-ok';
      if(st.attempted>0&&st.notelem===0) return 'c-part';
      if(st.audited>0&&st.attempted===0) return 'c-untested';
      return '';
    },
    cellNum(tid){
      if(this.attckLayer==='importe'){ const im=this.attckImport; return (im&&im[tid]&&im[tid].score!=null)?im[tid].score:''; }
      const st=this.am[tid]; if(!st) return '';
      if(this.attckLayer==='detection') return st.attempted||'';
      if(this.attckLayer==='ecart') return st.gap?'!':(st.detected>0?'✓':'');

    },
    cellTitle(t){ const s=this.am[t.id]; let x='';
      if(s) x=' · '+this.t('attck.audited')+' '+s.audited+' / '+this.t('attck.attempted')+' '+s.attempted+' / '+this.t('attck.detectedN')+' '+s.detected;
      if(this.attckLayer==='importe'&&this.attckImport&&this.attckImport[t.id]){ const im=this.attckImport[t.id]; x=' · score '+(im.score??'—')+(im.comment?' — '+im.comment:''); }
      return t.id+' — '+t.name+x; },
    setLayer(l){ this.attckLayer=l; },
    openLayerImport(){ this.io={open:true,mode:'layer',text:'',count:0}; },
    loadSampleLayer(){ this.io.text=SAMPLE_LAYER; },
    doLayerImport(){
      let obj; try{ obj=JSON.parse(this.io.text); }catch(e){ this.pushToast('err',this.t('io.badJson'),''); return; }
      const techs=obj&&Array.isArray(obj.techniques)?obj.techniques:null;
      if(!techs){ this.pushToast('err',this.t('io.badJson'),this.t('layer.badShape')); return; }
      const norm=s=>(s||'').split('.')[0], map={};

    /* ---- cycle Purple (Phase 4) — boucle Red ↔ Blue ↔ Détection ---- */
    get exoList(){ return this.scope('purpleExercises'); },
    get curExo(){ const l=this.exoList; if(!l.length) return null; const id=(this.exoSel&&l.some(e=>e.id===this.exoSel))?this.exoSel:l[0].id; return l.find(e=>e.id===id); },
    /* ---- Verdict d'étape : échelle de couverture Purple (remplace le booléen detecte) ---- */
    stepVerdict(s){ if(!s) return 'not_tested'; if(s.verdict) return s.verdict; if(s.detecte===true) return 'alerted'; if(s.detecte===false) return 'no_telemetry'; return 'not_tested'; },
    vTested(s){ return this.stepVerdict(s)!=='not_tested'; },
    vCaught(s){ const v=this.stepVerdict(s); return v==='prevented'||v==='alerted'; },
    vAlerted(s){ return this.stepVerdict(s)==='alerted'; },
    vPrevented(s){ return this.stepVerdict(s)==='prevented'; },
    vLogged(s){ return this.stepVerdict(s)==='logged'; },
    vBlind(s){ return this.stepVerdict(s)==='no_telemetry'; },
    vHasTelemetry(s){ const v=this.stepVerdict(s); return v==='prevented'||v==='alerted'||v==='logged'; },
    verdictLabel(v){ return this.optLabel(v); },
    verdictTone(v){ return {prevented:'green',alerted:'green',logged:'amber',no_telemetry:'red',not_tested:'gray'}[v]||'gray'; },
    verdictNeedsTicket(v){ return v==='logged'||v==='no_telemetry'; },
    /* état d'affichage timeline/matrice = verdict + éventuel ticket validé (remédié) */
    stepStateOf(s,tk){ const v=this.stepVerdict(s);
      if(v==='not_tested') return 'untested';
      if(v==='prevented') return 'prevented';
      if(v==='alerted') return 'alerted';
      if(v==='logged') return (tk&&tk.statut==='validé')?'covered':'logged';
      return (tk&&tk.statut==='validé')?'covered':'gap'; },
    /* ---- KPI Purple MESURÉS depuis les horodatages (plus de valeurs déclarées) ---- */
    parseTs(v){ if(!v) return null; const t=new Date(v).getTime(); return isNaN(t)?null:t; },
    tsDeltaMin(a,b){ const x=this.parseTs(a), y=this.parseTs(b); return (x!=null&&y!=null&&y>=x)? Math.round((y-x)/60000) : null; },
    fmtDur(min){ if(min==null) return '—'; if(min<60) return min+' min'; const h=Math.floor(min/60), m=min%60; if(h<24) return m? h+' h '+m+' min' : h+' h'; const d=Math.floor(h/24), hh=h%24; return hh? d+' j '+hh+' h' : d+' j'; },
    exoMetrics(exo){
      const norm=s=>(s||'').split('.')[0];
      const chains=this.db.attackChains.filter(c=>c.exercise_id===exo.id);
      const tickets=this.db.detectionTickets.filter(t=>t.exercise_id===exo.id);
      const all=[]; chains.forEach(ch=>(ch.etapes||[]).forEach(st=>all.push(st)));
      const steps=all.filter(s=>this.vTested(s));               /* seules les étapes testées comptent */
      const total=steps.length;
      const chainTotal=all.length;                              /* ⚖️ point 1 — dénominateur d'exécution (joué + non testé) */
      const prevented=steps.filter(s=>this.vPrevented(s)).length;
      const alerted=steps.filter(s=>this.vAlerted(s)).length;
      const logged=steps.filter(s=>this.vLogged(s)).length;
      const blind=steps.filter(s=>this.vBlind(s)).length;
      const caught=prevented+alerted;
      /* MTTD : (détection Blue − exécution Red) sur les seules étapes ALERTÉES horodatées */
      const dDet=[]; steps.forEach(s=>{ if(this.vAlerted(s)){ const d=this.tsDeltaMin(s.horodatage,s.horodatage_detection); if(d!=null) dDet.push(d); } });
      /* MTTR RÉPONSE : (réponse SOC − détection Blue) sur les étapes ALERTÉES horodatées */
      const dResp=[]; steps.forEach(s=>{ if(this.vAlerted(s)){ const d=this.tsDeltaMin(s.horodatage_detection,s.horodatage_reponse); if(d!=null) dResp.push(d); } });
      /* MTTR REMÉDIATION : (ticket validé − exécution de l'étape adressée) — fermeture du gap */
      const dRem=[]; tickets.forEach(t=>{ if(t.statut==='validé'&&t.valide_le){ const st=all.find(s=>norm(s.technique)===norm(t.technique_attack)); const anchor=t.gap_decouvert_le||(st&&st.horodatage)||exo.date; const d=this.tsDeltaMin(anchor,t.valide_le); if(d!=null) dRem.push(d); } });
      const mean=a=>a.length? Math.round(a.reduce((s,x)=>s+x,0)/a.length):null;
      return { total, detected:caught, gaps:blind, prevented, alerted, logged, blind, caught,
        execTested: total, execTotal: chainTotal,                 /* ⚖️ point 1 */
        execRate: chainTotal? Math.round(total/chainTotal*100):0,
        coverage: total? Math.round(caught/total*100):0,          /* prévenu + alerté */
        prevention: total? Math.round(prevented/total*100):0,
        detection: total? Math.round(alerted/total*100):0,        /* taux d'alerting */
        visibility: total? Math.round((caught+logged)/total*100):0,
        bypass: total? Math.round((logged+blind)/total*100):0,     /* non pris en temps réel = 1 − couverture */
        mttd: mean(dDet), mttdN: dDet.length,
        mttrResp: mean(dResp), mttrRespN: dResp.length,
        mttrRem: mean(dRem), mttrRemN: dRem.length };
    },
    get cycle(){
      const exo=this.curExo; if(!exo) return null;
      const norm=s=>(s||'').split('.')[0];
      const chains=this.db.attackChains.filter(c=>c.exercise_id===exo.id);
      const tickets=this.db.detectionTickets.filter(t=>t.exercise_id===exo.id);
      const steps=[];
      chains.forEach(ch=>(ch.etapes||[]).slice().sort((a,b)=>a.ordre-b.ordre).forEach(st=>{
        const o=this.db.defenseObservations.filter(x=>x.attack_chain_id===ch.id&&norm(x.technique)===norm(st.technique));
        const tk=tickets.find(t=>norm(t.technique_attack)===norm(st.technique))||null;
        const verdict=this.stepVerdict(st), state=this.stepStateOf(st,tk);
        steps.push({chainId:ch.id,ordre:st.ordre,technique:st.technique,titre:st.titre,horodatage:st.horodatage,verdict,detecte:this.vCaught(st),name:this.techName(st.technique),obs:o,ticket:tk,state});
      }));
      const tested=steps.filter(s=>s.state!=='untested').length;
      const detected=steps.filter(s=>s.state==='prevented'||s.state==='alerted').length, covered=steps.filter(s=>s.state==='covered').length, logged=steps.filter(s=>s.state==='logged').length, gaps=steps.filter(s=>s.state==='gap').length;
      return {exo,steps,tickets,total:steps.length,tested,detected,covered,logged,gaps,detPct:tested?Math.round(detected/tested*100):0,projPct:tested?Math.round((detected+covered)/tested*100):0};
    },
    /* ---- Cycle Purple refondu : tous les exercices en périmètre ---- */
    get exoCycles(){
      const norm=s=>(s||'').split('.')[0];
      const order={}; (this.attckTactics||[]).forEach((t,i)=>{order[t.id]=i;});
      return this.exoList.map(exo=>{
        const m=this.exoMetrics(exo);
        const chains=this.db.attackChains.filter(c=>c.exercise_id===exo.id);
        const tickets=this.db.detectionTickets.filter(t=>t.exercise_id===exo.id);
        const steps=[];
        chains.forEach(ch=>(ch.etapes||[]).slice().sort((a,b)=>a.ordre-b.ordre).forEach(st=>{
          const o=this.db.defenseObservations.filter(x=>x.attack_chain_id===ch.id&&norm(x.technique)===norm(st.technique));
          const tk=tickets.find(t=>norm(t.technique_attack)===norm(st.technique))||null;
          const verdict=this.stepVerdict(st), state=this.stepStateOf(st,tk);
          steps.push({chainId:ch.id,ordre:st.ordre,technique:st.technique,titre:st.titre,horodatage:st.horodatage,verdict,detecte:this.vCaught(st),name:this.techName(st.technique),obs:o,ticket:tk,state,tac:attckTacOf(st.technique)});
        }));
        const tested=steps.filter(s=>s.state!=='untested').length,
          detected=steps.filter(s=>s.state==='prevented'||s.state==='alerted').length,
          covered=steps.filter(s=>s.state==='covered').length,
          logged=steps.filter(s=>s.state==='logged').length,
          gaps=steps.filter(s=>s.state==='gap').length;
        const tm={};
        steps.forEach(s=>{ if(s.state==='untested') return; const id=s.tac||'—'; const t=tm[id]||(tm[id]={id,det:0,tot:0}); t.tot++; if(s.state==='prevented'||s.state==='alerted'||s.state==='covered')t.det++; });
        const tactics=Object.values(tm)
          .sort((a,b)=>(order[a.id]??99)-(order[b.id]??99))
          .map(t=>({id:t.id,det:t.det,tot:t.tot,state:t.det===t.tot?'detected':(t.det===0?'gap':'covered'),label:this.tacLabel(t.id)}));
        return {exo,steps,tickets,total:steps.length,tested,detected,covered,logged,gaps,
          detPct:tested?Math.round(detected/tested*100):0,
          projPct:tested?Math.round((detected+covered)/tested*100):0,
          mttd:m.mttd,mttrResp:m.mttrResp,mttrRem:m.mttrRem,coverage:m.coverage,bypass:m.bypass,prevention:m.prevention,visibility:m.visibility,
          mttdN:m.mttdN,mttrRespN:m.mttrRespN,mttrRemN:m.mttrRemN,
          execRate:m.execRate,execTested:m.execTested,execTotal:m.execTotal,
          pPrev:m.prevented,pAlert:m.alerted,pLog:m.logged,pBlind:m.blind,pTested:m.total,
          tactics};
      });
    },
