                            <button class="ic danger" x-show="can('delete','auditActions')" @click="removeRecord('auditActions',ac.id)" :aria-label="t('btn.delete')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg></button>
                          </div></td>
                        </tr>
                      </template>
                      <template x-if="!auditView.actions.length"><tr><td colspan="6" class="list-empty" x-text="t('list.none')"></td></tr></template>
                    </tbody>
                  </table>
                </div>
              </div>
            </section>

          </div>
        </div>
      </aside>
    </div>
  </template>

  <!-- ============ DÉTAIL VULNÉRABILITÉ (drawer VOC) ============ -->
  <template x-if="vulnDrawer.open && vulnView">
    <div>
      <div class="drawer-scrim" @click="closeVuln()"></div>
      <aside class="drawer drawer--wide" role="dialog" aria-modal="true" :aria-label="vulnView.vuln.titre" @keydown.escape.window="closeVuln()">
        <div class="drawer-head">
          <span class="drawer-title" x-text="vulnView.vuln.titre"></span>
          <span style="flex:1"></span>
          <button class="btn" :disabled="!can('edit','vulnerabilities',vulnView.vuln)" @click="editVuln()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20h4L19 9l-4-4L4 16v4Z"/><path d="M14 6l4 4"/></svg>
            <span x-text="t('btn.edit')"></span></button>
          <button class="btn" @click="goCorpus('corp-voc-cycle')" :title="t('nav.bibliotheque')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span x-text="t('corpus.more')"></span></button>
          <button class="icon-btn" @click="closeVuln()" :aria-label="t('a11y.close')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg>
          </button>
        </div>
        <div class="drawer-body">
          <div style="display:flex;flex-direction:column;gap:14px">

            <div class="vuln-meta">
              <span class="vm-it"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 21h18M6 21V7l6-4 6 4v14"/><path d="M10 9h.01M14 9h.01M10 13h.01M14 13h.01M10 17h4"/></svg><b x-text="orgName(vulnView.vuln.client_id)"></b></span>
              <span class="vm-it"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7l9-4 9 4-9 4-9-4Z"/><path d="M3 7v10l9 4 9-4V7"/><path d="M12 11v10"/></svg><span x-text="auditAppLabel(vulnView.vuln)"></span></span>
              <span class="vm-it"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg><span x-text="vulnView.vuln.date_decouverte? t('voc.foundOn')+' '+vulnView.vuln.date_decouverte : '—'"></span></span>
              <span class="vm-it" x-show="vulnView.vuln.decouvreur"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg><span x-text="vulnView.vuln.decouvreur? resName(vulnView.vuln.decouvreur):''"></span></span>
            </div>
            <div class="vuln-meta-sep"></div>

            <div class="grid grid-kpi grid-kpi-row">
              <div class="kpi"><div class="kpi-label" x-text="t('voc.sla')"></div><div class="kpi-value" x-text="vulnView.sla"></div>
                <div class="kpi-foot"><span class="chip" :class="slaClass(vulnView.sla)" style="height:20px"><span class="dot"></span><span x-text="t('voc.priority')"></span></span></div></div>
              <div class="kpi"><div class="kpi-label" x-text="t('voc.score')"></div><div class="kpi-value" x-text="vulnView.score"></div>
                <div class="kpi-foot"><div class="prog-track" style="width:100%"><div class="prog-fill" :style="'width:'+vulnView.score+'%'"></div></div></div></div>
              <div class="kpi"><div class="kpi-label" x-text="t('voc.sev')"></div><div class="kpi-value" style="font-size:18px" x-text="optLabel(vulnView.vuln.severite)"></div>
                <div class="kpi-foot"><span class="chip gray data" x-show="vulnView.vuln.cvss_score!=null" x-text="'CVSS '+vulnView.vuln.cvss_score"></span></div></div>
              <div class="kpi"><div class="kpi-label" x-text="t('col.statut')"></div><div class="kpi-value" style="font-size:18px" x-text="optLabel(vulnView.vuln.statut)"></div>
                <div class="kpi-foot"><span class="tlp-pill" :class="tlpClass(vulnView.vuln.tlp)" x-text="'TLP:'+vulnView.vuln.tlp"></span></div></div>
            </div>

            <!-- Identité -->
            <section class="panel">
              <div class="panel-head"><span class="panel-title" x-text="t('panel.identity')"></span></div>
              <div class="panel-body">
                <dl class="dl">
                  <dt x-text="t('col.client')"></dt><dd x-text="orgName(vulnView.vuln.client_id)"></dd>
                  <dt x-text="t('audit.apps')"></dt><dd x-text="vulnView.app||'—'"></dd>
                  <dt x-text="t('voc.foundDate')"></dt><dd x-text="vulnView.vuln.date_decouverte||'—'"></dd>
                  <dt>CVE</dt><dd><span class="mono-cell" x-text="vulnView.vuln.cve||'—'"></span></dd>
                  <dt>OWASP <span class="info-i" :title="t('ref.owasp')">ⓘ</span></dt><dd><span class="mono-cell" x-text="(vulnView.vuln.owasp_top10? vulnView.vuln.owasp_top10+(refName('owasp',vulnView.vuln.owasp_top10)?' — '+refName('owasp',vulnView.vuln.owasp_top10):''):'—')+(vulnView.vuln.owasp_wstg_id? ' · '+vulnView.vuln.owasp_wstg_id:'')"></span></dd>
                  <dt>CWE <span class="info-i" :title="t('ref.cwe')">ⓘ</span></dt><dd><span class="mono-cell" x-text="vulnView.vuln.cwe? (vulnView.vuln.cwe+(refName('cwe',vulnView.vuln.cwe)?' — '+refName('cwe',vulnView.vuln.cwe):'')):'—'"></span></dd>
                  <dt>CAPEC <span class="info-i" :title="t('ref.capec')">ⓘ</span></dt><dd><span class="mono-cell" x-text="(vulnView.vuln.capec&&vulnView.vuln.capec.length)? vulnView.vuln.capec.map(c=>c+(refName('capec',c)?' — '+refName('capec',c):'')).join(', '):'—'"></span></dd>
                  <dt>ATT&CK <span class="info-i" :title="t('ref.attack')">ⓘ</span></dt><dd>
                    <template x-if="vulnView.vuln.techniques&&vulnView.vuln.techniques.length"><span class="chip-set">
                      <template x-for="tid in vulnView.vuln.techniques" :key="tid"><span class="chip violet"><span class="mono-id" x-text="tid"></span> <span x-text="techName(tid)"></span></span></template>
                    </span></template>
                    <template x-if="!(vulnView.vuln.techniques&&vulnView.vuln.techniques.length)"><span class="data">—</span></template>
                  </dd>
                  <dt>D3FEND <span class="info-i" :title="t('ref.d3fend')">ⓘ</span></dt><dd>
                    <template x-if="d3GroupsFor(vulnView.vuln.techniques).length">
                      <div style="display:flex;flex-direction:column;gap:12px">
                        <template x-for="g in d3GroupsFor(vulnView.vuln.techniques)" :key="g.tech">
                          <div>
                            <div class="d3-grp"><span class="mono-id" x-text="g.tech"></span><span class="step-name" x-text="g.name"></span>
                              <span class="chip green" x-text="g.measures.length+' '+t('scen.measures')"></span></div>
                            <div style="display:flex;flex-direction:column;gap:5px;margin-top:6px">
                              <template x-for="m in g.measures" :key="m.id">
                                <div class="d3-row">
                                  <span class="chip" :class="d3CatTone(m.cat)" x-text="m.cat"></span>
                                  <span class="d3-name" x-text="m.name"></span>
                                  <span class="mono-id" style="opacity:.8" x-text="m.id"></span>
                                </div>
                              </template>
                            </div>
                          </div>
                        </template>
                      </div>
                    </template>
                    <template x-if="!d3GroupsFor(vulnView.vuln.techniques).length"><span class="data">—</span></template>
                  </dd>
                  <dt x-text="t('voc.exploit')"></dt><dd><span class="chip" :class="exploitClass(vulnView.vuln.exploitabilite)" x-text="optLabel(vulnView.vuln.exploitabilite)"></span></dd>
                  <dt x-text="t('voc.discoverer')"></dt><dd x-text="vulnView.vuln.decouvreur? resName(vulnView.vuln.decouvreur):'—'"></dd>
                  <dt x-text="t('voc.foundPhase')"></dt><dd x-text="optLabel(vulnView.vuln.phase_decouverte)"></dd>
                  <dt>CVSS</dt><dd><span class="mono-cell" x-text="vulnView.vuln.cvss_vecteur||'—'"></span></dd>
                </dl>
              </div>
            </section>

            <!-- Enrichissement VOC -->
            <section class="panel">
              <div class="panel-head"><span class="panel-title" x-text="t('panel.voc')"></span>
                <span class="spacer"></span>
                <span class="chip" :class="vulnView.enriched?'green':'gray'"><span class="dot"></span><span x-text="vulnView.enriched? t('voc.enrichedBadge'):t('voc.notEnriched')"></span></span>
                <span class="chip amber" x-show="vulnView.vuln.voc_simulated"><span class="dot"></span><span x-text="t('voc.simulated')"></span></span>
                <button class="btn" :disabled="!can('update','vulnerabilities',vulnView.vuln)" @click="enrichVuln()"><span x-text="t('voc.enrich')"></span></button>
              </div>
              <div class="panel-body">
                <p class="note" style="margin-bottom:10px" x-text="t('voc.simNote')"></p>
                <div class="voc-grid">
                  <div class="voc-cell"><div class="eng-h">EPSS</div><div class="voc-val" x-text="vulnView.vuln.epss_score!=null? Math.round(vulnView.vuln.epss_score*100)+'%':'—'"></div><div class="voc-sub" x-show="vulnView.vuln.epss_percentile!=null" x-text="'percentile '+Math.round((vulnView.vuln.epss_percentile||0)*100)+'%'"></div></div>
                  <div class="voc-cell"><div class="eng-h">CISA KEV</div><div><span class="chip" :class="vulnView.vuln.kev?'red':'gray'"><span class="dot"></span><span x-text="vulnView.vuln.kev? t('voc.kevYes'):t('voc.kevNo')"></span></span></div><div class="voc-sub" x-show="vulnView.vuln.kev&&vulnView.vuln.kev_date_added" x-text="t('voc.kevAdded')+' '+vulnView.vuln.kev_date_added"></div></div>
                  <div class="voc-cell"><div class="eng-h">SSVC <span class="info-i" :title="t('voc.ssvcHeur')">ⓘ</span></div><div><span class="chip" :class="ssvcClass(vulnView.vuln.ssvc_decision)" x-show="vulnView.vuln.ssvc_decision" x-text="vulnView.vuln.ssvc_decision"></span><span x-show="!vulnView.vuln.ssvc_decision" class="faint">—</span></div><div class="voc-sub" x-show="vulnView.vuln.voc_simulated" x-text="t('voc.heurTag')"></div></div>
                  <div class="voc-cell"><div class="eng-h">VEX</div><div><span class="chip" :class="vexClass(vulnView.vuln.vex_status)" x-show="vulnView.vuln.vex_status" x-text="optLabel(vulnView.vuln.vex_status)"></span><span x-show="!vulnView.vuln.vex_status" class="faint">—</span></div></div>
                </div>
                <p class="note data" style="margin-top:10px" x-show="vulnView.vuln.voc_enriched_at" x-text="(vulnView.vuln.voc_source||'')+' · '+fmtTs(vulnView.vuln.voc_enriched_at)"></p>
              </div>
            </section>

            <!-- Priorisation SLA multi-signaux -->
            <section class="panel">
              <div class="panel-head"><span class="panel-title" x-text="t('panel.sla')"></span>
                <span class="spacer"></span>
                <span class="chip" :class="slaClass(vulnView.sla)"><span class="dot"></span><span x-text="vulnView.sla+' · '+vulnView.score+'/100'"></span></span>
                <button class="btn" :disabled="!can('update','vulnerabilities',vulnView.vuln)" @click="recomputeSla()"><span x-text="t('voc.recompute')"></span></button>
              </div>
              <div class="panel-body">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px">
                  <span class="note" x-text="t('voc.decidedBy')+' :'"></span>
                  <span class="chip" :class="(vulnView.reason&&vulnView.reason.tone)||'gray'" x-show="vulnView.reason"><span class="dot"></span><span x-text="vulnView.reason? t(vulnView.reason.key):''"></span></span>
                  <span class="chip amber" x-show="vulnView.paused"><span class="dot"></span><span x-text="t('reason.paused')"></span></span>
                  <span class="chip gray" x-show="vulnView.applicable===false"><span class="dot"></span><span x-text="t('voc.notApplicable')"></span></span>
                </div>
                <div class="sig-list">
                  <template x-for="(s,idx) in vulnView.signals" :key="idx">
                    <span class="chip" :class="s.tone"><span class="dot"></span><span x-text="s.label"></span></span>
                  </template>
                  <template x-if="!vulnView.signals.length"><span class="note" x-text="t('voc.noSignals')"></span></template>
                </div>
                <p class="note" style="margin-top:10px" x-text="t('voc.slaHint')"></p>
              </div>
            </section>

            <!-- Détails -->
            <section class="panel">
              <div class="panel-head"><span class="panel-title" x-text="t('panel.details')"></span></div>
              <div class="panel-body">
                <div class="eng-grid">
                  <div class="eng-block eng-wide"><div class="eng-h" x-text="t('f.description')"></div><p x-text="vulnView.vuln.description||'—'"></p></div>
                  <div class="eng-block eng-wide"><div class="eng-h" x-text="t('voc.reco')"></div><p x-text="vulnView.vuln.recommandation||'—'"></p></div>
                  <div class="eng-block"><div class="eng-h" x-text="t('voc.impact')"></div><p x-text="vulnView.vuln.impact_metier||'—'"></p></div>
                  <div class="eng-block"><div class="eng-h" x-text="t('voc.poc')"></div><p x-text="vulnView.vuln.preuve_exploitation||'—'"></p></div>
                </div>
                <div x-show="(vulnView.vuln.preuves||[]).length" style="margin-top:12px">
                  <div class="eng-h" x-text="t('voc.proofs')"></div>
                  <div class="proof-row">
                    <template x-for="p in (vulnView.vuln.preuves||[])" :key="p.nom">
                      <figure class="proof"><img :src="p.dataUrl" :alt="p.nom" loading="lazy"><figcaption class="data" x-text="p.nom"></figcaption></figure>
                    </template>
                  </div>
                </div>
              </div>
            </section>

            <!-- À propos des référentiels -->
            <section class="panel">
              <div class="panel-head"><span class="panel-title" x-text="t('ref.about')"></span></div>
              <div class="panel-body">
                <div class="ref-grp first" x-text="t('ref.grpClass')"></div>
                <div class="ref-defs">
                  <div class="ref-def first"><span class="k">OWASP Top 10</span><span class="d" x-text="t('ref.owasp')"></span></div>
                  <div class="ref-def"><span class="k">CWE</span><span class="d" x-text="t('ref.cwe')"></span></div>
                  <div class="ref-def"><span class="k">CAPEC</span><span class="d" x-text="t('ref.capec')"></span></div>
                </div>
                <div class="ref-grp" x-text="t('ref.grpOffDef')"></div>
                <div class="ref-defs">
                  <div class="ref-def first"><span class="k">MITRE ATT&CK</span><span class="d" x-text="t('ref.attack')"></span></div>
                  <div class="ref-def"><span class="k">MITRE D3FEND</span><span class="d" x-text="t('ref.d3fend')"></span></div>
                </div>
                <div class="ref-grp" x-text="t('ref.grpPrio')"></div>
                <div class="ref-defs">
                  <div class="ref-def first"><span class="k">CVE</span><span class="d" x-text="t('ref.cve')"></span></div>
                  <div class="ref-def"><span class="k">CVSS</span><span class="d" x-text="t('ref.cvss')"></span></div>
                  <div class="ref-def"><span class="k">EPSS</span><span class="d" x-text="t('ref.epss')"></span></div>
                  <div class="ref-def"><span class="k">CISA KEV</span><span class="d" x-text="t('ref.kev')"></span></div>
                  <div class="ref-def"><span class="k">SSVC</span><span class="d" x-text="t('ref.ssvc')"></span></div>
                  <div class="ref-def"><span class="k">VEX</span><span class="d" x-text="t('ref.vex')"></span></div>
                </div>
              </div>
            </section>

          </div>
        </div>
      </aside>
    </div>
  </template>

  <!-- ============ ÉDITEUR D'ENTITÉ (drawer générique) ============ -->
  <template x-if="editor.open">
    <div>
      <div class="drawer-scrim" @click="editor.open=false"></div>
      <aside class="drawer" role="dialog" aria-modal="true" x-init="$nextTick(()=>$el.querySelector('.drawer-body input,.drawer-body select,.drawer-body textarea')?.focus())" @keydown.escape.window="editor.open=false">
        <div class="drawer-head">
          <span class="drawer-title" x-text="(editor.id&&editor.entity!=='engagement'? t('form.edit'):t('form.new'))+' · '+t('ent.'+editor.entity)"></span>
          <span style="flex:1"></span>
          <button class="icon-btn" @click="editor.open=false" :aria-label="t('a11y.close')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg>
          </button>
        </div>
        <div class="drawer-body">
          <div class="form-grid">
            <template x-for="f in editor.fields" :key="f.k">
              <div class="field" :class="{wide: f.t==='textarea'||f.t==='tags'||f.t==='lines'||f.t==='multiref'||f.t==='refpickm'||f.t==='attckpick'||f.t==='d3auto'}">
                <label class="field-label" :for="'fld-'+f.k">
                  <span x-text="t('f.'+f.k)"></span><span x-show="f.req" class="req">*</span>
                </label>
                <template x-if="f.t==='auto'">
                  <div>
                    <div class="auto-name"><span class="mono-id" x-text="autoNamePreview()||t('form.autoPending')"></span></div>
                    <div class="note" x-text="t('form.autoHint')"></div>
                  </div>
                </template>
                <template x-if="f.t==='text'||f.t==='number'||f.t==='date'">
                  <input :id="'fld-'+f.k" :type="f.t==='number'?'number':(f.t==='date'?'date':'text')" class="input" x-model="editor.model[f.k]" :min="f.min" :max="f.max">
                </template>
                <template x-if="f.t==='textarea'">
                  <textarea :id="'fld-'+f.k" class="input" rows="3" x-model="editor.model[f.k]"></textarea>
                </template>
                <template x-if="f.t==='lines'">
                  <textarea :id="'fld-'+f.k" class="input" rows="3" x-model="editor.model[f.k]" :placeholder="t('form.linesHint')"></textarea>
                </template>
                <template x-if="f.t==='bool'">
                  <label class="bool-row"><input type="checkbox" x-model="editor.model[f.k]"><span x-text="t('form.yes')"></span></label>
                </template>
                <template x-if="f.t==='tags'">
                  <input :id="'fld-'+f.k" class="input" x-model="editor.model[f.k]" :placeholder="t('form.tagsHint')">
                </template>
                <template x-if="f.t==='select'">
                  <select :id="'fld-'+f.k" class="input" x-model="editor.model[f.k]">
                    <option value="" x-text="t('form.choose')"></option>
                    <template x-for="o in enums[f.opts]" :key="o"><option :value="o" x-text="optLabel(o)"></option></template>
                  </select>
                </template>
                <template x-if="f.t==='tlp'">
                  <select :id="'fld-'+f.k" class="input" x-model="editor.model[f.k]">
                    <option value="" x-text="t('form.choose')"></option>
                    <template x-for="o in enums.tlp" :key="o"><option :value="o" x-text="'TLP:'+o"></option></template>
                  </select>
                </template>
                <template x-if="f.t==='ref'">
                  <select :id="'fld-'+f.k" class="input" x-model="editor.model[f.k]">
                    <option value="" x-text="t('form.choose')"></option>
                    <template x-for="o in refOptions(f)" :key="o.id"><option :value="o.id" x-text="refOptLabel(f,o)"></option></template>
                  </select>
                </template>
                <template x-if="f.t==='refac'">
                  <div @click.outside="acState(f).open=false">
                    <template x-if="editor.model[f.k]">
                      <div class="ac-chosen">
                        <span x-text="acLabel(f,editor.model[f.k])"></span>
                        <button type="button" class="ic" @click="clearRefac(f)" :aria-label="t('btn.delete')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
                      </div>
                    </template>
                    <template x-if="!editor.model[f.k]">
                      <div class="ac-wrap">

  <template x-if="io.open">
    <div>

        <div class="drawer-head">
          <span class="drawer-title" x-text="io.mode==='export'? t('io.exportTitle'): (io.mode==='layer'? t('layer.title'): t('io.importTitle'))"></span>
          <span style="flex:1"></span>
          <button class="icon-btn" @click="io.open=false" :aria-label="t('a11y.close')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg>
          </button>
        </div>
        <div class="drawer-body">
          <p class="note" x-show="io.mode==='export'" x-text="t('io.exportNote')+' — '+(clientFilter==='all'? t('top.allClients'): orgName(clientFilter))+' · '+io.count+' '+t('io.records')"></p>
          <p class="note" x-show="io.mode==='import'" x-text="t('io.importNote')"></p>
          <p class="note" x-show="io.mode==='layer'" x-text="t('layer.importNote')"></p>
          <textarea class="input" rows="13" x-model="io.text" :readonly="io.mode==='export'" spellcheck="false" style="font-family:var(--font-data);font-size:11.5px;margin-top:8px"></textarea>
          <div x-show="io.mode==='export'||io.mode==='import'" style="margin-top:10px">
            <label class="field-label" :for="'io-pass'">
              <span x-text="io.mode==='export'? t('io.encOpt') : t('io.decOpt')"></span></label>
            <input :id="'io-pass'" type="password" class="input" x-model="io.pass" autocomplete="off" :placeholder="t('io.passPh')">
            <p class="note" style="margin-top:5px" x-text="t('io.encHint')"></p>
          </div>
        </div>
        <div class="drawer-foot">
          <template x-if="io.mode==='export'">
            <span style="display:flex;gap:9px">
              <button class="btn" @click="copyExport()" x-text="t('io.copy')"></button>
              <button class="btn btn--primary" @click="downloadExport()" x-text="t('io.download')"></button>
            </span>
          </template>
          <template x-if="io.mode==='import'">
            <span style="display:flex;gap:9px">
              <button class="btn btn--ghost" @click="io.open=false" x-text="t('btn.cancel')"></button>
              <button class="btn btn--primary" @click="doImport()" x-text="t('io.run')"></button>
            </span>
          </template>
          <template x-if="io.mode==='layer'">
            <span style="display:flex;gap:9px">
              <button class="btn btn--ghost" @click="loadSampleLayer()" x-text="t('layer.sample')"></button>

          </template>
        </div>

    </div>

  <template x-if="cmdk.open">

      <div class="drawer-scrim" @click="closeCmdk()"></div>
      <div role="dialog" aria-modal="true" :aria-label="t('search.placeholder')"
        x-init="$nextTick(()=>$el.querySelector('input')?.focus())"
        @keydown.escape.window="closeCmdk()" @keydown.arrow-down.prevent="cmdMove(1)" @keydown.arrow-up.prevent="cmdMove(-1)" @keydown.enter.prevent="cmdRun()"
        style="position:fixed;left:50%;top:14vh;transform:translateX(-50%);width:min(660px,92vw);z-index:42;
        background:var(--modal);border:1px solid var(--modal-border);border-radius:16px;box-shadow:0 24px 70px rgba(0,0,0,.4);overflow:hidden">
        <div style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border-2)">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--caret)" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
          <input type="text" :placeholder="t('cmd.placeholder')" x-model="cmdk.q" @input="cmdk.idx=0"
            style="flex:1;border:0;background:transparent;outline:none;font-size:15px;color:var(--text);caret-color:var(--caret)">
          <span class="kbd">esc</span>
        </div>
        <div class="cmd-list" role="listbox">
          <template x-for="(it,i) in cmdResults" :key="it.group+'-'+it.label">
            <button class="cmd-item" :class="{sel:i===cmdk.idx}" role="option" :aria-selected="i===cmdk.idx" @click="cmdRun(it)" @mouseenter="cmdk.idx=i">
              <span class="cmd-dot" :class="it.group==='act'?'act':'nav'"></span>
              <span class="cmd-label" x-text="it.label"></span>
              <span class="cmd-hint" x-text="it.hint"></span>
            </button>
          </template>
          <template x-if="!cmdResults.length"><div class="cmd-empty" x-text="t('cmd.none')"></div></template>
        </div>
        <div class="cmd-foot"><span class="kbd">↑</span><span class="kbd">↓</span><span x-text="t('cmd.navigate')"></span><span class="kbd">⏎</span><span x-text="t('cmd.select')"></span></div>
      </div>
    </div>
  </template>

  <!-- ============ TOASTS ============ -->
  <div class="toasts" aria-live="polite" aria-atomic="true">
    <template x-for="to in toasts" :key="to.id">

        <div style="flex:1">
          <div class="toast-title" x-text="to.title"></div>
          <div class="toast-msg" x-text="to.msg"></div>
        </div>
      </div>
    </template>
  </div>

const uid = () => (window.crypto&&crypto.randomUUID ? crypto.randomUUID()
  : 'id-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8));
const nowISO = () => new Date().toISOString();
async function sha256hex(str){
  try{ if(window.crypto&&crypto.subtle){
    const b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
  }}catch(e){}
  let h=0x811c9dc5>>>0; for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,0x01000193)>>>0;}
  return 'fnv'+('00000000'+(h>>>0).toString(16)).slice(-8);
}
const logCanon = e => [e.seq,e.ts,e.actor,e.action,e.entity,e.entityId,e.label].join('|');
async function chainLog(entries){
  let prev='GENESIS';
  for(const e of entries){ e.prevHash=prev; e.hash=await sha256hex(prev+'||'+logCanon(e)); prev=e.hash; }
  return entries;
}

].map(t=>({id:t.id,techniques:t.techniques.map(([id,name])=>({id,name}))}));
const TECH_NAMES={}; ATTCK.forEach(t=>t.techniques.forEach(x=>{TECH_NAMES[x.id]=x.name;}));
/* sous-techniques curées (pour l'autocomplétion des étapes de scénario) */
const SUBTECH={
  T1566:[['T1566.001','Spearphishing Attachment'],['T1566.002','Spearphishing Link'],['T1566.003','Spearphishing via Service']],
  T1059:[['T1059.001','PowerShell'],['T1059.003','Windows Command Shell'],['T1059.004','Unix Shell'],['T1059.006','Python'],['T1059.007','JavaScript']],
  T1078:[['T1078.002','Domain Accounts'],['T1078.003','Local Accounts'],['T1078.004','Cloud Accounts']],
  T1055:[['T1055.001','DLL Injection'],['T1055.002','PE Injection'],['T1055.012','Process Hollowing']],
  T1071:[['T1071.001','Web Protocols'],['T1071.004','DNS']],
  T1003:[['T1003.001','LSASS Memory'],['T1003.002','SAM'],['T1003.003','NTDS']],
  T1547:[['T1547.001','Registry Run Keys / Startup Folder']],
  T1053:[['T1053.005','Scheduled Task'],['T1053.003','Cron']],
  T1021:[['T1021.001','Remote Desktop Protocol'],['T1021.002','SMB / Windows Admin Shares'],['T1021.004','SSH']],
  T1110:[['T1110.001','Password Guessing'],['T1110.003','Password Spraying'],['T1110.004','Credential Stuffing']],
  T1027:[['T1027.002','Software Packing']],
  T1218:[['T1218.011','Rundll32']]
};
const ATTCK_FLAT=[]; ATTCK.forEach(t=>t.techniques.forEach(x=>{ ATTCK_FLAT.push({id:x.id,name:x.name,tac:t.id}); (SUBTECH[x.id]||[]).forEach(s=>ATTCK_FLAT.push({id:s[0],name:s[1],tac:t.id,sub:true})); }));
function attckBase(t){ return (t||'').split('.')[0]; }
function attckTechName(t){ const f=ATTCK_FLAT.find(x=>x.id===t); if(f) return f.name; return TECH_NAMES[attckBase(t)]||t; }
function attckTacOf(t){ const f=ATTCK_FLAT.find(x=>x.id===t)||ATTCK_FLAT.find(x=>x.id===attckBase(t)); return f?f.tac:null; }

/* =========================================================================
   IndexedDB — wrapper léger avec dégradation gracieuse (→ mémoire)
   ========================================================================= */
const Store = (() => {
  const DB='purpleCockpit', VER=1, STORE='kv';
  let dbp=null, mem={}, useMem=false;
  function open(){
    if(useMem) return Promise.resolve(null);
    if(dbp) return dbp;
    dbp=new Promise((res,rej)=>{
      let req;
      try{ req=indexedDB.open(DB,VER); }
      catch(e){ useMem=true; return res(null); }
      req.onupgradeneeded=()=>{ const d=req.result; if(!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE); };
      req.onsuccess=()=>res(req.result);
      req.onerror=()=>{ useMem=true; res(null); };
    }).catch(()=>{ useMem=true; return null; });
    return dbp;
  }
  async function get(key){
    const d=await open(); if(!d) return mem[key];
    return new Promise((res)=>{ try{ const r=d.transaction(STORE).objectStore(STORE).get(key);
      r.onsuccess=()=>res(r.result); r.onerror=()=>res(undefined);}catch(e){res(mem[key]);} });
  }
  async function set(key,val){
    const d=await open(); if(!d){ mem[key]=val; return; }
    return new Promise((res)=>{ try{ const tx=d.transaction(STORE,'readwrite'); tx.objectStore(STORE).put(val,key);
      tx.oncomplete=()=>res(); tx.onerror=()=>{ mem[key]=val; res(); }; }catch(e){ mem[key]=val; res(); } });
  }
  return {get,set,get isMemory(){return useMem;}};
})();

{id:"corp-aud-categories",nature:"metier",type:"methodo",profils:["aud","mgr"],normes:[{id:"A.8.29",url:ISO_URL}],hds:"SSI / MCO",
 titre:L("Red Team, Purple Team, Pentest, BAS : choisir la catégorie d'engagement","Red Team, Purple Team, Pentest, BAS: choosing the engagement category"),
 resume:L("Quatre natures d'exercice, quatre niveaux de collaboration avec la défense.","Four kinds of exercise, four levels of collaboration with the defence."),

  L("Pentest = « quelles failles ? » · Red = « résiste-t-on à cet acteur ? » · Purple = « détecte-t-on ses techniques ? » · BAS = « détecte-t-on encore ? »","Pentest = \"which flaws?\" · Red = \"do we withstand this actor?\" · Purple = \"do we detect its techniques?\" · BAS = \"do we still detect?\""),
  L("Le Purple se distingue par la Blue Team dans la boucle, étape par étape — c'est le seul format conçu pour améliorer la détection en direct.","Purple stands out by keeping the Blue Team in the loop, step by step — the only format designed to improve detection live."),

  L("Demander un Red Team quand le besoin réel est un Purple (mesurer la détection) : on obtient un scénario réussi mais aucun apprentissage défensif.","Asking for a Red Team when the real need is Purple (measuring detection): you get a successful scenario but no defensive learning."),

  L("Le pentest cherche l'exhaustivité des vulnérabilités sur un périmètre donné : la question est « où sont les failles ? ». Le Red Team émule un adversaire précis avec un objectif à atteindre, sans prévenir la défense : la question devient « résistons-nous à cet acteur ? ».","A pentest seeks exhaustive coverage of vulnerabilities across a given scope: the question is \"where are the flaws?\". A Red Team emulates a specific adversary with a goal to reach, without warning the defence: the question becomes \"do we withstand this actor?\"."),
  L("Le Purple Team joue la même chaîne d'attaque mais avec la Blue Team dans la boucle, étape par étape, pour mesurer et améliorer la détection en temps réel : « détectons-nous ses techniques, et sinon pourquoi ? ». Le BAS (Breach & Attack Simulation) automatise enfin la validation continue de techniques connues : « détectons-nous encore, après nos derniers changements ? ».","A Purple Team plays the same attack chain but with the Blue Team in the loop, step by step, to measure and improve detection in real time: \"do we detect its techniques, and if not why?\". BAS (Breach & Attack Simulation) finally automates continuous validation of known techniques: \"do we still detect, after our latest changes?\"."),

  L("Chaque technique retenue doit être rattachable à du renseignement réel sur l'acteur — pas à l'intuition de l'auditeur.","Each chosen technique must be traceable to real intelligence on the actor — not the auditor's intuition."),
  L("L'ordre kill-chain (accès initial → objectif) est ce qui rend la chaîne mesurable côté détection.","The kill-chain order (initial access → objective) is what makes the chain measurable on the detection side."),
  L("Le D3FEND suggéré donne d'emblée les contre-mesures attendues : c'est la grille de lecture de la Blue Team.","The suggested D3FEND gives the expected countermeasures upfront: it is the Blue Team's reading grid.")],
 pieges:[
  L("Empiler des techniques « impressionnantes » sans cohérence d'acteur : le scénario perd sa valeur d'émulation.","Stacking \"impressive\" techniques with no actor coherence: the scenario loses its emulation value."),
  L("Oublier de vérifier que chaque étape reste dans les RoE et le périmètre de l'audit.","Forgetting to check that each step stays within the audit's RoE and scope.")],
 body:{steps:[
  {t:L("Choisir l'acteur ou le profil de menace à émuler (rapport CTI, groupe suivi, menace sectorielle).","Choose the actor or threat profile to emulate (CTI report, tracked group, sector threat)."),r:"CTI",out:L("Acteur de référence documenté.","Reference actor documented.")},
  {t:L("Lister ses TTP connues : techniques et sous-techniques ATT&CK documentées.","List its known TTPs: documented ATT&CK techniques and sub-techniques."),r:"CTI",out:L("Inventaire de TTP sourcées.","Inventory of sourced TTPs.")},
  {t:L("Ordonner les techniques en kill-chain réaliste (accès initial → objectif).","Order the techniques into a realistic kill-chain (initial access → objective)."),r:"Auditeur",out:L("Chaîne séquencée par tactique.","Chain sequenced by tactic.")},
  {t:L("Pour chaque étape, préciser commande/outil et résultat attendu.","For each step, specify command/tool and expected result."),r:"Auditeur",out:L("Étapes exécutables et vérifiables.","Executable, verifiable steps.")},
  {t:L("Vérifier les contre-mesures D3FEND suggérées et ajuster (inclure/exclure).","Check the suggested D3FEND countermeasures and adjust (include/exclude)."),r:"Auditeur + Blue",out:L("Grille de détection attendue par étape.","Expected detection grid per step.")},
  {t:L("Faire relire la chaîne : jouable dans le périmètre et les RoE de l'audit ?","Have the chain reviewed: playable within the audit's scope and RoE?"),r:"Manager",out:L("Scénario validé pour exécution.","Scenario validated for execution.")}]},
 aller:[{label:L("MITRE ATT&CK — Techniques","MITRE ATT&CK — Techniques"),url:"https://attack.mitre.org/techniques/enterprise/"}],
 lies:["corp-cti-scenario","corp-aud-categories","corp-cti-cycle"]},

{id:"corp-aud-action",nature:"procedure",type:"methodo",profils:["aud"],normes:[{id:"A.5.28",url:ISO_URL}],hds:"SSI / MII",
 titre:L("Documenter une action de test (AuditAction)","Documenting a test action (AuditAction)"),
 resume:L("Ce qui distingue une note de terrain d'une preuve exploitable dans le rapport.","What separates a field note from evidence usable in the report."),
 objectif:L("Produire, au moment de l'action, une trace recevable qui tiendra dans le rapport et, si besoin, devant un auditeur.","Produce, at the moment of the action, an admissible trace that will hold in the report and, if needed, before an auditor."),
 quand:L("En continu pendant l'exécution, à chaque action significative — jamais en reconstitution après coup.","Continuously during execution, at every significant action — never reconstructed afterward."),
 source:{label:"pentest-standard.org",url:"http://www.pentest-standard.org/index.php/Reporting"},
 outil:L("Entité AuditAction (phase, technique, horodatage, preuves)","AuditAction entity (phase, technique, timestamp, evidence)"),
 keypoints:[
  L("La preuve se capture au moment du résultat : une reconstitution a posteriori perd sa valeur probante.","Evidence is captured at the moment of the result: an after-the-fact reconstruction loses its probative value."),
  L("L'horodatage doit être cohérent avec la télémétrie du client, pour permettre la corrélation côté Blue.","The timestamp must be consistent with the client's telemetry, to allow correlation on the Blue side."),
  L("Chaque action se rattache à une phase PTES et, si pertinent, à la technique ATT&CK jouée.","Each action attaches to a PTES phase and, where relevant, to the ATT&CK technique played.")],
 pieges:[
  L("Décrire l'action sans capturer la preuve : le finding devient invérifiable.","Describing the action without capturing evidence: the finding becomes unverifiable."),
  L("Horodatage en fuseau local non précisé : impossible à recouper avec les logs du SOC.","Timestamp in an unspecified local time zone: impossible to cross-reference with SOC logs.")],
 body:{steps:[
  {t:L("Horodater le début et la fin de l'action, en heure cohérente avec la télémétrie du client.","Timestamp the start and end of the action, in a time consistent with the client's telemetry."),r:"Auditeur",out:L("Fenêtre temporelle corrélable aux logs.","Time window correlatable with logs.")},
  {t:L("Rattacher l'action à sa phase PTES et, si pertinent, à la technique ATT&CK jouée.","Attach the action to its PTES phase and, where relevant, to the ATT&CK technique played."),r:"Auditeur",out:L("Action classée phase + technique.","Action classified by phase + technique.")},
  {t:L("Capturer la preuve au moment du résultat (capture, sortie de commande).","Capture evidence at the moment of the result (screenshot, command output)."),r:"Auditeur",out:L("Preuve horodatée attachée.","Timestamped evidence attached.")},
  {t:L("Noter la cible exacte (application, hôte) et l'outil/commande utilisés.","Note the exact target (application, host) and the tool/command used."),r:"Auditeur",out:L("Contexte technique reproductible.","Reproducible technical context.")},
  {t:L("Qualifier le résultat : succès, échec, partiel, information.","Qualify the result: success, failure, partial, information."),r:"Auditeur",out:L("Résultat qualifié.","Result qualified.")},
  {t:L("Si une vulnérabilité en découle, la créer et la lier à l'action immédiatement.","If a vulnerability results, create it and link it to the action immediately."),r:"Auditeur",out:L("Vulnérabilité liée à sa preuve d'origine.","Vulnerability linked to its source evidence.")}]},
 aller:[],
 lies:["corp-aud-exploit","corp-voc-preuves","corp-aud-rapport"]},

{id:"corp-aud-exploit",nature:"metier",type:"mapping",profils:["aud","voc"],normes:[],hds:"",
 titre:L("Qualifier l'exploitabilité : confirmée ou théorique","Qualifying exploitability: confirmed or theoretical"),
 resume:L("La distinction PTES qui pèse sur le rapport et la priorisation.","The PTES distinction that weighs on the report and prioritisation."),
 objectif:L("Séparer ce qui est démontré de ce qui est supposé, pour que le rapport n'affirme que ce qui est prouvé.","Separate what is demonstrated from what is assumed, so the report only asserts what is proven."),
 source:{label:"pentest-standard.org",url:"http://www.pentest-standard.org/index.php/Exploitation"},
 outil:L("Champs exploitabilite et preuve_exploitation de la vulnérabilité","Vulnerability exploitabilite and preuve_exploitation fields"),
 keypoints:[
  L("Confirmée = exploitée avec succès, preuve à l'appui : l'impact est démontré, pas supposé.","Confirmed = successfully exploited, with evidence: impact is demonstrated, not assumed."),
  L("Théorique = exposition identifiée mais non prouvée (hors périmètre, hors temps, hors RoE).","Theoretical = exposure identified but unproven (out of scope, out of time, out of RoE)."),
  L("La distinction borne ce que le rapport peut affirmer et module la priorisation côté client.","The distinction bounds what the report can assert and modulates prioritisation on the client side.")],
 body:{prose:[
  L("Une vulnérabilité « confirmée » a été exploitée avec succès pendant le test, preuve à l'appui : l'impact est démontré, pas supposé. C'est le niveau de certitude le plus élevé, celui qui justifie une remédiation urgente sans discussion.","A \"confirmed\" vulnerability was successfully exploited during the test, with evidence: impact is demonstrated, not assumed. It is the highest level of certainty, the one that justifies urgent remediation without debate."),
  L("Une vulnérabilité « théorique » présente une exposition identifiée mais non prouvée — parce que l'exploitation sortait du périmètre, du temps imparti ou des règles d'engagement. Elle reste un signal légitime, mais le rapport doit dire clairement qu'elle n'a pas été démontrée.","A \"theoretical\" vulnerability presents an identified but unproven exposure — because exploitation fell outside the scope, the allotted time or the rules of engagement. It remains a legitimate signal, but the report must clearly state it was not demonstrated."),
  L("La distinction n'est pas cosmétique : elle borne ce que le rapport peut affirmer, module la priorisation côté client, et, au sens PTES, sépare nettement la phase d'analyse de vulnérabilités (identification) de la phase d'exploitation (démonstration).","The distinction is not cosmetic: it bounds what the report can assert, modulates client-side prioritisation, and, in PTES terms, clearly separates the vulnerability analysis phase (identification) from the exploitation phase (demonstration).")]},
 aller:[],
 lies:["corp-aud-action","corp-voc-cvss","corp-voc-sla"]},
{id:"corp-aud-rapport",nature:"procedure",type:"gabarit",profils:["aud","mgr"],normes:[],hds:"",
 titre:L("Rédiger un rapport de pentest structuré PTES","Writing a PTES-structured pentest report"),
 resume:L("L'enchaînement des sections attendues et ce que chacune doit prouver.","The expected section sequence and what each must prove."),
 objectif:L("Produire un livrable qui parle au décideur comme au technicien, et qui transforme des constats en décisions.","Produce a deliverable that speaks to decision-makers and technicians alike, turning findings into decisions."),
 quand:L("En phase Reporting, une fois les actions et vulnérabilités consolidées.","In the Reporting phase, once actions and vulnerabilities are consolidated."),
 source:{label:"pentest-standard.org",url:"http://www.pentest-standard.org/index.php/Reporting"},
 outil:L("Générateur de livrables (rapport, preuves inline, marquage TLP + client)","Deliverable generator (report, inline evidence, TLP + client marking)"),
 keypoints:[
  L("Le résumé exécutif parle risque métier, jamais technique : c'est la seule section que le décideur lira en entier.","The executive summary speaks business risk, never technical: it is the only section a decision-maker will read in full."),
  L("Chaque vulnérabilité est une fiche autonome : constat, preuve, exploitabilité, impact, recommandation.","Each vulnerability is a standalone card: finding, evidence, exploitability, impact, recommendation."),
  L("Le rapport double audience (exécutif + technique) est une exigence PTES, pas une option de style.","The dual-audience report (executive + technical) is a PTES requirement, not a stylistic option.")],
 pieges:[
  L("Noyer le résumé exécutif dans le jargon : le décideur décroche et le rapport perd son effet.","Drowning the executive summary in jargon: the decision-maker disengages and the report loses its effect."),
  L("Recommandations génériques (« appliquer les correctifs ») au lieu d'actions priorisées et contextualisées.","Generic recommendations (\"apply patches\") instead of prioritised, contextualised actions.")],
 body:{steps:[
  {t:L("Résumé exécutif : risque métier en langage décideur, sans jargon technique.","Executive summary: business risk in decision-maker language, no technical jargon."),r:"Manager",out:L("1-2 pages lisibles par un non-technicien.","1-2 pages readable by a non-technical reader.")},
  {t:L("Contexte et périmètre : rappel du mandat, des exclusions et des limites rencontrées.","Context and scope: recap of the mandate, exclusions and limits encountered."),r:"Auditeur",out:L("Cadre de lecture des résultats.","Reading frame for the results.")},
  {t:L("Méthodologie : référentiels suivis, catégorie d'engagement, conditions de test.","Methodology: frameworks followed, engagement category, test conditions."),r:"Auditeur",out:L("Reproductibilité et crédibilité établies.","Reproducibility and credibility established.")},
  {t:L("Déroulé : chronologie des actions significatives, par phase PTES.","Walkthrough: chronology of significant actions, by PTES phase."),r:"Auditeur",out:L("Récit d'attaque traçable.","Traceable attack narrative.")},
  {t:L("Vulnérabilités : une fiche par finding (constat, preuve, exploitabilité, impact, reco).","Vulnerabilities: one card per finding (finding, evidence, exploitability, impact, rec)."),r:"Auditeur",out:L("Findings actionnables et priorisés.","Actionable, prioritised findings.")},
  {t:L("Volet Purple le cas échéant : chaîne jouée, verdicts, KPI de détection.","Purple section where relevant: chain played, verdicts, detection KPIs."),r:"Auditeur + Blue",out:L("Bilan défensif mesuré.","Measured defensive assessment.")},
  {t:L("Recommandations priorisées et annexes (preuves volumineuses, références).","Prioritised recommendations and appendices (bulky evidence, references)."),r:"Auditeur",out:L("Feuille de route de remédiation.","Remediation roadmap.")},
  {t:L("Relecture croisée puis validation avant diffusion TLP.","Cross-review then validation before TLP distribution."),r:"Manager",out:L("Rapport validé et marqué TLP/client.","Report validated and marked TLP/client.")}]},
 aller:[],
 lies:["corp-aud-exploit","corp-aud-action","corp-cti-tlp"]},

{id:"corp-aud-legal",nature:"metier",type:"gabarit",profils:["aud","mgr"],normes:[{id:"A.5.31",url:ISO_URL}],hds:"GRC",
 titre:L("Cadre légal du test d'intrusion","Legal framework of penetration testing"),
 resume:L("Pourquoi le mandat écrit n'est pas une formalité : sans lui, le test est une intrusion.","Why the written mandate is not a formality: without it, the test is an intrusion."),
 objectif:L("Comprendre ce qui protège juridiquement l'auditeur, et ce qui l'expose si le cadrage est bâclé.","Understand what legally protects the auditor, and what exposes them if scoping is rushed."),
 source:{label:"ISO/IEC 27001",url:ISO_URL},
 outil:L("Clause de mandat · clauses légales · NDA structuré de l'audit","Mandate clause · legal clauses · audit structured NDA"),
 keypoints:[
  L("Un test reproduit des actes qui, hors mandat, relèvent de l'accès frauduleux à un système de traitement.","A test reproduces acts that, without a mandate, amount to fraudulent access to a processing system."),
  L("La protection repose sur une autorisation signée par une personne réellement habilitée à engager le propriétaire du périmètre.","Protection rests on an authorisation signed by a person genuinely empowered to bind the scope's owner."),
  L("La conduite en cas de découverte fortuite (données illégales, compromission préexistante) doit être prévue au contrat.","The conduct for incidental discovery (illegal data, pre-existing compromise) must be set out in the contract.")],
 pieges:[
  L("Signataire sans autorité sur des actifs hébergés chez un tiers : le mandat ne couvre pas ces systèmes.","Signatory without authority over third-party-hosted assets: the mandate does not cover those systems."),
  L("Absence de clause sur la découverte fortuite : l'auditeur se retrouve sans conduite à tenir.","No clause on incidental discovery: the auditor is left with no course of action.")],
 body:{prose:[
  L("Un test d'intrusion reproduit des actes qui, hors mandat, relèvent de l'accès frauduleux à un système de traitement automatisé de données. La protection de l'auditeur repose entièrement sur une autorisation écrite, signée par une personne habilitée à engager le propriétaire du périmètre.","A penetration test reproduces acts that, without a mandate, amount to fraudulent access to an automated data processing system. The auditor's protection rests entirely on a written authorisation, signed by a person empowered to bind the scope's owner."),
  L("D'où un point de vigilance central : vérifier que le signataire a bien autorité sur tous les systèmes inclus. Les actifs hébergés chez un tiers (cloud, infogérance) échappent souvent à cette autorité et nécessitent une autorisation distincte du prestataire concerné.","Hence a central point of vigilance: verify that the signatory truly has authority over all included systems. Third-party-hosted assets (cloud, outsourcing) often fall outside that authority and require a separate authorisation from the provider concerned."),
  L("Le NDA encadre la confidentialité des constats ; les clauses légales couvrent la conservation des preuves, le traitement des données personnelles rencontrées et — point trop souvent oublié — la conduite à tenir en cas de découverte fortuite : données manifestement illégales, ou compromission préexistante indépendante du test.","The NDA frames the confidentiality of findings; the legal clauses cover evidence retention, the handling of personal data encountered and — too often forgotten — the conduct for incidental discovery: manifestly illegal data, or a pre-existing compromise unrelated to the test.")]},
 aller:[],
 lies:["corp-aud-cadrage","corp-aud-urgence"]},

{id:"corp-aud-urgence",nature:"procedure",type:"methodo",profils:["aud"],normes:[{id:"A.8.34",url:ISO_URL}],hds:"SSI / MII",
 titre:L("Incident pendant un test : procédure d'arrêt d'urgence","Incident during a test: emergency stop procedure"),
 resume:L("Que faire quand le test dérape ou percute un incident réel.","What to do when a test goes wrong or collides with a real incident."),
 objectif:L("Réagir sans aggraver : suspendre, alerter, préserver, tracer — dans cet ordre.","React without making things worse: suspend, alert, preserve, log — in that order."),
 quand:L("Dès qu'une action produit un effet non prévu, ou qu'une compromission préexistante est suspectée.","As soon as an action produces an unexpected effect, or a pre-existing compromise is suspected."),
 source:{label:"pentest-standard.org",url:"http://www.pentest-standard.org/index.php/Pre-engagement"},
 outil:L("contacts_urgence[] et regles_engagement du bloc engagement","contacts_urgence[] and regles_engagement of the engagement block"),
 keypoints:[
  L("Le premier réflexe est l'arrêt, pas l'investigation : on stoppe avant de comprendre.","The first reflex is to stop, not to investigate: halt before understanding."),
  L("Une compromission préexistante ne se touche pas : on préserve l'état et on escalade.","A pre-existing compromise is not to be touched: preserve the state and escalate."),
  L("Aucune reprise sans accord explicite du contact d'autorisation, tracé au journal.","No resumption without the authorising contact's explicit agreement, logged in the journal.")],
 pieges:[
  L("Continuer « pour vérifier » après un effet anormal : on risque d'aggraver un incident réel.","Continuing \"to check\" after an abnormal effect: you risk worsening a real incident."),
  L("Effacer ses traces avant d'alerter : on détruit des éléments potentiellement probants.","Wiping your traces before alerting: you destroy potentially probative elements.")],
 body:{steps:[
  {t:L("Suspendre immédiatement toute action offensive sur le périmètre concerné.","Immediately suspend all offensive action on the affected scope."),r:"Auditeur",out:L("Activité offensive gelée.","Offensive activity frozen.")},
  {t:L("Contacter le contact d'urgence défini au cadrage, par le canal convenu.","Contact the emergency contact defined at scoping, via the agreed channel."),r:"Auditeur",out:L("Alerte transmise sans délai.","Alert relayed without delay.")},
  {t:L("Décrire factuellement : action en cours, cible, effet observé, heure exacte.","Describe factually: action in progress, target, observed effect, exact time."),r:"Auditeur",out:L("Compte rendu factuel horodaté.","Factual, timestamped report.")},
  {t:L("Si suspicion de compromission préexistante : ne rien toucher, préserver l'état.","If a pre-existing compromise is suspected: touch nothing, preserve the state."),r:"Auditeur + Blue",out:L("État préservé pour investigation.","State preserved for investigation.")},
  {t:L("Consigner l'événement dans le journal d'audit avant toute reprise.","Log the event in the audit journal before any resumption."),r:"Auditeur",out:L("Trace tamper-evident de l'incident.","Tamper-evident trace of the incident.")},
  {t:L("Ne reprendre le test qu'après accord explicite du contact d'autorisation.","Resume the test only after the authorising contact's explicit agreement."),r:"Manager",out:L("Go de reprise tracé.","Resumption go logged.")}]},
 aller:[],
 lies:["corp-aud-cadrage","corp-aud-legal","corp-mgr-incidents"]},

/* ==================== VOC ==================== */
{id:"corp-voc-cycle",nature:"processus",type:"methodo",profils:["voc"],normes:[{id:"A.8.8",url:ISO_URL}],hds:"SSI / MCO",
 titre:L("Cycle de vie d'une vulnérabilité","Vulnerability lifecycle"),
 resume:L("De la découverte à la remédiation validée, et où interviennent CVSS/EPSS/KEV/SSVC.","From discovery to validated remediation, and where CVSS/EPSS/KEV/SSVC come in."),
 objectif:L("Suivre une vulnérabilité comme un objet vivant, dont la priorité peut changer à mesure que le renseignement évolue.","Track a vulnerability as a living object whose priority can change as intelligence evolves."),
 quand:L("Dès qu'une faiblesse est identifiée — par audit, scan ou signalement — et jusqu'à sa validation après correction.","As soon as a weakness is identified — by audit, scan or report — and until it is validated after fixing."),
 source:{label:"CIRCL Vulnerability-Lookup",url:"https://vulnerability.circl.lu/"},
 outil:L("Entité Vulnérabilité · SLA §6ter · tickets de détection","Vulnerability entity · SLA §6ter · detection tickets"),
 keypoints:[
  L("La priorité n'est pas figée à la découverte : un passage en KEV peut faire remonter une vulnérabilité d'un coup.","Priority is not fixed at discovery: a move into KEV can bump a vulnerability up all at once."),
  L("L'outil priorise et documente ; il ne pilote pas le déploiement du correctif (frontière avec le tracker de parc).","The tool prioritises and documents; it does not drive patch deployment (boundary with the fleet tracker)."),
  L("La validation par re-test est ce qui ferme le cycle — sans elle, la remédiation reste une intention.","Validation by re-test is what closes the cycle — without it, remediation stays an intention.")],
 loop:L("↺ une vulnérabilité peut revenir en Qualification si une nouvelle intelligence (ex. passage en KEV) modifie sa priorité.","↺ a vulnerability can return to Qualification if new intelligence (e.g. a move into KEV) changes its priority."),
 body:{stages:[
  {t:L("Découverte","Discovery"),d:L("Issue d'une action d'audit, d'un scan ou d'un signalement externe.","From an audit action, a scan or an external report."),dec:L("décision : doublon connu ?","decision: known duplicate?")},
  {t:L("Qualification","Qualification"),d:L("Enrichissement CVSS/CWE/CAPEC (saisie ou CIRCL), qualification de l'exploitabilité (confirmée / théorique).","CVSS/CWE/CAPEC enrichment (manual or CIRCL), exploitability qualification (confirmed / theoretical).")},
  {t:L("Priorisation","Prioritisation"),d:L("Combinaison EPSS + KEV + SSVC + VEX → niveau P1–P4.","Combining EPSS + KEV + SSVC + VEX → level P1–P4."),dec:L("si KEV → échéance imposée","if KEV → imposed deadline")},
  {t:L("Remédiation","Remediation"),d:L("Transmission au tracker VOC de parc — l'outil priorise, il ne pilote pas le déploiement du correctif.","Handover to the VOC fleet tracker — the tool prioritises, it does not drive patch deployment.")},
  {t:L("Validation","Validation"),d:L("Re-test, mise à jour du statut, bouclage sur la couverture Purple si issue d'un exercice.","Re-test, status update, loop back to Purple coverage if it came from an exercise.")}]},
 aller:[],
 lies:["corp-voc-signaux","corp-voc-sla","corp-voc-frontiere"]},

{id:"corp-voc-cvss",nature:"metier",type:"methodo",profils:["voc"],normes:[],hds:"",
 titre:L("Scorer une vulnérabilité : CVSS 3.1 et 4.0","Scoring a vulnerability: CVSS 3.1 and 4.0"),
 resume:L("Ce que mesure le vecteur, et ce qu'il ne mesure pas.","What the vector measures, and what it doesn't."),
 objectif:L("Utiliser CVSS pour ce qu'il est — une mesure de sévérité technique — sans lui faire dire ce qu'il ne dit pas.","Use CVSS for what it is — a technical severity measure — without making it say what it doesn't."),
 source:{label:"FIRST — CVSS",url:"https://www.first.org/cvss/"},
 outil:L("Champ CVSS + vecteur de la vulnérabilité","Vulnerability CVSS + vector field"),
 keypoints:[
  L("CVSS mesure la sévérité technique intrinsèque, pas le risque réel pour votre organisation.","CVSS measures intrinsic technical severity, not the real risk to your organisation."),
  L("La 4.0 affine la granularité : exigences d'attaque, impacts sur systèmes subséquents, séparation base/contexte.","4.0 refines granularity: attack requirements, subsequent-system impacts, base/context separation."),
  L("Un 9.8 sur un système isolé peut être moins urgent qu'un 7.5 sur l'actif critique exposé.","A 9.8 on an isolated system can be less urgent than a 7.5 on the exposed critical asset.")],
 pieges:[
  L("Prioriser au score CVSS seul : on traite des 9.8 inertes avant des 7.5 réellement exploités.","Prioritising on the CVSS score alone: you treat inert 9.8s before actively exploited 7.5s."),
  L("Oublier de reporter le vecteur : sans lui, le score n'est pas auditable ni recalculable.","Forgetting to record the vector: without it, the score is neither auditable nor recomputable.")],
 body:{prose:[
  L("CVSS mesure la sévérité technique intrinsèque d'une vulnérabilité : vecteur d'accès, complexité, privilèges requis, interaction utilisateur, et impact sur la confidentialité, l'intégrité et la disponibilité. C'est une photographie de « à quel point c'est grave en soi », indépendamment du contexte.","CVSS measures a vulnerability's intrinsic technical severity: access vector, complexity, required privileges, user interaction, and impact on confidentiality, integrity and availability. It is a snapshot of \"how bad it is in itself\", independent of context."),
  L("La version 4.0 affine la granularité — exigences d'attaque, impacts sur les systèmes subséquents — et clarifie la séparation entre le score de base (intrinsèque) et le contexte (environnemental, temporel). Elle corrige plusieurs angles morts de la 3.1, notamment sur les chaînes d'exploitation.","Version 4.0 refines granularity — attack requirements, impacts on subsequent systems — and clarifies the separation between the base score (intrinsic) and context (environmental, temporal). It fixes several blind spots of 3.1, notably on exploitation chains."),
  L("Ce que CVSS ne dit pas, c'est l'essentiel pour prioriser : la probabilité d'exploitation réelle (rôle d'EPSS), l'exploitation avérée dans la nature (rôle de KEV), et l'importance de l'actif pour le métier. D'où la priorisation multi-signaux : CVSS est un ingrédient, jamais la décision.","What CVSS doesn't say is what matters most for prioritising: the real probability of exploitation (EPSS's role), proven exploitation in the wild (KEV's role), and the asset's importance to the business. Hence multi-signal prioritisation: CVSS is an ingredient, never the decision.")]},
 aller:[{label:"FIRST — CVSS Calculator",url:"https://www.first.org/cvss/calculator/4.0"}],
 lies:["corp-voc-signaux","corp-voc-sla"]},

{id:"corp-voc-signaux",nature:"metier",type:"methodo",profils:["voc"],normes:[],hds:"",
 titre:L("Compléter le scoring : EPSS, KEV, SSVC, VEX","Rounding out the scoring: EPSS, KEV, SSVC, VEX"),
 resume:L("Quatre signaux complémentaires, quatre questions différentes.","Four complementary signals, four different questions."),
 objectif:L("Combiner quatre signaux qui répondent chacun à une question distincte, plutôt que d'en absolutiser un seul.","Combine four signals that each answer a distinct question, rather than absolutising one."),
 source:{label:"CISA — SSVC",url:"https://www.cisa.gov/stakeholder-specific-vulnerability-categorization-ssvc"},
 outil:L("Enrichissement CIRCL · champs EPSS/KEV/SSVC/VEX de la vulnérabilité","CIRCL enrichment · vulnerability EPSS/KEV/SSVC/VEX fields"),
 keypoints:[
  L("EPSS = probabilité (prédictif) · KEV = exploitation avérée (constaté) · SSVC = décision · VEX = applicabilité.","EPSS = probability (predictive) · KEV = proven exploitation (observed) · SSVC = decision · VEX = applicability."),
  L("Ordre de lecture : VEX (concerné ?) → KEV (exploité ?) → EPSS (le sera-t-il ?) → SSVC (que fait-on ?).","Reading order: VEX (affected?) → KEV (exploited?) → EPSS (will it be?) → SSVC (what do we do?)."),
  L("VEX not_affected justifié permet de sortir légitimement une vulnérabilité du circuit — un gain de temps considérable.","A justified VEX not_affected legitimately removes a vulnerability from the loop — a considerable time saver.")],
 body:{prose:[
  L("EPSS (FIRST) estime la probabilité qu'une vulnérabilité soit exploitée dans les 30 jours : un signal prédictif, recalculé quotidiennement. KEV (CISA) recense au contraire l'exploitation avérée dans la nature et impose une échéance de remédiation : un signal constaté, pas une prédiction.","EPSS (FIRST) estimates the probability that a vulnerability will be exploited within 30 days: a predictive signal, recomputed daily. KEV (CISA), by contrast, records proven exploitation in the wild and imposes a remediation deadline: an observed signal, not a prediction."),
  L("SSVC transforme ces signaux en décision d'action — Track, Track*, Attend, Act — via un arbre qui tient compte de l'automatisabilité de l'exploitation et de l'impact sur la mission. C'est le pont entre « quel score ? » et « que fait-on ? ». VEX, enfin, dit si le produit est réellement affecté (affected, not_affected, fixed, under_investigation) : le filtre d'applicabilité qui évite de mobiliser des équipes sur ce qui ne s'applique pas.","SSVC turns these signals into an action decision — Track, Track*, Attend, Act — via a tree accounting for exploitation automatability and mission impact. It is the bridge between \"what score?\" and \"what do we do?\". VEX, finally, states whether the product is actually affected (affected, not_affected, fixed, under_investigation): the applicability filter that avoids mobilising teams on what doesn't apply."),
  L("En pratique, l'ordre de lecture le plus efficace est : VEX d'abord (sommes-nous concernés ?), puis KEV (est-ce exploité maintenant ?), puis EPSS (le sera-t-il bientôt ?), et enfin SSVC pour trancher l'action.","In practice, the most effective reading order is: VEX first (are we affected?), then KEV (is it exploited now?), then EPSS (will it be soon?), and finally SSVC to settle the action.")],
 table:{head:[L("Signal","Signal"),L("Question posée · nature","Question asked · nature")],rows:[
  ["cyan","VEX",L("Le produit est-il réellement affecté ? · applicabilité","Is the product actually affected? · applicability")],
  ["red","KEV",L("L'exploitation est-elle avérée ? · constaté","Is exploitation proven? · observed")],
  ["violet","EPSS",L("Quelle probabilité à 30 jours ? · prédictif","What probability at 30 days? · predictive")],
  ["amber","SSVC",L("Quelle décision d'action ? · arbitrage","What action decision? · arbitration")]]}},
 aller:[{label:"CISA — KEV Catalog",url:"https://www.cisa.gov/known-exploited-vulnerabilities-catalog"},{label:"FIRST — EPSS",url:"https://www.first.org/epss/"}],
 lies:["corp-voc-cvss","corp-voc-sla","corp-voc-circl"]},
{id:"corp-voc-cwe",nature:"metier",type:"mapping",profils:["voc","aud"],normes:[],hds:"",
 titre:L("Classer une faiblesse : OWASP, CWE, CAPEC","Classifying a weakness: OWASP, CWE, CAPEC"),
 resume:L("Trois taxonomies souvent confondues, trois objets différents.","Three often-confused taxonomies, three different objects."),
 objectif:L("Ne plus confondre la faiblesse (CWE), le patron d'attaque (CAPEC) et la catégorie de risque (OWASP).","Stop confusing the weakness (CWE), the attack pattern (CAPEC) and the risk category (OWASP)."),
 source:{label:"cwe.mitre.org",url:"https://cwe.mitre.org/"},
 outil:L("Pickers OWASP / CWE / CAPEC de la vulnérabilité","Vulnerability OWASP / CWE / CAPEC pickers"),
 keypoints:[
  L("CWE décrit la faiblesse dans le code (ex. injection SQL = CWE-89) — précis et stable.","CWE describes the weakness in the code (e.g. SQL injection = CWE-89) — precise and stable."),
  L("CAPEC décrit comment l'attaquant l'exploite — le vecteur, pas la faille.","CAPEC describes how the attacker exploits it — the vector, not the flaw."),
  L("OWASP Top 10 regroupe des catégories de risque pour la lecture managériale — pas une classification technique fine.","OWASP Top 10 groups risk categories for managerial reading — not a fine technical classification.")],
 body:{prose:[
  L("Le CWE (Common Weakness Enumeration) décrit la faiblesse elle-même, dans le code ou la conception : une injection SQL est CWE-89, un XSS est CWE-79. C'est une taxonomie précise et stable, idéale pour classer un finding sans ambiguïté.","CWE (Common Weakness Enumeration) describes the weakness itself, in code or design: a SQL injection is CWE-89, an XSS is CWE-79. It is a precise, stable taxonomy, ideal for classifying a finding without ambiguity."),
  L("Le CAPEC (Common Attack Pattern Enumeration) décrit le patron d'attaque qui exploite cette faiblesse — le comment de l'attaquant. L'OWASP Top 10, enfin, regroupe des catégories de risque applicatif à des fins de sensibilisation et de couverture, pas de classification technique.","CAPEC (Common Attack Pattern Enumeration) describes the attack pattern that exploits this weakness — the attacker's how. The OWASP Top 10, finally, groups application risk categories for awareness and coverage, not technical classification."),
  L("En pratique : une vulnérabilité se classe d'abord par CWE (précis), se rattache à un CAPEC quand le vecteur d'attaque est documenté, et se mappe à l'OWASP Top 10 pour la lecture managériale du rapport. Les trois cohabitent, chacun à son niveau de lecture.","In practice: a vulnerability is first classified by CWE (precise), attached to a CAPEC when the attack vector is documented, and mapped to the OWASP Top 10 for the report's managerial reading. All three coexist, each at its reading level.")],
 table:{head:[L("Taxonomie","Taxonomy"),L("Ce qu'elle décrit","What it describes")],rows:[
  ["violet","CWE",L("La faiblesse dans le code / la conception","The weakness in code / design")],
  ["red","CAPEC",L("Le patron d'attaque qui l'exploite","The attack pattern that exploits it")],
  ["amber","OWASP Top 10",L("La catégorie de risque (lecture managériale)","The risk category (managerial reading)")]]}},
 aller:[{label:"CAPEC — MITRE",url:"https://capec.mitre.org/"}],
 lies:["corp-voc-cvss","corp-aud-exploit"]},

{id:"corp-voc-sla",nature:"processus",type:"mapping",profils:["voc","mgr"],normes:[{id:"A.8.8",url:ISO_URL}],hds:"SSI / MCO",
 titre:L("Déterminer le SLA de remédiation (P1–P4)","Determining the remediation SLA (P1–P4)"),
 resume:L("La logique multi-signaux qui fixe l'échéance, et le cas particulier KEV.","The multi-signal logic that sets the deadline, and the KEV special case."),
 objectif:L("Dériver une échéance de remédiation défendable à partir de signaux objectifs, pas d'une sévérité brute.","Derive a defensible remediation deadline from objective signals, not raw severity."),
 quand:L("À la priorisation, une fois la vulnérabilité qualifiée et enrichie.","At prioritisation, once the vulnerability is qualified and enriched."),
 source:{label:"CISA — KEV",url:"https://www.cisa.gov/known-exploited-vulnerabilities-catalog"},
 outil:L("SLA de remédiation §6ter (niveaux P1–P4 configurables)","Remediation SLA §6ter (configurable P1–P4 levels)"),
 keypoints:[
  L("KEV est un plancher non négociable : présence dans le catalogue = P1, échéance alignée sur la dueDate CISA.","KEV is a non-negotiable floor: presence in the catalog = P1, deadline aligned with the CISA dueDate."),
  L("VEX not_affected justifié sort la vulnérabilité du circuit SLA — statut suivi, pas d'échéance.","A justified VEX not_affected removes the vulnerability from the SLA loop — tracked status, no deadline."),
  L("EPSS ou CVSS peuvent faire remonter d'un niveau, jamais descendre sous le plancher KEV.","EPSS or CVSS can bump a level up, never below the KEV floor.")],
 loop:L("↺ un nouveau signal (passage en KEV, hausse EPSS) recalcule le niveau et peut raccourcir l'échéance.","↺ a new signal (move into KEV, EPSS rise) recomputes the level and can shorten the deadline."),
 body:{stages:[
  {t:L("Applicabilité","Applicability"),d:L("VEX not_affected justifié → sortie du circuit SLA (statut suivi, pas d'échéance).","Justified VEX not_affected → exit the SLA loop (tracked status, no deadline).")},
  {t:L("Exploitation avérée","Proven exploitation"),d:L("Présence KEV → P1 d'office, échéance alignée sur la dueDate CISA.","KEV presence → automatic P1, deadline aligned with the CISA dueDate."),dec:L("KEV = plancher non négociable","KEV = non-negotiable floor")},
  {t:L("Décision SSVC","SSVC decision"),d:L("Act → P1 · Attend → P2 · Track*/Track → P3/P4, modulé par l'impact mission.","Act → P1 · Attend → P2 · Track*/Track → P3/P4, modulated by mission impact.")},
  {t:L("Ajustement signaux","Signal adjustment"),d:L("EPSS élevé ou CVSS critique peuvent remonter d'un niveau ; jamais descendre sous KEV.","High EPSS or critical CVSS can bump up a level; never below KEV.")},
  {t:L("Échéance","Deadline"),d:L("Chaque niveau P1–P4 porte un délai configurable par client ; dépassement = hors SLA au cockpit.","Each P1–P4 level carries a per-client configurable delay; overrun = out of SLA on the cockpit.")}]},
 aller:[],
 lies:["corp-voc-signaux","corp-voc-cycle","corp-mgr-conformite"]},

{id:"corp-voc-patch",nature:"processus",type:"methodo",profils:["voc"],normes:[{id:"A.8.8",url:ISO_URL},{id:"A.8.9",url:ISO_URL}],hds:"SSI / MCO",
 titre:L("Patch management : le cycle de déploiement des correctifs","Patch management: the fix deployment cycle"),
 resume:L("Purement méthodologique : le suivi de déploiement reste sur le tracker VOC de parc.","Purely methodological: deployment tracking stays on the VOC fleet tracker."),
 objectif:L("Comprendre le cycle de correctif que l'outil alimente en priorité, sans chercher à le piloter à la place du tracker de parc.","Understand the fix cycle the tool feeds priority into, without trying to drive it in place of the fleet tracker."),
 quand:L("En aval de la priorisation, côté exploitation du parc — hors périmètre de suivi de l'outil.","Downstream of prioritisation, on the fleet operations side — outside the tool's tracking scope."),
 source:{label:"ISO/IEC 27001",url:ISO_URL},
 outil:L("Aucune entité dédiée — frontière assumée avec le tracker de parc","No dedicated entity — deliberate boundary with the fleet tracker"),
 keypoints:[
  L("Un correctif se teste avant de se déployer : régression fonctionnelle, prérequis, rollback préparé.","A fix is tested before deployment: functional regression, prerequisites, rollback prepared."),
  L("Toute dérogation est motivée, datée et bornée dans le temps — sinon elle devient une dette invisible.","Every exemption is justified, dated and time-bounded — otherwise it becomes invisible debt."),
  L("L'outil fournit la priorité (quoi corriger d'abord) ; le tracker de parc gère le déploiement (comment, quand, où).","The tool provides the priority (what to fix first); the fleet tracker handles deployment (how, when, where).")],
 pieges:[
  L("Déployer en production sans fenêtre de rollback : un correctif régressif devient un incident.","Deploying to production without a rollback window: a regressive fix becomes an incident."),
  L("Dérogation « temporaire » sans date d'expiration : elle se pérennise et échappe au suivi.","A \"temporary\" exemption with no expiry date: it becomes permanent and escapes tracking.")],
 loop:L("↺ un correctif en échec revient en Test ; une dérogation expire et revient en Planification.","↺ a failed fix returns to Test; an exemption expires and returns to Planning."),
 body:{stages:[
  {t:L("Veille & réception","Watch & intake"),d:L("Bulletins éditeurs, corrélation avec l'inventaire (CPE) des actifs.","Vendor advisories, correlation with the asset inventory (CPE).")},
  {t:L("Test","Test"),d:L("Validation en environnement représentatif : régression fonctionnelle, prérequis, rollback préparé.","Validation in a representative environment: functional regression, prerequisites, rollback prepared.")},
  {t:L("Planification","Planning"),d:L("Fenêtre de maintenance, séquencement par criticité d'actif, communication.","Maintenance window, sequencing by asset criticality, communication.")},
  {t:L("Déploiement","Deployment"),d:L("Application progressive, supervision des effets, plan de retour arrière prêt.","Progressive rollout, effect monitoring, rollback plan ready."),dec:L("échec → rollback","failure → rollback")},
  {t:L("Vérification & dérogations","Verification & exemptions"),d:L("Contrôle d'application effective ; toute dérogation est motivée, datée et bornée.","Check of effective application; every exemption is justified, dated and bounded.")}]},
 aller:[],
 lies:["corp-voc-cycle","corp-voc-frontiere"]},

{id:"corp-voc-circl",nature:"metier",type:"methodo",profils:["voc"],normes:[],hds:"",
 titre:L("Sources d'enrichissement CVE : CIRCL, GCVE, dumps offline","CVE enrichment sources: CIRCL, GCVE, offline dumps"),
 resume:L("Fonctionnement, limites temporelles et repli hors-ligne.","How it works, timing limits and offline fallback."),
 objectif:L("Choisir sa source d'enrichissement selon deux contraintes : fraîcheur de la donnée et confidentialité des requêtes.","Choose your enrichment source by two constraints: data freshness and query confidentiality."),
 source:{label:"vulnerability.circl.lu",url:"https://vulnerability.circl.lu/"},
 outil:L("enrichment_base_url configurable · ré-enrichissement · cache sur le finding","configurable enrichment_base_url · re-enrichment · cache on the finding"),
 keypoints:[
  L("Les champs de base (CVSS, CWE, CAPEC) sont fiables dès publication ; le bloc corrélé (EPSS, SSVC, KEV) arrive en décalé.","Base fields (CVSS, CWE, CAPEC) are reliable at publication; the correlated block (EPSS, SSVC, KEV) arrives with a lag."),
  L("L'instance publique journalise les requêtes : pour un enrichissement sans fuite, pointer vers une instance interne ou GCVE.","The public instance logs queries: for leak-free enrichment, point to an internal instance or GCVE."),
  L("L'action « ré-enrichir » existe précisément parce que les CVE fraîches ont souvent des champs corrélés vides.","The \"re-enrich\" action exists precisely because fresh CVEs often have empty correlated fields.")],
 pieges:[
  L("Traiter l'absence d'EPSS/SSVC comme une donnée fiable : c'est souvent un simple décalage de calcul, pas un « pas de risque ».","Treating the absence of EPSS/SSVC as reliable data: it is often just a computation lag, not \"no risk\"."),
  L("Interroger l'instance publique sur des CVE sensibles internes : les requêtes sont journalisées côté fournisseur.","Querying the public instance on sensitive internal CVEs: the queries are logged on the provider side.")],
 body:{prose:[
  L("Le Vulnerability-Lookup du CIRCL agrège les données par CVE : CVSS et vecteur, CWE, CAPEC, produits affectés, références — tous fiables dès la publication de la CVE. C'est la source par défaut de l'enrichissement à la saisie.","CIRCL's Vulnerability-Lookup aggregates data by CVE: CVSS and vector, CWE, CAPEC, affected products, references — all reliable from CVE publication. It is the default source for enrichment at entry."),
  L("Le bloc corrélé — EPSS, SSVC, appartenance KEV — arrive en revanche en décalé : il est souvent absent pour les CVE fraîchement publiées, car EPSS est recalculé quotidiennement et les décisions SSVC/vulnrichment prennent du temps. D'où le parsing défensif de l'outil (tout est optionnel) et l'action « ré-enrichir » pour compléter plus tard.","The correlated block — EPSS, SSVC, KEV membership — arrives with a lag, however: it is often absent for freshly published CVEs, because EPSS is recomputed daily and SSVC/vulnrichment decisions take time. Hence the tool's defensive parsing (everything is optional) and the \"re-enrich\" action to complete later."),
  L("Point de confidentialité : l'instance publique journalise les requêtes. Pour un enrichissement sans fuite d'information sur vos vulnérabilités internes, on pointe enrichment_base_url vers une instance auto-hébergée ou vers GCVE. En mode entièrement hors-ligne, on importe les dumps CIRCL ou des extraits ciblés KEV/EPSS, au prix d'un stockage plus lourd.","Confidentiality point: the public instance logs queries. For enrichment without leaking information about your internal vulnerabilities, point enrichment_base_url to a self-hosted instance or to GCVE. In fully offline mode, import the CIRCL dumps or targeted KEV/EPSS extracts, at the cost of heavier storage.")]},
 aller:[{label:"GCVE",url:"https://gcve.eu/"}],
 lies:["corp-voc-signaux","corp-voc-frontiere"]},

{id:"corp-voc-frontiere",nature:"metier",type:"mapping",profils:["voc","mgr"],normes:[],hds:"Organisation & prestation",
 titre:L("Frontière outil / tracker VOC de parc","Boundary: tool / VOC fleet tracker"),
 resume:L("L'outil enrichit et priorise pour le rapport et le SLA ; le suivi de remédiation de parc reste ailleurs.","The tool enriches and prioritises for the report and the SLA; fleet remediation tracking stays elsewhere."),
 objectif:L("Poser une frontière nette pour éviter deux vérités divergentes entre ce cockpit et le tracker de parc.","Set a clear boundary to avoid two diverging truths between this cockpit and the fleet tracker."),
