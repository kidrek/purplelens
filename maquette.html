        enriched:!!(v.voc_enriched_at||v.epss_score!=null||v.kev), app:(v.applications&&v.applications.length)?v.applications.map(id=>this.appName(id)).join(', '):(v.application_id?this.appName(v.application_id):null)}; },
    slaClass(p){ return {P1:'red',P2:'amber',P3:'blue',P4:'gray'}[p]||'gray'; },
    vulnStatutClass(s){ return {'ouverte':'red','en cours':'amber','corrigée':'green','acceptée':'gray','faux positif':'gray'}[s]||'gray'; },
    exploitClass(e){ return {'confirmée':'red','théorique':'amber','non exploitable':'green'}[e]||'gray'; },
    vexClass(x){ return {affected:'red',not_affected:'green',fixed:'green',under_investigation:'amber'}[x]||'gray'; },
    ssvcClass(d){ return {Act:'red',Attend:'amber',Suivre:'gray'}[d]||'gray'; },
    cveHash(s){ let h=0x811c9dc5>>>0; for(let i=0;i<String(s).length;i++){ h^=String(s).charCodeAt(i); h=Math.imul(h,0x01000193)>>>0; } return h>>>0; },
    /* Priorisation SLA multi-signaux — modèle de points transparent */
    slaCompute(v){
      const sig=[]; let pts=0; const add=(p,label,tone)=>{ pts+=p; sig.push({label,tone}); };
      const c=Number(v.cvss_score)||0;
      const e=(v.epss_score!=null)?Number(v.epss_score):null;
      /* ---- Score de risque composite (0-100) : signaux INDÉPENDANTS uniquement ----
         Le SSVC (dérivé de EPSS/KEV/CVSS) n'est plus additionné ici : il pilotait le
         double comptage. Il reste un signal informatif et décide le NIVEAU ci-dessous. */
      if(c>=9) add(40,'CVSS '+c+' (critique)','red');
      else if(c>=7) add(28,'CVSS '+c+' (élevé)','amber');
      else if(c>=4) add(16,'CVSS '+c+' (moyen)','blue');
      else if(c>0) add(6,'CVSS '+c+' (faible)','gray');
      if(v.kev) add(25,'CISA KEV — exploité in-the-wild','red');
      if(v.exploitabilite==='confirmée') add(18,'Exploitabilité confirmée','red');
      else if(v.exploitabilite==='théorique') add(4,'Exploitabilité théorique','gray');
      if(e!=null){
        if(e>=0.5) add(12,'EPSS '+Math.round(e*100)+'% (élevé)','amber');
        else if(e>=0.1) add(6,'EPSS '+Math.round(e*100)+'% (modéré)','blue');
        else add(0,'EPSS '+Math.round(e*100)+'% (faible)','gray'); }
      const EXPO_RANK={Externe:3,DMZ:2,Interne:1};
      const _aids=(v.applications&&v.applications.length)?v.applications:(v.application_id?[v.application_id]:[]);
      const app=_aids.map(id=>(this.db.applications||[]).find(a=>a.id===id)).filter(Boolean).sort((a,b)=>((EXPO_RANK[b.exposition]||0)-(EXPO_RANK[a.exposition]||0))||((b.valeur_metier||0)-(a.valeur_metier||0)))[0];
      if(app){ if(app.exposition==='Externe') add(10,'Application exposée (Externe)','amber');
        else if(app.exposition==='DMZ') add(6,'Application en DMZ','blue');
        if(Number(app.valeur_metier)>=4) add(8,'Actif à forte valeur métier','violet'); }
      if(v.ssvc_decision) sig.push({label:'SSVC : '+v.ssvc_decision, tone:(v.ssvc_decision==='Act'?'red':(v.ssvc_decision==='Attend'?'amber':'gray'))});
      const score=Math.min(100,pts);
      /* ---- Applicabilité VEX : not_affected / fixed → pas de remédiation ---- */
      const vex=v.vex_status;
      if(vex==='not_affected'||vex==='fixed'){
        return {score, sla:'—', level:null, applicable:false, paused:false,
          reason:{key:'reason.vexNA',tone:'gray'},
          signals:sig.concat([{label:'VEX : '+this.optLabel(vex),tone:'green'}])};
      }
      const paused=(vex==='under_investigation');
      /* ---- Niveau SLA : règles §6ter — les signaux les plus probants l'emportent ---- */
      const kev=!!v.kev, ssvc=v.ssvc_decision; let level, reason;
      if(v.cve){
        if(kev){ level='P1'; reason={key:'reason.kev',tone:'red'}; }
        else if(ssvc==='Act'){ level='P1'; reason={key:'reason.ssvcAct',tone:'red'}; }
        else if(c>=9 && e!=null && e>=0.5){ level='P1'; reason={key:'reason.critExploited',tone:'red'}; }
        else if(ssvc==='Attend'){ level='P2'; reason={key:'reason.ssvcAttend',tone:'amber'}; }
        else if(e!=null && e>=0.5){ level='P2'; reason={key:'reason.epssHigh',tone:'amber'}; }
        else if(c>=7 && e!=null && e>=0.1){ level='P2'; reason={key:'reason.highLikely',tone:'amber'}; }
        else if(c>=4){ level='P3'; reason={key:'reason.cvssMod',tone:'blue'}; }
        else { level='P4'; reason={key:'reason.lowSignal',tone:'gray'}; }
      } else {
        let n={critique:1,'élevée':2,moyenne:3,faible:4}[v.severite]||3;
        if(v.exploitabilite==='confirmée') n=Math.max(1,n-1);
        level='P'+n;
        reason={key:(v.exploitabilite==='confirmée'?'reason.sevExploited':'reason.bySeverity'), tone:(level==='P1'?'red':(level==='P2'?'amber':'gray'))};
      }
      return {score, sla:level, level, applicable:true, paused, reason, signals:sig};
    },

    /* Enrichissement VOC simulé (CIRCL/EPSS/CISA KEV) — dégradation gracieuse hors-ligne */
    async enrichVuln(){
      const v=this.curVuln; if(!v) return;
      if(!this.can('update','vulnerabilities',v)){ this.pushToast('err',this.t('rbac.title'),this.t('rbac.msg')); return; }
      if(!v.cve){ this.pushToast('warn',this.t('voc.noCveT'),this.t('voc.noCveM')); return; }
      const known=KNOWN_CVE[v.cve];
      if(known){ Object.assign(v,known); v.voc_simulated=false; v.voc_source='CIRCL · EPSS · CISA KEV (valeurs publiées)'; }
      else {
        const seed=this.cveHash(v.cve);
        v.epss_score=+(0.05+(seed%90)/100).toFixed(2);
        v.epss_percentile=+(0.50+(seed%50)/100).toFixed(2);
        v.kev=(seed%3===0);
        if(v.kev){ v.kev_date_added=v.kev_date_added||'2025-01-15'; v.kev_ransomware=(seed%2===0); }
        v.ssvc_decision=(v.epss_score>=0.5||v.kev)?'Act':((Number(v.cvss_score)||0)>=7?'Attend':'Suivre');
        v.vex_status=v.vex_status||'affected';
        v.voc_simulated=true; v.voc_source='CIRCL · EPSS · CISA KEV (simulation hors-ligne)';
      }
      v.voc_enriched_at=nowISO();
      const sc=this.slaCompute(v); v.score_composite=sc.score; v.sla_niveau=sc.sla;
      this.commit('vulnerabilities');
      await this.logAction('update','vulnerabilities',v.id,this.t('voc.enriched')+' · '+v.cve,v.client_id); this.commit('auditLog');
      this.pushToast('ok',this.t('voc.enriched'),v.cve+' · EPSS '+Math.round((v.epss_score||0)*100)+'% · '+sc.sla);
    },

    appCoverage(appId){
      const rank={'terminé':3,'en cours':2,'à planifier':1};
      const auds=(this.db.audits||[]).filter(a=>a.statut!=='annulé'&&Array.isArray(a.applications)&&a.applications.includes(appId));
      const out={};
      this.appCovCats().forEach(c=>{
        const list=auds.filter(a=>a.categorie===c);
        if(!list.length){ out[c]={state:'none',statut:null,n:0}; return; }
        let best=list[0]; list.forEach(a=>{ if((rank[a.statut]||0)>(rank[best.statut]||0)) best=a; });
        out[c]={state:(best.statut==='terminé'?'done':'wip'),statut:best.statut,n:list.length};
      });
      return out;
    },

    get appRows(){

    /* Génération d'un bundle STIX 2.1 (simulé, hors-ligne) */
    buildStix(s){
      const now=nowISO(); const objs=[];
      const isId='intrusion-set--'+uid();
      objs.push({type:'intrusion-set',spec_version:'2.1',id:isId,created:now,modified:now,name:s.acteur||s.nom,description:s.notes||'',labels:[s.type||'threat']});
      const apRefs=[];
      (s.techniques||[]).forEach(tid=>{ const apId='attack-pattern--'+uid(); apRefs.push(apId);
        objs.push({type:'attack-pattern',spec_version:'2.1',id:apId,created:now,modified:now,name:this.techName(tid),
          external_references:[{source_name:'mitre-attack',external_id:tid.split('.')[0],url:'https://attack.mitre.org/techniques/'+tid.split('.')[0]}]}); });
      const coaRefs=[];
      (s.d3fend||[]).forEach(did=>{ const coaId='course-of-action--'+uid(); coaRefs.push(coaId);
        objs.push({type:'course-of-action',spec_version:'2.1',id:coaId,created:now,modified:now,name:did,
          external_references:[{source_name:'d3fend',external_id:did}]}); });
      apRefs.forEach(ap=>objs.push({type:'relationship',spec_version:'2.1',id:'relationship--'+uid(),created:now,modified:now,relationship_type:'uses',source_ref:isId,target_ref:ap}));
      coaRefs.forEach(coa=>apRefs.forEach(ap=>objs.push({type:'relationship',spec_version:'2.1',id:'relationship--'+uid(),created:now,modified:now,relationship_type:'mitigates',source_ref:coa,target_ref:ap})));
      return {type:'bundle',id:'bundle--'+uid(),objects:objs};
    },
    stixText(s){ return JSON.stringify(this.buildStix(s||this.curScen),null,2); },
    get stixPreview(){ const s=this.curScen; if(!s) return ''; return this.stixText(s); },
    async copyStix(){ try{ await navigator.clipboard.writeText(this.stixText()); this.pushToast('ok',this.t('stix.copied'),this.curScen.nom); }
      catch(e){ this.pushToast('warn',this.t('stix.copyErr'),''); } },
    downloadStix(){ const s=this.curScen; if(!s) return; const blob=new Blob([this.stixText(s)],{type:'application/json'});
      const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='stix-'+(s.acteur||s.nom||'scenario').replace(/\s+/g,'_')+'.json';
      document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
      this.pushToast('ok',this.t('stix.downloaded'),s.nom); },
    openStixImport(){ if(!this.can('create','threatScenarios')){ this.pushToast('err',this.t('rbac.title'),this.t('rbac.msg')); return; } this.stixIo={open:true,text:'',count:0}; },
    closeStixImport(){ this.stixIo.open=false; },
    async doStixImport(){
      let b; try{ b=JSON.parse(this.stixIo.text); }catch(e){ this.pushToast('err',this.t('stix.badJson'),''); return; }
      const objs=Array.isArray(b.objects)?b.objects:[];
      if(b.type!=='bundle'||!objs.length){ this.pushToast('err',this.t('stix.badBundle'),''); return; }
      const isObj=objs.find(o=>o.type==='intrusion-set');
      const techs=[...new Set(objs.filter(o=>o.type==='attack-pattern').flatMap(o=>(o.external_references||[]).filter(r=>/mitre/i.test(r.source_name||'')).map(r=>r.external_id)).filter(Boolean))];

    /* ---- cycle de vie ---- */
    async init(){
      const s=await Store.get('settings');
      if(s){ if(s.theme) this.theme=s.theme; if(s.lang) this.lang=s.lang; }
      document.documentElement.lang=this.lang;
      let any=false;
      for(const name of COLLECTIONS){
        const v=await Store.get('col:'+name);
        if(Array.isArray(v)){ this.db[name]=v; if(v.length) any=true; }
      }
      if(!any){ await this.seed(); await Store.set('seedVersion',SEED_VERSION); }
      else { const sv=await Store.get('seedVersion');
        if(sv!==SEED_VERSION){ await this.seed(); await Store.set('seedVersion',SEED_VERSION); this._reseeded=true; } }
      this.dataReady=true;
      try{ const rs=await Store.get('referentials'); if(rs&&typeof rs==='object') this.refState=rs; }catch(e){}
      this._history=[]; this._future=[]; this._pushSnapshot();
      if(this._reseeded){ this._reseeded=false; setTimeout(()=>this.pushToast('ok',this.t('seed.reloadedT'),this.t('seed.reloadedM')),300); }
      this.$watch('theme',()=>this.persist());
      this.$watch('lang',v=>{document.documentElement.lang=v; this.persist();});
    },
    async reseedDemo(){
      if(!this.can('create','organisations')){ this.pushToast('err',this.t('rbac.title'),this.t('rbac.msg')); return; }
      if(!confirm(this.t('seed.confirm'))) return;
      await this.seed(); await Store.set('seedVersion',SEED_VERSION);
      this._history=[]; this._future=[]; this._pushSnapshot();
      this.pushToast('ok',this.t('seed.reloadedT'),this.t('seed.reloadedM'));
    },
    async seed(){
      const s=buildSeed(), d=s.data;
      const entries=[
        {ts:'2026-04-05T08:00:00Z',action:'create',entity:'organisations',entityId:s.O.acme,label:this.t('seedlog.org'),client_id:s.O.acme},
        {ts:'2026-04-06T09:00:00Z',action:'create',entity:'applications',entityId:s.A.portail,label:this.t('seedlog.app'),client_id:s.O.acme},
        {ts:'2026-04-07T09:00:00Z',action:'create',entity:'audits',entityId:s.AUD.a1,label:this.t('seedlog.audit'),client_id:s.O.acme},
        {ts:'2026-04-19T22:30:00Z',action:'create',entity:'vulnerabilities',entityId:s.V.v1,label:this.t('seedlog.vuln'),client_id:s.O.acme},
        {ts:'2026-05-02T11:00:00Z',action:'create',entity:'purpleExercises',entityId:s.EX.e1,label:this.t('seedlog.ex'),client_id:s.O.acme}

    persist(){ Store.set('settings',{theme:this.theme,lang:this.lang}); },
    commit(name){ try{ Store.set('col:'+name, JSON.parse(JSON.stringify(this.db[name]||[]))); }catch(e){} if(!this._restoring) this._snapshotSoon(); },

    /* ---- undo / redo (snapshots de la base) ---- */
    _history:[], _future:[], _restoring:false, _snapPending:false,
    _snapshotSoon(){ if(this._snapPending) return; this._snapPending=true; setTimeout(()=>{ this._snapPending=false; this._pushSnapshot(); },0); },
    _pushSnapshot(){ let snap; try{ snap=JSON.stringify(this.db); }catch(e){ return; }
      if(this._history.length && this._history[this._history.length-1]===snap) return;
      this._history.push(snap); if(this._history.length>15) this._history.shift(); this._future=[]; },
    _restore(snap){ this._restoring=true; try{ this.db=JSON.parse(snap); COLLECTIONS.forEach(n=>this.commit(n)); } finally { this._restoring=false; } },
    get canUndo(){ return this._history.length>1; },
    get canRedo(){ return this._future.length>0; },
    undo(){ if(this._history.length<=1){ this.pushToast('warn',this.t('undo.none'),''); return; }
      this._future.push(this._history.pop()); this._restore(this._history[this._history.length-1]);
      this.pushToast('ok',this.t('undo.done'),this.t('undo.hint')); },

    /* ---- RBAC ---- */
    can(action,entity,record){
      const rights=(RBAC[this.profile]||{})[entity]||'';
      const code={create:'C',edit:'E',update:'E',delete:'S',validate:'V',read:'L'}[action]||action;
      if(!rights.includes(code)) return false;
      if(record && this.clientsRattaches.length){
        const cid=this._scopeClientOf(entity,record);
        if(cid && !this.clientsRattaches.includes(cid)) return false;
      }
      return true;
    },
    canRead(entity){ return ((RBAC[this.profile]||{})[entity]||'').includes('L'); },
    _scopeClientOf(entity,record){
      if(!record) return null;
      const col=this.colOf(entity);
      if(col==='organisations') return record.role==='client'?record.id:null;
      if(col==='resources') return (record.organisation_id && this.orgRole(record.organisation_id)==='client')?record.organisation_id:null;
      if(col==='auditActions'){ const a=(this.db.audits||[]).find(x=>x.id===record.audit_id); return a?a.client_id:null; }
      return record.client_id||null;
    },

      if(id==='parametres') return this.profile==='admin';
      const map={exercices:'purpleExercises',audits:'audits',vulns:'vulnerabilities',scenarios:'threatScenarios',
        applications:'applications',organisations:'organisations',ressources:'ressources',generateur:'deliverables',journal:'auditLog'};
      const ent=map[id]; if(!ent) return true;
      return this.canRead(ent);
    },

        this.clientFilter=this.clientsRattaches[0]; this.onClientChange();

    /* ---- édition générique ---- */
    openEditor(entity,record=null,ctx={}){
      if(!this.can(record?'edit':'create',entity,record)){ this.pushToast('err',this.t('rbac.title'),this.t('rbac.msg')); return; }
      const fields=FIELDS[entity]||[]; const model={};
      fields.forEach(f=>{ let v=record?record[f.k]:undefined;
        if(f.t==='tags') v=Array.isArray(v)?v.join(', '):(v||'');
        else if(f.t==='lines') v=Array.isArray(v)?v.join('\n'):(v||'');
        else if(f.t==='multiref'||f.t==='refpickm'||f.t==='attckpick') v=Array.isArray(v)?v.slice():[];
        else if(f.t==='bool') v=!!v;
        else if(v==null) v='';
        model[f.k]=v; });
      if(!record && (entity==='applications'||entity==='audits') && this.clientFilter!=='all' && 'client_id' in model) model.client_id=this.clientFilter;
      if(!record && entity==='vulnerabilities'){ if(!model.date_decouverte) model.date_decouverte=nowISO().slice(0,10); if(!model.tlp) model.tlp='RED'; }
      const ac={}; fields.forEach(f=>{ if(['refac','multiref','refpick','refpickm','attckpick'].includes(f.t)) ac[f.k]={q:'',open:false}; });
      this.editor={open:true,entity,id:record?record.id:null,model,fields,errors:{},ctx:ctx||{},ac};
    },
    async saveEditor(){
      const ent=this.editor.entity, fields=this.editor.fields, m=this.editor.model, errors={};
      fields.forEach(f=>{ if(f.req){ const v=m[f.k]; if(v==null||String(v).trim()==='') errors[f.k]=this.t('val.required'); } });
      const cf=fields.find(f=>(f.t==='ref'||f.t==='refac')&&f.role==='client');
      if(cf && m[cf.k]){ const o=this.db.organisations.find(x=>x.id===m[cf.k]); if(!o||o.role!=='client') errors[cf.k]=this.t('val.client'); }
      /* multiref applications : obligatoire si req, et rattachées au client de l'audit */
      fields.filter(f=>f.t==='multiref').forEach(f=>{
        const sel=Array.isArray(m[f.k])?m[f.k]:[];
        if(f.req && !sel.length){ errors[f.k]=this.t('val.required'); return; }
        if(f.clientScoped && cf && m[cf.k]){ const bad=sel.some(id=>{ const a=(this.db[f.coll]||[]).find(x=>x.id===id); return !a||a.client_id!==m[cf.k]; });
          if(bad) errors[f.k]=this.t('val.appClient'); }
      });
      this.editor.errors=errors; if(Object.keys(errors).length) return;
      const rec={};
      fields.forEach(f=>{ let v=m[f.k];
        if(f.t==='tags') v=String(v||'').split(',').map(s=>s.trim()).filter(Boolean);
        else if(f.t==='lines') v=String(v||'').split('\n').map(s=>s.trim()).filter(Boolean);
        else if(f.t==='multiref'||f.t==='refpickm'||f.t==='attckpick') v=Array.isArray(v)?v.slice():[];
        else if(f.t==='bool') v=!!v;
        else if(f.t==='number') v=(v===''||v==null)?null:Number(v);
        else if(typeof v==='string') v=v.trim();
        rec[f.k]=v; });
      /* engagement : sous-objet d'un audit, pas une collection */
      if(ent==='engagement'){
        const a=this.db.audits.find(x=>x.id===this.editor.id);
        if(a){ a.engagement={...(a.engagement||{}),...rec}; this.commit('audits');
          await this.logAction('update','engagement',a.id,this.t('eng.updated')+' · '+(a.nom||''),a.client_id); this.commit('auditLog'); }
        this.editor.open=false; this.pushToast('ok',this.t('toast.savedTitle2'),this.t('ent.engagement')); return;
      }
      /* livrable : dérive le client de l'audit + titres/dates par défaut */
      if(ent==='deliverables'){
        const a=this.db.audits.find(x=>x.id===rec.audit_id);
        if(a) rec.client_id=a.client_id;
        if(!rec.langue) rec.langue=this.lang;
        if(!rec.version) rec.version='1.0';
        if(!rec.date) rec.date=nowISO().slice(0,10);
        if(!rec.statut) rec.statut='généré';
        if(!rec.titre){ const lbl=this.optLabel(rec.type); rec.titre=lbl+(a?' — '+a.nom:''); }

    /* ---- journal tamper-evident (chaînage SHA-256) ---- */
    async logAction(action,entity,entityId,label,client_id=null){
      const log=this.db.auditLog; const last=log.length?log[log.length-1]:null;
      const e={id:uid(),seq:(last?last.seq:0)+1,ts:nowISO(),actor:this.profile,action,entity,entityId,label:label||'',client_id:client_id??null};

    },
    async verifyChain(){

      let prev='GENESIS', ok=true, at=null;

        const h=await sha256hex(prev+'||'+logCanon(e));
        if(e.prevHash!==prev || e.hash!==h){ ok=false; at=e.seq; break; }
        prev=e.hash;
      }
      this.chainStatus={ok,count:log.length,at};
      this.pushToast(ok?'ok':'err', ok?this.t('chain.okT'):this.t('chain.koT'),
        ok?(this.t('chain.okM')+' · '+log.length+' '+this.t('io.records')):(this.t('chain.koM')+' #'+at));
    },

    /* ---- export / import cloisonné ---- */
    buildExport(){
      const c=this.clientFilter, inC=x=>c==='all'||x.client_id===c;
      const audits=this.db.audits.filter(inC), auditIds=new Set(audits.map(a=>a.id));

      const chains=this.db.attackChains.filter(ch=>c==='all'||exoIds.has(ch.exercise_id)), chainIds=new Set(chains.map(ch=>ch.id));

        organisations: c==='all'?this.db.organisations:this.db.organisations.filter(o=>o.id===c||o.role!=='client'),
        resources: this.scope('resources'),

      let merged=0;

        if(name==='auditLog') return;

}
