server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression des assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache long pour les assets fingerprintés par Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # En-têtes communs à toutes les routes proxifiées
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    # Endpoints applicatifs : tout est sous /api
    location /api/ {
        proxy_pass http://backend:8000;
    }

    # Doc interactive FastAPI (Swagger) servie sur /docs et /openapi.json.
    # Le port 8000 du backend n'étant plus exposé, on y accède via le proxy :
    #   http://localhost:8080/docs
    location = /docs {
        proxy_pass http://backend:8000/docs;
    }
    location = /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }

    # SPA : toute autre route retombe sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
