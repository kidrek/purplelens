# Reverse proxy edge — point d'entrée unique (DAT §4.1bis).
# Routage par chemin sur l'unique port exposé : / (statique) · /api · /storage · /idp.

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    client_max_body_size 210m;   # aligné MAX_EVIDENCE_BYTES (200 Mo + marge)

    # Résolveur DNS interne de Docker. Combiné aux proxy_pass « par variable »
    # ci-dessous, il rend la résolution des services amont PARESSEUSE (au moment
    # de la requête) au lieu d'AVOIR LIEU au chargement de la config. Nginx démarre
    # donc même si api / minio / keycloak ne sont pas encore prêts : il renverra un
    # 502 transitoire tant qu'un amont est indisponible, au lieu d'avorter.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Redirection HTTP → HTTPS (le TLS peut aussi être terminé en amont).
    server {
        listen 80;
        server_name _;
        location /healthz { return 200 "ok\n"; }
        location / { return 301 https://$host$request_uri; }
    }

    server {
        listen 443 ssl;
        server_name _;

        # Certificats : montés en prod. En dev, self-signed généré par `make tls`.
        ssl_certificate     /etc/nginx/tls/fullchain.pem;
        ssl_certificate_key /etc/nginx/tls/privkey.pem;

        # Durcissement de base
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Frontend statique (build Vite)
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        location = /healthz { return 200 "ok\n"; }

        # BFF FastAPI — cookies HttpOnly, aucune décision d'autorisation côté client.
        # proxy_pass « par variable » ($up_api) => résolution paresseuse via resolver.
        # X-Forwarded-Host = $http_host (port externe inclus) : l'API en a besoin pour
        # signer les URL présignées MinIO avec l'hôte réellement joint par le
        # navigateur (storage/minio_client.py:public_origin) — même principe que
        # pour Keycloak ci-dessous, sans quoi le port de l'edge serait figé en dur.
        location /api/ {
            set $up_api api;
            proxy_pass http://$up_api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MinIO — URL présignées upload/download (l'API signe avec l'hôte public).
        # Le rewrite retire le préfixe /storage/ (équivaut à l'ancien proxy_pass .../).
        # Host = $http_host (port INCLUS) et non $host (port retiré) : la signature
        # SigV4 présignée couvre l'en-tête Host tel que vu par le navigateur, port
        # compris. Transmettre $host ferait recalculer à MinIO une signature sur un
        # Host différent => SignatureDoesNotMatch. Idem convention que /idp/.
        location /storage/ {
            set $up_minio minio;
            rewrite ^/storage/(.*)$ /$1 break;
            proxy_pass http://$up_minio:9000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Keycloak — redirections OIDC cohérentes (KC_HTTP_RELATIVE_PATH=/idp).
        # X-Forwarded-Host = $http_host inclut le port externe (ex. localhost:7443),
        # ce qui permet à Keycloak de construire des URL de redirection correctes.
        location /idp/ {
            set $up_kc keycloak;
            proxy_pass http://$up_kc:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
